<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Survival Arena: 草抜き ALL STARS</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #2d5a27; font-family: sans-serif; touch-action: none; user-select: none; color: white; }
        canvas { display: block; background: #4a7c44; width: 100vw; height: 100vh; }
        
        #selector { position: fixed; inset: 0; background: linear-gradient(to bottom, #2d5a27, #1a3317); display: flex; flex-direction: column; align-items: center; z-index: 1000; overflow-y: auto; padding: 20px; }
        .header-ui { width: 100%; max-width: 600px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 10px; }
        .money-tag { color: #ffd700; font-size: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; width: 100%; max-width: 900px; }
        .card { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; border: 2px solid #222; }
        .card.locked { opacity: 0.2; filter: grayscale(1); }
        .card.selected { border-color: #ffd700; background: rgba(255,215,0,0.3); }
        #upgrade-panel { width: 100%; max-width: 500px; background: rgba(0,0,0,0.9); border: 3px solid #ffd700; border-radius: 15px; padding: 20px; margin-top: 20px; display: none; text-align: center; margin-bottom: 40px;}
        .play-btn { width: 100%; padding: 15px; font-size: 20px; background: #4caf50; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* スティックとボタン */
        #joystick-container { position: fixed; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.2); border-radius: 50%; display: none; touch-action: none; z-index: 100; border: 2px solid rgba(255,255,255,0.3); }
        #joystick-knob { position: absolute; top: 30px; left: 30px; width: 60px; height: 60px; background: rgba(255,255,255,0.8); border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #mobile-controls { position: fixed; bottom: 40px; right: 40px; display: none; z-index: 100; }
        .attack-btn { width: 100px; height: 100px; background: rgba(255,0,0,0.7); border: 4px solid white; border-radius: 50%; color: white; font-weight: bold; font-size: 18px; display: flex; align-items: center; justify-content: center; pointer-events: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .attack-btn:active { transform: scale(0.9); background: rgba(255,0,0,0.9); }

        #exit-btn { position: fixed; top: 15px; right: 15px; padding: 10px 20px; background: #ff4444; border: 2px solid white; border-radius: 8px; display: none; z-index: 100; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="selector">
    <div class="header-ui">
        <button onclick="location.href='index.html'">← 戻る</button>
        <div class="money-tag">💰 <span id="money-val">0</span>円</div>
    </div>
    <h2>ARENA ALL STARS</h2>
    <div class="grid" id="grid"></div>
    <div id="upgrade-panel">
        <div id="up-icon" style="font-size: 60px;">❓</div>
        <h3 id="up-name">---</h3>
        <button class="play-btn" onclick="startGame()">⚔️ 参戦 ⚔️</button>
    </div>
</div>

<button id="exit-btn" onclick="exitGame()">🏠 撤退</button>

<div id="joystick-container">
    <div id="joystick-knob"></div>
</div>

<div id="mobile-controls">
    <div class="attack-btn" id="atk-btn">ATTACK</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const firebaseConfig = { databaseURL: "https://game-685f2-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const playersRef = db.ref('players');
    const bulletsRef = db.ref('bullets');

    const characters = [
        { id: 'c_scarlet_ham', name: '緋色の金権覇者：ハム', icon: '🐹👑', hp: 500 },
        { id: 'c_scarlet_ham_uz', name: '緋色の金権覇王：ハム', icon: '🐹🔥', hp: 1200 },
        { id: 'fusion_zen_kazu', name: 'アルティメット・カズキング・ZEN', icon: '☯️', hp: 3000 },
        { id: 'c_rampage_venom', name: 'ランペイジ・イット(ヴェノム)', icon: '☣️', hp: 2800 },
        { id: 'ev_kazu_ultimate', name: 'ゴッドネスカズキングタイジュウフエターネキンギーニ', icon: '🌌', hp: 1500 },
        { id: 'c1_ultimate', name: 'マキシマムZEN', icon: '👹', hp: 1400 },
        { id: 'c13_ultimate', name: '大泥棒ぜん', icon: '💰', hp: 1100 },
        { id: 'c7_ultimate', name: '精霊ぜん', icon: '👼', hp: 1000 },
        { id: 'c2_ultimate', name: '億万長者ぜん', icon: '🏢', hp: 1000 },
        { id: 'c_seimaro_uz', name: 'ゴッドネスせいまろ', icon: '⚡🐕', hp: 1300 },
        { id: 'ev_kazu', name: 'カズキングタイジュウフエターネキンギーニ', icon: '👑', hp: 600 },
        { id: 'c_seimaro', name: 'せいまろ', icon: '🐕‍🦺', hp: 550 },
        { id: 'c_rampage', name: 'ランペイジイット', icon: '🦖', hp: 1200 },
        { id: 'c1', name: '覚醒ぜん', icon: '🔥', hp: 450 },
        { id: 'c13', name: '泥棒ぜん', icon: '👤', hp: 400 },
        { id: 'c7', name: '幽霊ぜん', icon: '👻', hp: 400 },
        { id: 'c2', name: '大富豪ぜん', icon: '💎', hp: 420 },
        { id: 'c_dragon', name: '龍神ぜん', icon: '🐉', hp: 500 },
        { id: 'c_mech', name: '機甲ぜんTYPE-Z', icon: '🤖', hp: 550 },
        { id: 'c_dark', name: 'ダークネスぜん', icon: '🌑', hp: 480 },
        { id: 'c9', name: '黄金ぜん', icon: '✨', hp: 300 },
        { id: 'c3', name: '社長ぜん', icon: '💼', hp: 280 },
        { id: 'c4', name: '地主ぜん', icon: '🏰', hp: 260 },
        { id: 'c5', name: '投資家ぜん', icon: '📈', hp: 250 },
        { id: 'sr_shodo', name: '書道家ぜん', icon: '🖌️', hp: 270 },
        { id: 'sr_adv', name: '冒険家ぜん', icon: '🤠', hp: 290 },
        { id: 'sr_guitar', name: 'ギタリストぜん', icon: '🎸', hp: 280 },
        { id: 'c6', name: '商人ぜん', icon: '⚖️', hp: 200 },
        { id: 'c8', name: '侍ぜん', icon: '⚔️', hp: 180 },
        { id: 'r_farm', name: '農家ぜん', icon: '👨‍🌾', hp: 220 },
        { id: 'r_cheer', name: '応援団ぜん', icon: '📣', hp: 210 },
        { id: 'r_book', name: '読書家ぜん', icon: '📖', hp: 190 },
        { id: 'c14', name: '料理人ぜん', icon: '🍳', hp: 150 },
        { id: 'c20', name: '普通のぜん', icon: '👤', hp: 100 },
        { id: 'ket_r', name: 'ただのケチャップ', icon: '👤', hp: 180 },
        { id: 'ket_sr', name: '普通のケチャップ', icon: '👤', hp: 300 },
        { id: 'ket_ssr', name: '覚醒ケチャップ', icon: '🔥', hp: 600 },
        { id: 'ket_uz', name: '伝説のケチャップ', icon: '⚔', hp: 1200 },
        { id: 'ket_x', name: '究極ケチャップ', icon: '⑨', hp: 2500 },
        { id: 'ket_og', name: '不滅のケチャップ', icon: '🍅', hp: 6000 },
        { id: 'sei_cook', name: 'キングオブクッキングせいまろ', icon: '🍳', hp: 2700 },
        { id: 'sei_dragon', name: '神託の紅蓮龍・セイマロッチ', icon: '🐉', hp: 3500 },
        { id: 'ket_royal_k', name: 'アルティメット・カズケチャ', icon: '🎮', hp: 3200 },
        { id: 'zen_omelette', name: 'マキシマム・オムレツ・ゴッド・ZEN', icon: '🥚', hp: 3300 },
        { id: 'ham_pork', name: '鮮血の金権帝：ロイヤル・ポーク', icon: '🐷', hp: 3100 },
        { id: 'ven_eclipse', name: 'ヴェノム・ブラッド・エクリプス', icon: '☣️', hp: 3400 },
        { id: 'ven_gastro', name: 'ヴェノム・ガストロノミー', icon: '☣️', hp: 3400 },
        { id: 'ug_emperor', name: '天界統括神：UGカズキング', icon: '👑', hp: 4000 },
        { id: 'deus_ex', name: '混沌の調味主：デウス・エクス・マキナ', icon: '🤠', hp: 8000 }
    ];

    const STORAGE_KEY = 'zenSurvival_Final_v14';
    let myId = 'p_' + Math.random().toString(36).substr(2, 6);
    let gameData = { money: 0, owned: ["c20"] };
    let selectedChar = null;
    let isPlaying = false;
    let players = {}, bullets = {};
    let myLocal = { x: 0, y: 0, hp: 100, maxHp: 100, icon: '👤', name: '', active: false, lastShot: 0 };
    let keys = {};
    
    // ジョイスティック用変数
    let stickX = 0, stickY = 0;
    let isSticking = false;

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function init() {
        const d = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        gameData.owned = d.owned || ["c20"];
        document.getElementById('money-val').innerText = (d.money || 0).toLocaleString();

        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        characters.forEach(c => {
            const isOwned = gameData.owned.includes(c.id);
            const card = document.createElement('div');
            card.className = `card ${isOwned ? '' : 'locked'}`;
            card.innerHTML = `<div style="font-size:35px;">${isOwned ? c.icon : '🔒'}</div><div style="font-size:10px;">${c.name}</div>`;
            if(isOwned) card.onclick = () => {
                selectedChar = c;
                document.querySelectorAll('.card').forEach(x => x.classList.remove('selected'));
                card.classList.add('selected');
                document.getElementById('upgrade-panel').style.display = 'block';
                document.getElementById('up-icon').innerText = c.icon;
                document.getElementById('up-name').innerText = c.name;
            };
            grid.appendChild(card);
        });
    }

    function startGame() {
        if(!selectedChar) return;
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        myLocal.x = canvas.width / 2;
        myLocal.y = canvas.height / 2;
        myLocal.hp = selectedChar.hp;
        myLocal.maxHp = selectedChar.hp;
        myLocal.icon = selectedChar.icon;
        myLocal.name = selectedChar.name;
        myLocal.active = true;
        isPlaying = true;
        document.getElementById('selector').style.display = 'none';
        document.getElementById('exit-btn').style.display = 'block';
        document.getElementById('mobile-controls').style.display = 'block';
        document.getElementById('joystick-container').style.display = 'block';
        playersRef.child(myId).set({ id: myId, x: myLocal.x, y: myLocal.y, icon: myLocal.icon, name: myLocal.name, hp: myLocal.hp, maxHp: myLocal.maxHp });
        requestAnimationFrame(loop);
    }

    // ジョイスティック制御
    const container = document.getElementById('joystick-container');
    const knob = document.getElementById('joystick-knob');
    container.addEventListener('touchstart', e => { isSticking = true; });
    window.addEventListener('touchmove', e => {
        if(!isSticking) return;
        const touch = e.touches[0];
        const rect = container.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        let dx = touch.clientX - centerX;
        let dy = touch.clientY - centerY;
        const dist = Math.min(60, Math.hypot(dx, dy));
        const angle = Math.atan2(dy, dx);
        stickX = (Math.cos(angle) * dist) / 60;
        stickY = (Math.sin(angle) * dist) / 60;
        knob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
    });
    window.addEventListener('touchend', () => {
        isSticking = false; stickX = 0; stickY = 0;
        knob.style.transform = `translate(0,0)`;
    });

    function shoot(tx = null, ty = null) {
        if(!isPlaying) return;
        const now = Date.now();
        if(now - myLocal.lastShot < 250) return;
        myLocal.lastShot = now;
        let vx = 0, vy = -15; 
        if(tx !== null && ty !== null) {
            const angle = Math.atan2(ty - myLocal.y, tx - myLocal.x);
            vx = Math.cos(angle) * 18;
            vy = Math.sin(angle) * 18;
        }
        const bid = 'b_' + myId + '_' + now;
        bulletsRef.child(bid).set({ x: myLocal.x, y: myLocal.y, vx: vx, vy: vy, owner: myId });
    }

    window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code === 'Space' || e.code === 'Enter') shoot(); });
    window.addEventListener('keyup', e => keys[e.code] = false);
    canvas.addEventListener('mousedown', e => { if(isPlaying) shoot(e.clientX, e.clientY); });
    document.getElementById('atk-btn').addEventListener('touchstart', e => { e.preventDefault(); shoot(); });

    playersRef.on('value', s => { 
        players = s.val() || {}; 
        if(players[myId]) myLocal.hp = players[myId].hp; 
    });
    bulletsRef.on('value', s => { bullets = s.val() || {}; });

    function drawChar(x, y, icon, name, hp, maxHp, isMe) {
        ctx.font = 'bold 12px sans-serif';
        ctx.fillStyle = isMe ? '#ffff00' : 'white';
        ctx.textAlign = 'center';
        ctx.fillText(name, x, y - 75);
        ctx.font = '50px Arial';
        ctx.fillText(icon, x, y);
        const bw = 60;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(x - bw/2, y - 65, bw, 6);
        ctx.fillStyle = hp > maxHp * 0.3 ? '#00ff00' : '#ff0000';
        ctx.fillRect(x - bw/2, y - 65, bw * (Math.max(0, hp)/maxHp), 6);
    }

    function loop() {
        if(!isPlaying) return;
        ctx.fillStyle = '#4a7c44';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // 移動処理 (キーボード + スティック)
        let mvx = stickX * 7, mvy = stickY * 7;
        if(keys['ArrowUp'] || keys['KeyW']) mvy = -7;
        if(keys['ArrowDown'] || keys['KeyS']) mvy = 7;
        if(keys['ArrowLeft'] || keys['KeyA']) mvx = -7;
        if(keys['ArrowRight'] || keys['KeyD']) mvx = 7;

        if(mvx !== 0 || mvy !== 0) {
            myLocal.x = Math.max(30, Math.min(canvas.width - 30, myLocal.x + mvx));
            myLocal.y = Math.max(30, Math.min(canvas.height - 30, myLocal.y + mvy));
            playersRef.child(myId).update({ x: myLocal.x, y: myLocal.y });
        }

        Object.keys(bullets).forEach(bid => {
            const b = bullets[bid];
            b.x += b.vx; b.y += b.vy;
            ctx.fillStyle = 'yellow';
            ctx.beginPath(); ctx.arc(b.x, b.y, 6, 0, Math.PI*2); ctx.fill();
            if(b.owner === myId) {
                Object.keys(players).forEach(pid => {
                    if(pid !== myId && Math.hypot(b.x - players[pid].x, b.y - players[pid].y) < 35) {
                        playersRef.child(pid).transaction(current => { if(current) current.hp -= 20; return current; });
                        bulletsRef.child(bid).remove();
                    }
                });
            }
            if(b.x < -50 || b.x > canvas.width + 50 || b.y < -50 || b.y > canvas.height + 50) {
                if(b.owner === myId) bulletsRef.child(bid).remove();
            }
        });

        Object.keys(players).forEach(id => {
            if(id === myId) return; 
            const p = players[id];
            drawChar(p.x, p.y, p.icon, p.name, p.hp, p.maxHp, false);
        });

        if(myLocal.active) drawChar(myLocal.x, myLocal.y, myLocal.icon, myLocal.name, myLocal.hp, myLocal.maxHp, true);
        if(myLocal.hp <= 0) { alert("戦闘不能！"); exitGame(); return; }
        requestAnimationFrame(loop);
    }

    function exitGame() {
        isPlaying = false; myLocal.active = false;
        playersRef.child(myId).remove();
        document.getElementById('selector').style.display = 'flex';
        document.getElementById('exit-btn').style.display = 'none';
        document.getElementById('mobile-controls').style.display = 'none';
        document.getElementById('joystick-container').style.display = 'none';
    }
    window.onload = init;
</script>
</body>
</html>
