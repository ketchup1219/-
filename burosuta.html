<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Survival Arena: 草抜き ALL STARS - ULTIMATE</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        /* テクスチャとエフェクトの強化 */
        body { 
            margin: 0; overflow: hidden; 
            background: radial-gradient(circle, #1e3d1a 0%, #0a1a08 100%); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            touch-action: none; user-select: none; color: white; 
        }
        canvas { display: block; width: 100vw; height: 100vh; filter: contrast(1.1) brightness(1.1); }
        
        #selector { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle at center, rgba(45, 90, 39, 0.9) 0%, rgba(10, 20, 10, 0.98) 100%);
            display: flex; flex-direction: column; align-items: center; z-index: 1000; overflow-y: auto; padding: 20px;
            backdrop-filter: blur(10px);
        }
        .header-ui { 
            width: 100%; max-width: 600px; display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .money-tag { color: #ffd700; font-size: 24px; font-weight: bold; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; width: 100%; max-width: 900px; }
        .card { 
            background: rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; 
            border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative; overflow: hidden;
        }
        .card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.5); }
        .card.locked { opacity: 0.3; filter: grayscale(1) blur(1px); }
        .card.selected { 
            border-color: #ffd700; background: rgba(255,215,0,0.15); 
            box-shadow: 0 0 20px rgba(255,215,0,0.4), inset 0 0 15px rgba(255,215,0,0.2);
            animation: pulse-glow 2s infinite;
        }
        @keyframes pulse-glow { 0% { box-shadow: 0 0 10px rgba(255,215,0,0.4); } 50% { box-shadow: 0 0 25px rgba(255,215,0,0.7); } 100% { box-shadow: 0 0 10px rgba(255,215,0,0.4); } }

        #upgrade-panel { 
            width: 100%; max-width: 500px; background: rgba(0,0,0,0.85); border: 2px solid #ffd700; 
            border-radius: 20px; padding: 25px; margin-top: 30px; display: none; text-align: center; 
            margin-bottom: 40px; backdrop-filter: blur(15px); box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        .play-btn { 
            width: 100%; padding: 18px; font-size: 22px; background: linear-gradient(135deg, #4caf50, #2e7d32); 
            color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3); box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: 0.2s;
            margin-top: 20px;
        }
        .play-btn:active { transform: scale(0.96); box-shadow: 0 2px 5px rgba(0,0,0,0.5); }

        /* アップグレードセクション用CSS */
        .upgrade-row { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 15px; }
        .up-btn { 
            flex: 1; background: rgba(255,255,255,0.1); border: 1px solid #ffd700; color: white; 
            border-radius: 8px; padding: 10px 5px; cursor: pointer; font-size: 12px;
        }
        .up-btn:hover { background: rgba(255,215,0,0.2); }
        .up-btn:disabled { opacity: 0.5; cursor: not-allowed; border-color: #666; }

        /* コントローラーのエフェクト */
        #joystick-container { 
            position: fixed; bottom: 50px; left: 50px; width: 130px; height: 130px; 
            background: rgba(255,255,255,0.1); border-radius: 50%; display: none; 
            z-index: 100; border: 2px solid rgba(255,255,255,0.2); backdrop-filter: blur(5px);
        }
        #joystick-knob { 
            position: absolute; top: 35px; left: 35px; width: 60px; height: 60px; 
            background: radial-gradient(circle at 30% 30%, #ffffff, #888); 
            border-radius: 50%; box-shadow: 0 10px 20px rgba(0,0,0,0.6); 
        }
        #mobile-controls { position: fixed; bottom: 50px; right: 50px; display: none; z-index: 100; }
        .attack-btn { 
            width: 110px; height: 110px; background: radial-gradient(circle, #ff4444, #990000); 
            border: 4px solid rgba(255,255,255,0.8); border-radius: 50%; color: white; 
            font-weight: bold; font-size: 20px; display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.5), 0 0 15px rgba(255,0,0,0.4); transition: 0.1s;
        }

        #exit-btn { 
            position: fixed; top: 20px; right: 20px; padding: 12px 25px; background: rgba(255, 68, 68, 0.8); 
            border: 1px solid white; border-radius: 10px; display: none; z-index: 100; cursor: pointer; 
            font-weight: bold; backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

<div id="selector">
    <div class="header-ui">
        <button style="background:none; border:1px solid white; color:white; padding:5px 15px; border-radius:5px;" onclick="location.href='index.html'">← BACK</button>
        <div class="money-tag">💰 <span id="money-val">0</span></div>
    </div>
    <h1 style="text-shadow: 0 0 20px rgba(255,255,255,0.5); letter-spacing: 2px;">ARENA ALL STARS</h1>
    <div class="grid" id="grid"></div>
    <div id="upgrade-panel">
        <div id="up-icon" style="font-size: 80px; filter: drop-shadow(0 0 15px rgba(255,255,255,0.4));">❓</div>
        <h3 id="up-name" style="font-size: 24px; margin: 15px 0;">---</h3>
        
        <div class="upgrade-row">
            <button class="up-btn" onclick="upgrade('hp')">❤️ HP UP<br><span id="cost-hp">0</span></button>
            <button class="up-btn" onclick="upgrade('atk')">⚔️ ATK UP<br><span id="cost-atk">0</span></button>
            <button class="up-btn" onclick="upgrade('spd')">⚡ SPD UP<br><span id="cost-spd">0</span></button>
        </div>

        <button class="play-btn" onclick="startGame()">⚔️ ENTER THE ARENA ⚔️</button>
    </div>
</div>

<button id="exit-btn" onclick="exitGame()">🏠 RETREAT</button>

<div id="joystick-container">
    <div id="joystick-knob"></div>
</div>

<div id="mobile-controls">
    <div class="attack-btn" id="atk-btn">ATTACK</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    // --- データと基本設定 ---
    const firebaseConfig = { databaseURL: "https://game-685f2-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const playersRef = db.ref('players');
    const bulletsRef = db.ref('bullets');

    const characters = [
        { id: 'c_scarlet_ham', name: '緋色の金権覇者：ハム', icon: '🐹👑', hp: 500 },
        { id: 'c_scarlet_ham_uz', name: '緋色の金権覇王：ハム', icon: '🐹🔥', hp: 1200 },
        { id: 'fusion_zen_kazu', name: 'アルティメット・カズキング・ZEN', icon: '☯️', hp: 3000 },
        { id: 'c_rampage_venom', name: 'ランペイジ・イット(ヴェノム)', icon: '☣️', hp: 2800 },
        { id: 'ev_kazu_ultimate', name: 'ゴッドネスカズキングタイジュウフエターネキンギーニ', icon: '🌌', hp: 1500 },
        { id: 'c1_ultimate', name: 'マキシマムZEN', icon: '👹', hp: 1400 },
        { id: 'c13_ultimate', name: '大泥棒ぜん', icon: '💰', hp: 1100 },
        { id: 'c7_ultimate', name: '精霊ぜん', icon: '👼', hp: 1000 },
        { id: 'c2_ultimate', name: '億万長者ぜん', icon: '🏢', hp: 1000 },
        { id: 'c_seimaro_uz', name: 'ゴッドネスせいまろ', icon: '⚡🐕', hp: 1300 },
        { id: 'ev_kazu', name: 'カズキングタイジュウフエターネキンギーニ', icon: '👑', hp: 600 },
        { id: 'c_seimaro', name: 'せいまろ', icon: '🐕‍🦺', hp: 550 },
        { id: 'c_rampage', name: 'ランペイジイット', icon: '🦖', hp: 1200 },
        { id: 'c1', name: '覚醒ぜん', icon: '🔥', hp: 450 },
        { id: 'c13', name: '泥棒ぜん', icon: '👤', hp: 400 },
        { id: 'c7', name: '幽霊ぜん', icon: '👻', hp: 400 },
        { id: 'c2', name: '大富豪ぜん', icon: '💎', hp: 420 },
        { id: 'c_dragon', name: '龍神ぜん', icon: '🐉', hp: 500 },
        { id: 'c_mech', name: '機甲ぜんTYPE-Z', icon: '🤖', hp: 550 },
        { id: 'c_dark', name: 'ダークネスぜん', icon: '🌑', hp: 480 },
        { id: 'c9', name: '黄金ぜん', icon: '✨', hp: 300 },
        { id: 'c3', name: '社長ぜん', icon: '💼', hp: 280 },
        { id: 'c4', name: '地主ぜん', icon: '🏰', hp: 260 },
        { id: 'c5', name: '投資家ぜん', icon: '📈', hp: 250 },
        { id: 'sr_shodo', name: '書道家ぜん', icon: '🖌️', hp: 270 },
        { id: 'sr_adv', name: '冒険家ぜん', icon: '🤠', hp: 290 },
        { id: 'sr_guitar', name: 'ギタリストぜん', icon: '🎸', hp: 280 },
        { id: 'c6', name: '商人ぜん', icon: '⚖️', hp: 200 },
        { id: 'c8', name: '侍ぜん', icon: '⚔️', hp: 180 },
        { id: 'r_farm', name: '農家ぜん', icon: '👨‍🌾', hp: 220 },
        { id: 'r_cheer', name: '応援団ぜん', icon: '📣', hp: 210 },
        { id: 'r_book', name: '読書家ぜん', icon: '📖', hp: 190 },
        { id: 'c14', name: '料理人ぜん', icon: '🍳', hp: 150 },
        { id: 'c20', name: '普通のぜん', icon: '👤', hp: 100 },
        { id: 'ket_r', name: 'ただのケチャップ', icon: '👤', hp: 180 },
        { id: 'ket_sr', name: '普通のケチャップ', icon: '👤', hp: 300 },
        { id: 'ket_ssr', name: '覚醒ケチャップ', icon: '🔥', hp: 600 },
        { id: 'ket_uz', name: '伝説のケチャップ', icon: '⚔', hp: 1200 },
        { id: 'ket_x', name: '究極ケチャップ', icon: '⑨', hp: 2500 },
        { id: 'ket_og', name: '不滅のケチャップ', icon: '🍅', hp: 6000 },
        { id: 'sei_cook', name: 'キングオブクッキングせいまろ', icon: '🍳', hp: 2700 },
        { id: 'sei_dragon', name: '神託の紅蓮龍・セイマロッチ', icon: '🐉', hp: 3500 },
        { id: 'ket_royal_k', name: 'アルティメット・カズケチャ', icon: '🎮', hp: 3200 },
        { id: 'zen_omelette', name: 'マキシマム・オムレツ・ゴッド・ZEN', icon: '🥚', hp: 3300 },
        { id: 'ham_pork', name: '鮮血の金権帝：ロイヤル・ポーク', icon: '🐷', hp: 3100 },
        { id: 'ven_eclipse', name: 'ヴェノム・ブラッド・エクリプス', icon: '☣️', hp: 3400 },
        { id: 'ven_gastro', name: 'ヴェノム・ガストロノミー', icon: '☣️', hp: 3400 },
        { id: 'ug_emperor', name: '天界統括神：UGカズキング', icon: '👑', hp: 4000 },
        { id: 'deus_ex', name: '混沌の調味主：デウス・エクス・マキナ', icon: '🤠', hp: 8000 }
    ];

    const STORAGE_KEY = 'zenSurvival_Final_v16';
    let gameData = { money: 0, owned: ["c20"], stats: { hpLv: 0, atkLv: 0, spdLv: 0 } };
    let myId = 'p_' + Math.random().toString(36).substr(2, 6);
    let selectedChar = null;
    let isPlaying = false;
    let players = {}, bullets = {};
    let myLocal = { x: 0, y: 0, hp: 100, maxHp: 100, icon: '👤', name: '', active: false, lastShot: 0, atk: 20, spd: 7 };
    let keys = {};
    
    let stickX = 0, stickY = 0;
    let isSticking = false;

    // --- エフェクト用変数 ---
    let particles = [];
    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y;
            this.vx = (Math.random() - 0.5) * 8;
            this.vy = (Math.random() - 0.5) * 8;
            this.life = 1.0;
            this.color = color;
            this.size = Math.random() * 4 + 2;
        }
        update() { this.x += this.vx; this.y += this.vy; this.life -= 0.04; }
        draw(ctx) {
            ctx.fillStyle = this.color;
            ctx.globalAlpha = this.life;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1.0;
        }
    }

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function init() {
        const d = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        gameData.money = d.money || 0;
        gameData.owned = d.owned || ["c20"];
        gameData.stats = d.stats || { hpLv: 0, atkLv: 0, spdLv: 0 };
        
        updateUI();

        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        characters.forEach(c => {
            const isOwned = gameData.owned.includes(c.id);
            const card = document.createElement('div');
            card.className = `card ${isOwned ? '' : 'locked'}`;
            card.innerHTML = `<div style="font-size:40px; margin-bottom:5px;">${isOwned ? c.icon : '🔒'}</div><div style="font-size:11px; font-weight:bold; height:24px; overflow:hidden;">${c.name}</div>`;
            if(isOwned) card.onclick = () => {
                selectedChar = c;
                document.querySelectorAll('.card').forEach(x => x.classList.remove('selected'));
                card.classList.add('selected');
                document.getElementById('upgrade-panel').style.display = 'block';
                document.getElementById('up-icon').innerText = c.icon;
                document.getElementById('up-name').innerText = c.name;
                updateUpgradeCosts();
            };
            grid.appendChild(card);
        });
    }

    // UI更新用
    function updateUI() {
        document.getElementById('money-val').innerText = gameData.money.toLocaleString();
    }

    // ステータス強化コスト計算
    function getCost(lv) {
        return Math.floor(100 * Math.pow(1.5, lv));
    }

    function updateUpgradeCosts() {
        document.getElementById('cost-hp').innerText = `💰${getCost(gameData.stats.hpLv)}`;
        document.getElementById('cost-atk').innerText = `💰${getCost(gameData.stats.atkLv)}`;
        document.getElementById('cost-spd').innerText = `💰${getCost(gameData.stats.spdLv)}`;
    }

    function upgrade(type) {
        let lvKey = type + 'Lv';
        let cost = getCost(gameData.stats[lvKey]);
        if(gameData.money >= cost) {
            gameData.money -= cost;
            gameData.stats[lvKey]++;
            saveData();
            updateUI();
            updateUpgradeCosts();
        } else {
            alert("Not enough money!");
        }
    }

    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(gameData));
    }

    function startGame() {
        if(!selectedChar) return;
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // ステータス計算 (基本値 + 強化値)
        myLocal.maxHp = selectedChar.hp + (gameData.stats.hpLv * 50);
        myLocal.hp = myLocal.maxHp;
        myLocal.atk = 20 + (gameData.stats.atkLv * 5);
        myLocal.spd = 7 + (gameData.stats.spdLv * 0.5);
        
        myLocal.x = canvas.width / 2;
        myLocal.y = canvas.height / 2;
        myLocal.icon = selectedChar.icon;
        myLocal.name = selectedChar.name;
        myLocal.active = true;
        isPlaying = true;
        document.getElementById('selector').style.display = 'none';
        document.getElementById('exit-btn').style.display = 'block';
        document.getElementById('mobile-controls').style.display = 'block';
        document.getElementById('joystick-container').style.display = 'block';
        
        // プレイヤーデータのセットと、通信切断時の自動削除設定
        playersRef.child(myId).set({ id: myId, x: myLocal.x, y: myLocal.y, icon: myLocal.icon, name: myLocal.name, hp: myLocal.hp, maxHp: myLocal.maxHp });
        playersRef.child(myId).onDisconnect().remove(); // ← 追加: 接続が切れたら自動でデータベースから削除
        
        requestAnimationFrame(loop);
    }

    const container = document.getElementById('joystick-container');
    const knob = document.getElementById('joystick-knob');
    container.addEventListener('touchstart', e => { isSticking = true; });
    window.addEventListener('touchmove', e => {
        if(!isSticking) return;
        const touch = e.touches[0];
        const rect = container.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        let dx = touch.clientX - centerX;
        let dy = touch.clientY - centerY;
        const dist = Math.min(60, Math.hypot(dx, dy));
        const angle = Math.atan2(dy, dx);
        stickX = (Math.cos(angle) * dist) / 60;
        stickY = (Math.sin(angle) * dist) / 60;
        knob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
    });
    window.addEventListener('touchend', () => {
        isSticking = false; stickX = 0; stickY = 0;
        knob.style.transform = `translate(0,0)`;
    });

    function shoot(tx = null, ty = null) {
        if(!isPlaying) return;
        const now = Date.now();
        if(now - myLocal.lastShot < 250) return;
        myLocal.lastShot = now;
        let vx = 0, vy = -15; 
        if(tx !== null && ty !== null) {
            const angle = Math.atan2(ty - myLocal.y, tx - myLocal.x);
            vx = Math.cos(angle) * 18;
            vy = Math.sin(angle) * 18;
        }
        const bid = 'b_' + myId + '_' + now;
        bulletsRef.child(bid).set({ x: myLocal.x, y: myLocal.y, vx: vx, vy: vy, owner: myId, damage: myLocal.atk });
    }

    window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code === 'Space' || e.code === 'Enter') shoot(); });
    window.addEventListener('keyup', e => keys[e.code] = false);
    canvas.addEventListener('mousedown', e => { if(isPlaying) shoot(e.clientX, e.clientY); });
    document.getElementById('atk-btn').addEventListener('touchstart', e => { e.preventDefault(); shoot(); });

    playersRef.on('value', s => { 
        players = s.val() || {}; 
        if(players[myId]) myLocal.hp = players[myId].hp; 
    });
    bulletsRef.on('value', s => { bullets = s.val() || {}; });

    function drawChar(x, y, icon, name, hp, maxHp, isMe) {
        ctx.save();
        ctx.shadowBlur = 20;
        ctx.shadowColor = isMe ? 'rgba(255,255,0,0.5)' : 'rgba(255,255,255,0.3)';
        ctx.font = 'bold 14px sans-serif';
        ctx.fillStyle = isMe ? '#ffd700' : 'white';
        ctx.textAlign = 'center';
        ctx.fillText(name, x, y - 80);
        ctx.font = '55px Arial';
        ctx.fillText(icon, x, y);
        const bw = 70;
        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        if(ctx.roundRect) { ctx.beginPath(); ctx.roundRect(x - bw/2, y - 70, bw, 8, 4); ctx.fill(); } else { ctx.fillRect(x - bw/2, y - 70, bw, 8); }
        const hpPercent = Math.max(0, hp)/maxHp;
        const barColor = hpPercent > 0.5 ? '#4caf50' : (hpPercent > 0.2 ? '#ff9800' : '#f44336');
        ctx.fillStyle = barColor;
        ctx.shadowBlur = 10;
        ctx.shadowColor = barColor;
        if(ctx.roundRect) { ctx.beginPath(); ctx.roundRect(x - bw/2, y - 70, bw * hpPercent, 8, 4); ctx.fill(); } else { ctx.fillRect(x - bw/2, y - 70, bw * hpPercent, 8); }
        ctx.restore();
    }

    function drawBackground() {
        ctx.fillStyle = '#2d5a27';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = 0.1;
        for(let i=0; i<canvas.width; i+=40) {
            for(let j=0; j<canvas.height; j+=40) {
                ctx.fillStyle = (i+j) % 80 === 0 ? '#1a3317' : '#3d7a35';
                ctx.fillRect(i, j, 40, 40);
            }
        }
        ctx.globalAlpha = 1.0;
        const grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.width*0.8);
        grad.addColorStop(0, 'rgba(0,0,0,0)');
        grad.addColorStop(1, 'rgba(0,0,0,0.4)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function loop() {
        if(!isPlaying) return;
        drawBackground();
        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => { p.update(); p.draw(ctx); });
        
        let mvx = stickX * myLocal.spd, mvy = stickY * myLocal.spd;
        if(keys['ArrowUp'] || keys['KeyW']) mvy = -myLocal.spd;
        if(keys['ArrowDown'] || keys['KeyS']) mvy = myLocal.spd;
        if(keys['ArrowLeft'] || keys['KeyA']) mvx = -myLocal.spd;
        if(keys['ArrowRight'] || keys['KeyD']) mvx = myLocal.spd;

        if(mvx !== 0 || mvy !== 0) {
            myLocal.x = Math.max(30, Math.min(canvas.width - 30, myLocal.x + mvx));
            myLocal.y = Math.max(30, Math.min(canvas.height - 30, myLocal.y + mvy));
            playersRef.child(myId).update({ x: myLocal.x, y: myLocal.y });
            if(Math.random() > 0.7) particles.push(new Particle(myLocal.x, myLocal.y + 10, 'rgba(255,255,255,0.3)'));
        }

        Object.keys(bullets).forEach(bid => {
            const b = bullets[bid];
            b.x += b.vx; b.y += b.vy;
            ctx.save();
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#fff700';
            ctx.fillStyle = '#fff700';
            ctx.beginPath(); ctx.arc(b.x, b.y, 7, 0, Math.PI*2); ctx.fill();
            if(Math.random() > 0.5) particles.push(new Particle(b.x, b.y, '#ffd700'));
            ctx.restore();

            if(b.owner === myId) {
                Object.keys(players).forEach(pid => {
                    // 死んでいるプレイヤーには当たり判定をなくす
                    if(pid !== myId && players[pid].hp > 0 && Math.hypot(b.x - players[pid].x, b.y - players[pid].y) < 35) {
                        const dmg = b.damage || 20;
                        playersRef.child(pid).transaction(current => { if(current) current.hp -= dmg; return current; });
                        bulletsRef.child(bid).remove();
                        for(let i=0; i<10; i++) particles.push(new Particle(b.x, b.y, '#ff4444'));
                    }
                });
            }
            if(b.x < -50 || b.x > canvas.width + 50 || b.y < -50 || b.y > canvas.height + 50) {
                if(b.owner === myId) bulletsRef.child(bid).remove();
            }
        });

        // 他のプレイヤーの描画
        Object.keys(players).forEach(id => {
            if(id === myId) return; 
            const p = players[id];
            if (p.hp <= 0) return; // ← 追加: HPが0以下のプレイヤーは画面に描画しない
            drawChar(p.x, p.y, p.icon, p.name, p.hp, p.maxHp, false);
        });

        // 自分の描画と死亡判定
        if(myLocal.active) drawChar(myLocal.x, myLocal.y, myLocal.icon, myLocal.name, myLocal.hp, myLocal.maxHp, true);
        
        if(myLocal.hp <= 0) { 
            playersRef.child(myId).remove(); // ← 追加: 自分が死んだら確実にデータベースから消す
            alert("COMBAT INCAPACITATED!"); 
            exitGame(); 
            return; 
        }
        
        requestAnimationFrame(loop);
    }

    function exitGame() {
        isPlaying = false; myLocal.active = false;
        playersRef.child(myId).remove(); // 明示的に退出した場合も削除
        document.getElementById('selector').style.display = 'flex';
        document.getElementById('exit-btn').style.display = 'none';
        document.getElementById('mobile-controls').style.display = 'none';
        document.getElementById('joystick-container').style.display = 'none';
        init(); // データを再読み込みして所持金などを同期
    }
    window.onload = init;
</script>
</body>
</html>
