<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>草抜きサバイバル - カズキングイベント開催中！ -</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root { --zen-red: #ff0033; --gold: #ffd700; --grass-light: #7cfc00; --grass-dark: #2d5a27; --blue: #00d2ff; --fever-pink: #ff00ff; --bonus-color: #00ffcc; --uz-color: #ff0000; --x-color: #ffffff; }
        body { 
            text-align: center; font-family: 'Arial Black', sans-serif; 
            background-color: #000; color: white; 
            margin: 0; overflow: hidden; touch-action: none; user-select: none;
        }

        .header { background: #111; padding: 10px; display: flex; justify-content: space-around; align-items: center; border-bottom: 2px solid #333; font-size: 14px; position: relative; }
        #fever-container { position: absolute; bottom: -5px; left: 0; width: 100%; height: 6px; background: #222; }
        #fever-fill { width: 0%; height: 100%; background: var(--fever-pink); transition: width 0.2s; box-shadow: 0 0 15px var(--fever-pink); }

        #game-field { 
            position: relative; width: 95vw; height: 55vh; 
            background: #1a2a1a; margin: 10px auto; 
            border: 3px solid #333; border-radius: 20px; overflow: hidden;
            transition: 0.3s;

        #game-field.bg-cyber { background: #000520; border-color: #00d2ff; }
        #game-field.bg-volcano { background: #2b0000; border-color: #ff4500; }
        #game-field.bg-night { background: #0a0a20; border-color: #483d8b; }
        #game-field.bg-sakura { background: #2d1a1a; border-color: #ffb7c5; box-shadow: inset 0 0 50px #ffb7c533; }
        #game-field.bg-gold { background: #3d3300; border-color: #ffd700; }
        #game-field.bg-space { background: radial-gradient(circle, #1a1a3a 0%, #000 100%); border-color: #fff; }
        #game-field.bg-deepsea { background: #00121a; border-color: #008b8b; }
        #game-field.bg-dimension { background: #1a001a; border-color: #9400d3; animation: dim-pulse 5s infinite alternate; }
        @keyframes dim-pulse { from { background: #1a001a; } to { background: #00001a; } }

        .skill-active-field { animation: skill-shake 0.05s infinite, skill-flash 0.2s infinite alternate !important; border-width: 8px !important; }
        .ultimate-field-bg { animation: ultimate-rainbow 0.2s infinite linear !important; }
        @keyframes ultimate-rainbow { 0% { background: #ff0000; } 20% { background: #ffff00; } 40% { background: #00ff00; } 60% { background: #00ffff; } 80% { background: #0000ff; } 100% { background: #ff00ff; } }
        @keyframes skill-shake { 0% { transform: translate(4px, 4px); } 50% { transform: translate(-4px, -4px); } 100% { transform: translate(4px, -4px); } }
        @keyframes skill-flash { from { box-shadow: inset 0 0 50px rgba(255,255,255,0.5); border-color: #fff; } to { box-shadow: inset 0 0 150px rgba(255,255,255,1); border-color: #ff00ff; } }
        .skill-icon-anim { animation: skill-icon-pop 0.3s infinite linear !important; z-index: 1000; }
        @keyframes skill-icon-pop { 0% { transform: scale(2) rotate(0deg); filter: brightness(3) drop-shadow(0 0 30px gold); } 100% { transform: scale(2) rotate(360deg); filter: brightness(3) drop-shadow(0 0 30px white); } }
        .ultimate-text { position: absolute; width: 100%; top: 40%; left: 0; text-align: center; font-size: 50px; color: white; font-weight: bold; z-index: 1001; pointer-events: none; text-shadow: 0 0 20px #000, 0 0 40px #ff0000; animation: text-zoom 0.5s ease-out forwards; }
        @keyframes text-zoom { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1.2); opacity: 1; } }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        #gacha-result-display { width: 85%; height: 140px; overflow-y: auto; background: #111; border: 1px solid #444; border-radius: 10px; margin: 10px 0; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
        .res-line { display: flex; justify-content: space-between; align-items: center; padding: 4px 10px; border-radius: 5px; background: #222; font-size: 12px; }
        .res-line.SSR { background: #443300; border: 1px solid var(--gold); color: var(--gold); animation: glow 1s infinite alternate; }
        .res-line.UZ { background: #300; border: 1px solid var(--uz-color); color: var(--uz-color); animation: uz-glow 0.5s infinite alternate; font-weight: bold; }
        .res-line.X { background: #000; border: 1px solid var(--x-color); color: var(--x-color); animation: x-glow 0.3s infinite alternate; font-weight: bold; }
        @keyframes glow { from { box-shadow: 0 0 2px var(--gold); } to { box-shadow: 0 0 10px var(--gold); } }
        @keyframes uz-glow { from { box-shadow: 0 0 5px var(--uz-color); } to { box-shadow: 0 0 20px var(--uz-color); } }
        @keyframes x-glow { from { box-shadow: 0 0 10px #fff, 0 0 20px #0ff; } to { box-shadow: 0 0 20px #fff, 0 0 40px #f0f; } }

        #gacha-box { font-size: 80px; filter: drop-shadow(0 0 20px white); cursor: pointer; position: relative; z-index: 600; transition: 0.3s; }
        .gacha-shake { animation: gacha-vibrate 0.1s infinite; }
        @keyframes gacha-vibrate { 0% { transform: translate(2px, 2px) rotate(0deg); } 25% { transform: translate(-2px, -2px) rotate(1deg); } 50% { transform: translate(2px, -2px) rotate(-1deg); } 75% { transform: translate(-2px, 2px) rotate(0deg); } 100% { transform: translate(2px, 2px) rotate(0deg); } }
        .gacha-flash { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 700; display: none; }

        .col-tabs { display: flex; width: 95%; gap: 5px; margin-bottom: 10px; }

        .col-list { width: 90%; height: 45%; overflow-y: auto; background: #1a1a1a; border-radius: 10px; padding: 10px; border: 1px solid #444; }
        .col-item { background: #222; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid transparent; }

        @keyframes x-border { 0% { border-left-color: #fff; } 50% { border-left-color: #0ff; } 100% { border-left-color: #f0f; } }
        .equip-btn { padding: 6px 12px; border-radius: 15px; border: none; font-size: 10px; font-weight: bold; cursor: pointer; }
        .equipped { background: var(--grass-light) !important; color: #000; }

        .bonus-info { background: #222; width: 90%; padding: 8px; border-radius: 10px; margin-bottom: 10px; font-size: 11px; color: var(--bonus-color); border: 1px solid #444; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; width: 85%; }
        .btn { padding: 12px; font-size: 14px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.1s; }
        .btn-start { background: var(--gold); color: #000; grid-column: span 2; font-size: 20px; box-shadow: 0 0 15px var(--gold); }
        .btn-gacha { background: #ff4500; color: white; }
        .btn-col { background: var(--blue); color: white; }
        .btn-evolve { background: #8a2be2; color: white; font-size: 12px; }
        .btn-fusion { background: linear-gradient(45deg, #ff00ff, #00ffff); color: white; font-size: 12px; text-shadow: 1px 1px 2px #000; }
        .btn-mission { background: #00cc66; color: white; grid-column: span 1; font-size: 12px; }
        .btn-profile { background: #555; color: white; grid-column: span 1; font-size: 12px; }
        .btn-online { background: #ff0033; color: white; grid-column: span 2; font-size: 14px; box-shadow: 0 0 10px #ff0033; }

        .pop-text { position: absolute; font-weight: bold; pointer-events: none; animation: pop-up-enhanced 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; z-index: 100; text-shadow: 2px 2px 0 black; font-size: 20px; }
        @keyframes pop-up-enhanced { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 50% { opacity: 1; transform: translateY(-40px) scale(1.4); } 100% { transform: translateY(-80px) scale(1.1); opacity: 0; } }

        .particle { position: absolute; width: 8px; height: 8px; background: var(--grass-light); pointer-events: none; z-index: 90; border-radius: 2px; }
        @keyframes scatter { to { transform: translate(var(--dx), var(--dy)) rotate(360deg); opacity: 0; } }

        .bottom-ui { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px; }
        #tsum-icon { width: 70px; height: 70px; border: 4px solid #444; border-radius: 50%; font-size: 35px; display: flex; align-items: center; justify-content: center; background: #222; transition: 0.2s; }
        .ready #tsum-icon { border-color: var(--zen-red); animation: pulse 0.4s infinite alternate; cursor: pointer; }
        #skill-bar { width: 140px; height: 18px; background: #222; border-radius: 10px; overflow: hidden; border: 2px solid #444; }
        #skill-fill { width: 0%; height: 100%; background: #f00; transition: 0.1s; }

        .item { position: absolute; z-index: 10; cursor: pointer; transition: transform 0.1s; }
        .plucking { animation: slice-anim 0.2s ease-out forwards; pointer-events: none; }
        @keyframes slice-anim { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.5); filter: brightness(2); } 100% { transform: scale(0); opacity: 0; } }

        .grass { width: 75px; height: 75px; }
        .grass::before, .grass::after { content: ''; position: absolute; width: 25px; height: 45px; background: var(--grass-dark); border-radius: 50% / 80% 80% 20% 20%; bottom: 5px; pointer-events: none; }
        .grass::before { transform: rotate(-35deg); left: 10px; }
        .grass::after { transform: rotate(35deg); right: 10px; }
        .grass-center { position: absolute; width: 30px; height: 60px; background: var(--grass-light); border-radius: 50% / 80% 80% 20% 20%; left: 50%; transform: translateX(-50%); bottom: 10px; pointer-events: none; }
        
        .egg { width: 70px; height: 70px; font-size: 50px; display: flex; align-items: center; justify-content: center; filter: drop-shadow(0 0 5px white); animation: egg-shake 0.5s ease-in-out infinite alternate; }
        @keyframes egg-shake { 0% { transform: rotate(-10deg) scale(0.9); } 100% { transform: rotate(10deg) scale(1.1); } }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }
        
        .x-aura { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 400; display: none; background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, rgba(0,255,255,0.1) 50%, rgba(255,0,255,0.1) 100%); animation: aura-spin 2s linear infinite; }
        @keyframes aura-spin { from { transform: rotate(0deg); filter: hue-rotate(0deg); } to { transform: rotate(360deg); filter: hue-rotate(360deg); } }

        #profile-info-display { font-size: 14px; color: #fff; margin-top: 5px; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 15px; display: inline-block; border: 1px solid #444; }
        #profile-info-display span { color: var(--gold); font-weight: bold; }

        .title-item { width: 85%; background: #222; border: 1px solid #444; border-radius: 8px; padding: 10px; margin: 5px 0; display: flex; justify-content: space-between; align-items: center; }
        .title-item.locked { opacity: 0.5; filter: grayscale(1); }
        .title-info { text-align: left; }
        .title-name { font-weight: bold; color: #fff; }
        .title-cond { font-size: 10px; color: #aaa; }

        .mission-item { background: #222; border: 1px solid #444; border-radius: 10px; margin: 8px 0; padding: 12px; width: 85%; display: flex; flex-direction: column; align-items: flex-start; gap: 5px; }
        .mission-progress { width: 100%; height: 10px; background: #333; border-radius: 5px; overflow: hidden; }
        .mission-fill { height: 100%; background: #00cc66; transition: 0.3s; }
        .mission-reward-btn { align-self: flex-end; padding: 5px 15px; border-radius: 15px; border: none; font-weight: bold; font-size: 12px; cursor: pointer; }
        .can-claim { background: var(--gold); color: #000; animation: pulse 0.5s infinite alternate; }
        .claimed { background: #444; color: #888; cursor: default; }

        /* プロフィール・オンライン用 */
        .profile-input-group { background: #222; padding: 15px; border-radius: 10px; width: 80%; margin-bottom: 10px; border: 1px solid #444; }
        .profile-input-group label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; text-align: left; }
        .profile-input-group input { width: 90%; background: #111; border: 1px solid #555; color: white; padding: 8px; border-radius: 5px; font-family: inherit; }
        #opponent-display { position: absolute; top: 10px; right: 10px; background: rgba(255,0,0,0.7); padding: 5px 10px; border-radius: 5px; font-size: 12px; z-index: 1000; display: none; }
    </style>
</head>

        </div>

        <div id="mission-screen" class="overlay" style="display:none;"><h2 style="color:#00cc66;">📅 デイリーミッション</h2><div id="mission-list" style="width: 100%; display: flex; flex-direction: column; align-items: center; overflow-y: auto; height: 60%;"></div><button class="btn" onclick="openLayer('start-screen')" style="background:#444; width:100px; margin-top:10px;">戻る</button></div>
        <div id="fusion-screen" class="overlay" style="display:none;"><h2 style="color:cyan;">🌀 キャラクター合体</h2><div id="fusion-result-preview" style="margin:15px; font-size:14px; color:var(--gold);"></div><button class="btn" id="fusion-exec-btn" onclick="executeFusion()" style="background:linear-gradient(45deg, #ff00ff, #00ffff); color:white; width:200px; display:none;">フュージョン！</button><button class="btn" onclick="openLayer('start-screen')" style="background:#444; width:100px; margin-top:10px;">戻る</button></div>
        <div id="evolve-screen" class="overlay" style="display:none;"><h2 style="color:#8a2be2;">🧬 キャラクター進化</h2><div id="evolve-status" style="background:#222; padding:20px; border-radius:15px; width:80%; margin-bottom:15px;"></div><button class="btn" id="evolve-exec-btn" onclick="executeEvolve()" style="background:#ffd700; color:#000; width:180px; margin-bottom:10px; display:none;">進化させる！</button><button class="btn" onclick="openLayer('start-screen')" style="background:#444; width:100px;">戻る</button></div>
        <div id="gacha-screen" class="overlay" style="display:none;"><div id="gacha-box">🎁</div><div id="gacha-result-display"></div><div id="gacha-msg">タップで箱を開けろ！</div><button class="btn btn-gacha" onclick="runGacha(1)">1回 (1,000円)</button><button class="btn" onclick="openLayer('start-screen')" style="margin-top:10px; background:#444; width:100px;">戻る</button></div>
        <div id="col-screen" class="overlay" style="display:none;"><h2>COLLECTION</h2><div class="col-list" id="col-list-content"></div><button class="btn" onclick="openLayer('start-screen')" style="margin-top:10px; background:#444; width:100px;">戻る</button></div>

        <div id="tsum-icon" onclick="triggerSkill()">👤</div>
        <div>
            <div id="skill-bar"><div id="skill-fill"></div></div>
            <div id="skill-display-name" style="font-size:10px; color:#aaa;">huh</div>
        </div>
    </div>

    <script>
        // --- Firebase 設定 ---
        const firebaseConfig = {
            apiKey: "AIzaSyDSTydg6zf1Gf_PLW9crZ_QpQVQDtjcRu0",
            authDomain: "game-685f2.firebaseapp.com",
            databaseURL: "https://game-685f2-default-rtdb.firebaseio.com",
            projectId: "game-685f2",
            storageBucket: "game-685f2.firebasestorage.app",
            messagingSenderId: "266871071111",
            appId: "1:266871071111:web:ffff3b65d0234fc5abb322"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let money = 2000, timeLeft = 30.0, isPlaying = false, skillCount = 0;
        let feverPoints = 0, isFever = false, isSkillActive = false;
        let missions = [], missionStats = { plucked: 0, gachaed: 0, earned: 0 }, lastMissionDate = "";
        
        let userName = "ぜん";
        let currentTitle = "なし";
        let isOnline = false, gameId = null, mySide = null, opponentScore = 0;

        // タイトル定義などは既存コードと同じ（省略・保持）
        const titles = [{ name: "草抜き初心者", cond: "所持金が1,000円を超える", check: () => money > 1000 },{ name: "伝説の草抜き師", cond: "所持金が1兆円を超える", check: () => money > 1000000000000 }];
        const items = [
            { id: 'fusion_zen_kazu', type: 'char', name: 'アルティメット・カズキング・ZEN', icon: '☯️', owned: false, rarity: 'X', info: '合体：金100倍/卵抜き/huh卵消去/必殺即チャージ', rate: 100, isEvolved: true },
            { id: 'c1', type: 'char', name: '覚醒ぜん', icon: '🔥', owned: false, rarity: 'SSR', info: '金10倍/卵無効', rate: 10 },
            { id: 'c20', type: 'char', name: '普通のぜん', icon: '👤', owned: true, rarity: 'BASIC', info: '金1.2倍', rate: 1.2 },
            { id: 'b1', type: 'bg', name: '草原', className: '', owned: true, rarity: 'BASIC', info: '標準' },
            { id: 's1', type: 'skill', name: 'huh', owned: true, rarity: 'BASIC', info: '3秒間自動抜き' },
            { id: 'bgm1', type: 'bgm', name: 'なし', url: '', icon: '🔇', owned: true, rarity: 'BASIC', info: '無音' }
        ];
        let equipped = { char: items.find(i => i.id === 'c20'), bg: items.find(i => i.id === 'b1'), skill: items.find(i => i.id === 's1'), bgm: items.find(i => i.id === 'bgm1') };

        // --- オンライン対戦ロジック ---
        function startMatching() {
            isOnline = true;
            openLayer('matching-screen');
            const matchRef = db.ref('matching');
            matchRef.once('value', snapshot => {
                const waiting = snapshot.val();
                if (waiting) {
                    gameId = waiting.gameId;
                    mySide = 'p2';
                    matchRef.remove();
                    db.ref('games/' + gameId).update({ p2: { name: userName, score: 0, ready: true } });
                } else {
                    gameId = Date.now().toString();
                    mySide = 'p1';
                    matchRef.set({ gameId: gameId });
                    db.ref('games/' + gameId).set({ p1: { name: userName, score: 0, ready: true } });
                }
                listenToGame();
            });
        }

        function listenToGame() {
            db.ref('games/' + gameId).on('value', snapshot => {
                const data = snapshot.val();
                if (data && data.p1 && data.p2) {
                    const oppSide = mySide === 'p1' ? 'p2' : 'p1';
                    opponentScore = data[oppSide].score;
                    document.getElementById('opp-name').innerText = data[oppSide].name;
                    document.getElementById('opp-score').innerText = opponentScore.toLocaleString();
                    if (!isPlaying) startGame();
                }
            });
        }

        function cancelMatching() {
            db.ref('matching').remove();
            isOnline = false;
            openLayer('start-screen');
        }

        // --- 基本ゲーム機能（変更なし・同期追加） ---
        function updateUI() {
            document.getElementById('m-val').innerText = Math.floor(money).toLocaleString();
            document.getElementById('t-val').innerText = Math.max(0, timeLeft).toFixed(1);
            document.getElementById('u-name-display').innerText = userName;
            document.getElementById('u-title-display').innerText = currentTitle;
            if(isOnline && gameId) {
                document.getElementById('opponent-display').style.display = 'block';
                db.ref(`games/${gameId}/${mySide}`).update({ score: money });
            }
        }

        function startGame() {
            isPlaying = true; timeLeft = 30.0;
            openLayer('none');
            document.querySelectorAll('.item').forEach(i=>i.remove());
            spawn();
            const loop = setInterval(() => {
                timeLeft -= 0.1; updateUI();
                if(timeLeft <= 0 || !isPlaying) {
                    clearInterval(loop);
                    if(timeLeft <= 0) {
                        let resultMsg = "タイムアップ！";
                        if(isOnline) {
                            if(money > opponentScore) resultMsg = "あなたの勝利！";
                            else if(money < opponentScore) resultMsg = "敗北...";
                            else resultMsg = "引き分け！";
                            db.ref('games/' + gameId).remove();
                        }
                        endGame(resultMsg);
                    }
                }
            }, 100);
        }

        // --- その他関数 (既存を継承) ---
        function updateName(val) { userName = val || "ぜん"; saveGame(); updateUI(); }
        function openLayer(id) {
            document.querySelectorAll('.overlay').forEach(l => l.style.display = 'none');
            if(id !== 'none') document.getElementById(id).style.display = 'flex';
        }
        function pluck(el) {
            if(el.classList.contains('plucking')) return;
            money += Math.floor(100 * equipped.char.rate);
            el.classList.add('plucking');
            setTimeout(() => el.remove(), 200);
            updateUI();
        }
        function spawn() {
            const field = document.getElementById('game-field');
            for(let i=0; i<5; i++) {
                const g = document.createElement('div'); g.className = 'item grass'; g.style.left = Math.random()*85+"%"; g.style.top = Math.random()*80+"%";
                g.onclick = function(){ pluck(this); }; field.appendChild(g);
            }
        }
        function endGame(msg) { isPlaying = false; isOnline = false; document.getElementById('end-msg').innerText = msg; document.getElementById('res-money').innerText = money.toLocaleString(); openLayer('end-screen'); saveGame(); }
        function saveGame() { localStorage.setItem('zenSurvival_Final_v14', JSON.stringify({ money, userName, currentTitle })); }
        function loadGame() {
            const data = JSON.parse(localStorage.getItem('zenSurvival_Final_v14'));
            if(data) { money = data.money; userName = data.userName || "ぜん"; currentTitle = data.currentTitle || "なし"; }
            updateUI(); openLayer('start-screen');
        }
    </script>
</body>
</html>
