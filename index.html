<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>草抜きサバイバル - カズキングイベント開催中！ -</title>
    <style>
        :root { --zen-red: #ff0033; --gold: #ffd700; --grass-light: #7cfc00; --grass-dark: #2d5a27; --blue: #00d2ff; --fever-pink: #ff00ff; --bonus-color: #00ffcc; --uz-color: #ff0000; --x-color: #ffffff; }
        body { 
            text-align: center; font-family: 'Arial Black', sans-serif; 
            background-color: #000; color: white; 
            margin: 0; overflow: hidden; touch-action: none; user-select: none;
        }

        .header { background: #111; padding: 10px; display: flex; justify-content: space-around; align-items: center; border-bottom: 2px solid #333; font-size: 14px; position: relative; }
        #fever-container { position: absolute; bottom: -5px; left: 0; width: 100%; height: 6px; background: #222; }
        #fever-fill { width: 0%; height: 100%; background: var(--fever-pink); transition: width 0.2s; box-shadow: 0 0 15px var(--fever-pink); }

        #game-field { 
            position: relative; width: 95vw; height: 55vh; 
            background: #1a2a1a; margin: 10px auto; 
            border: 3px solid #333; border-radius: 20px; overflow: hidden;
            transition: 0.3s;
        }
        #game-field.bg-desert { background: #4d3319; border-color: #d2b48c; }
        #game-field.bg-cyber { background: #000520; border-color: #00d2ff; }
        #game-field.bg-volcano { background: #2b0000; border-color: #ff4500; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        #gacha-result-display {
            width: 85%; height: 140px; overflow-y: auto;
            background: #111; border: 1px solid #444; border-radius: 10px;
            margin: 10px 0; padding: 8px; display: flex; flex-direction: column; gap: 4px;
        }
        .res-line {
            display: flex; justify-content: space-between; align-items: center;
            padding: 4px 10px; border-radius: 5px; background: #222; font-size: 12px;
        }
        .res-line.SSR { background: #443300; border: 1px solid var(--gold); color: var(--gold); animation: glow 1s infinite alternate; }
        .res-line.UZ { background: #300; border: 1px solid var(--uz-color); color: var(--uz-color); animation: uz-glow 0.5s infinite alternate; font-weight: bold; }
        .res-line.X { background: #000; border: 1px solid var(--x-color); color: var(--x-color); animation: x-glow 0.3s infinite alternate; font-weight: bold; }
        .res-line.SR { color: #ff00ff; }
        @keyframes glow { from { box-shadow: 0 0 2px var(--gold); } to { box-shadow: 0 0 10px var(--gold); } }
        @keyframes uz-glow { from { box-shadow: 0 0 5px var(--uz-color); } to { box-shadow: 0 0 20px var(--uz-color); } }
        @keyframes x-glow { from { box-shadow: 0 0 10px #fff, 0 0 20px #0ff; } to { box-shadow: 0 0 20px #fff, 0 0 40px #f0f; } }

        .col-tabs { display: flex; width: 95%; gap: 5px; margin-bottom: 10px; }
        .tab-btn { flex: 1; padding: 10px 5px; font-size: 11px; background: #333; color: white; border: none; border-radius: 5px; }
        .tab-btn.active { background: var(--blue); }
        .col-list { width: 90%; height: 50%; overflow-y: auto; background: #1a1a1a; border-radius: 10px; padding: 10px; border: 1px solid #444; }
        .col-item { background: #222; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid transparent; }
        .col-item.owned { border-left-color: var(--gold); }
        .col-item.UZ { border-left-color: var(--uz-color); }
        .col-item.X { border-left-color: var(--x-color); animation: x-border 0.5s infinite; }
        @keyframes x-border { 0% { border-left-color: #fff; } 50% { border-left-color: #0ff; } 100% { border-left-color: #f0f; } }
        .equip-btn { padding: 6px 12px; border-radius: 15px; border: none; font-size: 10px; font-weight: bold; cursor: pointer; }
        .equipped { background: var(--grass-light) !important; color: #000; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; width: 85%; }
        .btn { padding: 12px; font-size: 14px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.1s; }
        .btn-start { background: var(--gold); color: #000; grid-column: span 2; font-size: 20px; box-shadow: 0 0 15px var(--gold); }
        .btn-gacha { background: #ff4500; color: white; }
        .btn-col { background: var(--blue); color: white; }
        .btn-evolve { background: #8a2be2; color: white; grid-column: span 1; font-size: 12px; }
        .btn-fusion { background: linear-gradient(45deg, #ff00ff, #00ffff); color: white; grid-column: span 1; font-size: 12px; text-shadow: 1px 1px 2px #000; }

        .pop-text { position: absolute; font-weight: bold; pointer-events: none; animation: pop-up-enhanced 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; z-index: 100; text-shadow: 2px 2px 0 black; font-size: 20px; }
        @keyframes pop-up-enhanced { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 50% { opacity: 1; transform: translateY(-40px) scale(1.4); } 100% { transform: translateY(-80px) scale(1.1); opacity: 0; } }

        .particle { position: absolute; width: 8px; height: 8px; background: var(--grass-light); pointer-events: none; z-index: 90; border-radius: 2px; }
        @keyframes scatter { to { transform: translate(var(--dx), var(--dy)) rotate(360deg); opacity: 0; } }

        .bottom-ui { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px; }
        #tsum-icon { width: 70px; height: 70px; border: 4px solid #444; border-radius: 50%; font-size: 35px; display: flex; align-items: center; justify-content: center; background: #222; transition: 0.2s; }
        .ready #tsum-icon { border-color: var(--zen-red); animation: pulse 0.4s infinite alternate; cursor: pointer; }
        #skill-bar { width: 140px; height: 18px; background: #222; border-radius: 10px; overflow: hidden; border: 2px solid #444; }
        #skill-fill { width: 0%; height: 100%; background: #f00; transition: 0.1s; }

        .item { position: absolute; z-index: 10; cursor: pointer; transition: transform 0.1s; }
        .plucking { animation: pluck-anim 0.2s ease-out forwards; pointer-events: none; }
        @keyframes pluck-anim { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.5); filter: brightness(2); } 100% { transform: scale(0); opacity: 0; } }

        .grass { width: 75px; height: 75px; }
        .grass::before, .grass::after { content: ''; position: absolute; width: 25px; height: 45px; background: var(--grass-dark); border-radius: 50% / 80% 80% 20% 20%; bottom: 5px; pointer-events: none; }
        .grass::before { transform: rotate(-35deg); left: 10px; }
        .grass::after { transform: rotate(35deg); right: 10px; }
        .grass-center { position: absolute; width: 30px; height: 60px; background: var(--grass-light); border-radius: 50% / 80% 80% 20% 20%; left: 50%; transform: translateX(-50%); bottom: 10px; pointer-events: none; }
        
        .egg { 
            width: 70px; height: 70px; font-size: 50px; 
            display: flex; align-items: center; justify-content: center; 
            filter: drop-shadow(0 0 5px white); 
            animation: egg-shake 0.5s ease-in-out infinite alternate;
        }
        @keyframes egg-shake {
            0% { transform: rotate(-10deg) scale(0.9); }
            100% { transform: rotate(10deg) scale(1.1); }
        }

        .gacha-anim { animation: shake 0.1s infinite; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px) rotate(-5deg); } 75% { transform: translateX(5px) rotate(5deg); } }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }
        
        .x-aura { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 400; display: none; background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, rgba(0,255,255,0.1) 50%, rgba(255,0,255,0.1) 100%); animation: aura-spin 2s linear infinite; }
        @keyframes aura-spin { from { transform: rotate(0deg); filter: hue-rotate(0deg); } to { transform: rotate(360deg); filter: hue-rotate(360deg); } }
    </style>
</head>
<body onload="loadGame()">

            { id: 'b4', type: 'bg', name: '火山', className: 'bg-volcano', owned: false, rarity: 'SSR', info: '灼熱の地' },
            { id: 's1', type: 'skill', name: 'huh', owned: true, rarity: 'BASIC', info: '3秒間自動抜き' },
            { id: 's2', type: 'skill', name: 'ﾌｨｰﾊﾞｰ', owned: false, rarity: 'SSR', info: '強制フィーバー' },
            { id: 's3', type: 'skill', name: '吸引', owned: false, rarity: 'SR', info: '画面の草を一括回収' },
            { id: 's4', type: 'skill', name: '停止', owned: false, rarity: 'SSR', info: '5秒間時間停止' },
            { id: 's5', type: 'skill', name: '爆発', owned: false, rarity: 'R', info: '卵を全て除去' },
            { id: 'bgm1', type: 'bgm', name: 'なし', url: '', icon: '🔇', owned: true, rarity: 'BASIC', info: '無音' },
            { id: 'bgm2', type: 'bgm', name: '楽しい日常', url: 'https://standard-themes.com/wp-content/uploads/2021/04/music_sample.mp3', icon: '🎶', owned: false, rarity: 'R', info: '明るい曲' }
        ];

        let equipped = { char: items.find(i => i.id === 'c20'), bg: items.find(i => i.id === 'b1'), skill: items.find(i => i.id === 's1'), bgm: items.find(i => i.id === 'bgm1') };

        function isKazuEvent() { return true; }

        function updateUI() {
            document.getElementById('m-val').innerText = Math.floor(money).toLocaleString();
            document.getElementById('t-val').innerText = Math.max(0, timeLeft).toFixed(1);
            document.getElementById('fever-fill').style.width = feverPoints + "%";
            document.getElementById('skill-fill').style.width = skillCount + "%";
            document.querySelector('.bottom-ui').classList.toggle('ready', skillCount >= 100);
        }

        function openLayer(id) {
            document.querySelectorAll('.overlay').forEach(l => l.style.display = 'none');
            if(id !== 'none') document.getElementById(id).style.display = 'flex';
            if(id === 'col-screen') renderCol();
            if(id === 'evolve-screen') renderEvolve();
            if(id === 'fusion-screen') renderFusion();
            if(id === 'start-screen') {
                document.getElementById('passive-info').innerText = `${equipped.char.name}: ${equipped.char.info}`;
                document.getElementById('tsum-icon').innerText = equipped.char.icon;
                document.getElementById('skill-display-name').innerText = equipped.skill.name;
                if(isKazuEvent()){
                    const t = document.getElementById('game-title');
                    t.innerText = "👑 カズキングイベント 👑";
                    t.style.color = "gold";
                    t.style.textShadow = "0 0 10px gold";
                }
            }
        }

        function renderFusion() {
            const char1 = items.find(i => i.id === 'ev_kazu_ultimate');
            const char2 = items.find(i => i.id === 'c1_ultimate');
            const cost = 1000000000000;
            const cond1 = document.getElementById('fuse-cond-1');
            const cond2 = document.getElementById('fuse-cond-2');
            const cond3 = document.getElementById('fuse-cond-3');
            const btn = document.getElementById('fusion-exec-btn');
            cond1.style.color = (char1 && char1.owned) ? "lime" : "red";
            cond2.style.color = (char2 && char2.owned) ? "lime" : "red";
            cond3.style.color = money >= cost ? "lime" : "red";
            if(char1 && char1.owned && char2 && char2.owned && money >= cost) {
                btn.style.display = "block";
                document.getElementById('fusion-result-preview').innerHTML = `${char1.icon} + ${char2.icon} = <span style="font-size:24px; color:white; text-shadow:0 0 10px white; animation:x-glow 0.3s infinite alternate;">☯️究極合体(X)</span>`;
            } else {
                btn.style.display = "none";
                document.getElementById('fusion-result-preview').innerHTML = "??? + ??? = 合体不可";
            }
        }

        function executeFusion() {
            const cost = 1000000000000;
            if(money < cost) return;
            money -= cost;
            const res = items.find(i => i.id === 'fusion_zen_kazu');
            res.owned = true;
            equipped.char = res;
            alert("合体完了！究極の力「X」を手に入れた！");
            openLayer('start-screen');
            saveGame(); updateUI();
        }

        function renderEvolve() {
            const target = document.getElementById('evolve-target');
            const req = document.getElementById('evolve-req');
            const btn = document.getElementById('evolve-exec-btn');
            const evolveCost = 100000000;
            if(equipped.char.rarity === 'SSR' && !equipped.char.isEvolved) {
                target.innerText = `進化可能：${equipped.char.name}`;
                req.innerText = `必要経費: ${evolveCost.toLocaleString()}円\n(究極のUZランクへ進化します)`;
                btn.style.display = "block";
                btn.disabled = money < evolveCost;
            } else if(equipped.char.isEvolved) {
                target.innerText = "これ以上の進化は不能";
                req.innerText = "最高ランク 到達済み";
                btn.style.display = "none";
            } else {
                target.innerText = "このキャラは進化できません";
                req.innerText = "「SSRキャラ」を装備してください";
                btn.style.display = "none";
            }
        }

        function executeEvolve() {
            const evolveCost = 100000000;
            if(money < evolveCost) return;
            money -= evolveCost;
            let evolveId = '';
            switch(equipped.char.id) {
                case 'ev_kazu': evolveId = 'ev_kazu_ultimate'; break;
                case 'c1': evolveId = 'c1_ultimate'; break;
                case 'c13': evolveId = 'c13_ultimate'; break;
                case 'c7': evolveId = 'c7_ultimate'; break;
                case 'c2': evolveId = 'c2_ultimate'; break;
            }
            if(evolveId) {
                const ult = items.find(i => i.id === evolveId);
                ult.owned = true;
                equipped.char = ult;
                alert(`進化成功！UZランク「${ult.name}」になりました！`);
            }
            openLayer('start-screen');
            saveGame(); updateUI();
        }

        function setTab(tab) { currentTab = tab; renderCol(); }

        function renderCol() {
            const list = document.getElementById('col-list-content');
            list.innerHTML = '';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 'tab-' + currentTab));
            const filtered = items.filter(i => i.type === currentTab).sort((a, b) => {
                const getWeight = (r) => {
                    if (r === 'X') return 4;
                    if (r === 'UZ') return 3;
                    if (r === 'SSR') return 2;
                    return 1;
                };
                return getWeight(b.rarity) - getWeight(a.rarity);
            });
            filtered.forEach(item => {
                const isEq = equipped[item.type].id === item.id;
                const div = document.createElement('div');
                div.className = `col-item ${item.owned ? 'owned' : ''} ${item.rarity}`;
                div.innerHTML = `<div>${item.owned ? item.icon || '' : '？'} ${item.owned ? item.name : '？？？'}<br><small style="color:${item.rarity==='UZ'?'red':(item.rarity==='X'?'#0ff':'inherit')}">${item.rarity}</small></div>
                    <button class="equip-btn ${isEq ? 'equipped' : ''}" onclick="equip('${item.id}')" ${item.owned ? '' : 'disabled'}>${isEq ? '選択中' : '選択'}</button>`;
                list.appendChild(div);
            });
        }

        function equip(id) {
            const item = items.find(i => i.id === id);
            equipped[item.type] = item;
            if(item.type === 'bg') document.getElementById('game-field').className = item.className;
            if(item.type === 'bgm') updateBGM();
            renderCol(); saveGame();
        }

        function updateBGM() {
            const player = document.getElementById('bgm-player');
            if(equipped.bgm && equipped.bgm.url) {
                player.src = equipped.bgm.url;
                player.load();
                if(isPlaying) player.play().catch(e => console.log("BGM Play Error"));
            } else { player.pause(); player.src = ""; }
        }

        async function runGacha(times) {
            const cost = 1000 * times;
            if(money < cost) return alert("お金が足りません！");
            const btns = ['g1-btn', 'g10-btn', 'g100-btn', 'g1000-btn', 'g-back-btn'].map(id => document.getElementById(id));
            btns.forEach(b => { if(b) b.disabled = true; });
            money -= cost; updateUI();
            const display = document.getElementById('gacha-result-display');
            display.innerHTML = ''; 
            const box = document.getElementById('gacha-box');
            const cutin = document.getElementById('gacha-cutin');
            const screen = document.getElementById('gacha-screen');
            let results = [], maxRarity = 'BASIC';
            const isEv = isKazuEvent();
            for(let i=0; i<times; i++) {
                const r = Math.random() * 100;
                let pick;
                if(r < 5) { 
                    let ssrPool = items.filter(it => it.rarity === 'SSR' && (!it.isEvent || isEv) && !it.isEvolved);
                    pick = ssrPool[Math.floor(Math.random()*ssrPool.length)];
                    maxRarity = 'SSR'; 
                }
                else if(r < 20) { pick = items.filter(it => it.rarity === 'SR')[Math.floor(Math.random()*items.filter(it => it.rarity === 'SR').length)]; if(maxRarity!=='SSR') maxRarity='SR'; }
                else if(r < 50) { pick = items.filter(it => it.rarity === 'R')[Math.floor(Math.random()*items.filter(it => it.rarity === 'R').length)]; if(maxRarity==='BASIC') maxRarity='R'; }
                else pick = items.filter(it => it.rarity === 'BASIC')[Math.floor(Math.random()*items.filter(it => it.rarity === 'BASIC').length)];
                results.push(pick);
            }
            box.classList.add('gacha-anim');
            await new Promise(r => setTimeout(r, 800));
            box.classList.remove('gacha-anim');
            cutin.style.display = 'flex';
            cutin.innerText = maxRarity === 'SSR' ? '🌈SSR!!' : (maxRarity === 'SR' ? '✨SR!' : '🎁');
            cutin.style.color = maxRarity === 'SSR' ? 'gold' : (maxRarity === 'SR' ? '#ff00ff' : 'white');
            cutin.classList.add('cutin-anim');
            screen.style.background = maxRarity === 'SSR' ? 'rgba(50,40,0,0.95)' : 'rgba(0,0,0,0.95)';
            await new Promise(r => setTimeout(r, 800));
            cutin.style.display = 'none';
            results.forEach(pick => {
                if(pick) {
                    pick.owned = true;
                    const line = document.createElement('div');
                    line.className = `res-line ${pick.rarity}`;
                    line.innerHTML = `<span>${pick.icon || ''} ${pick.name}</span> <span>[${pick.rarity}]</span>`;
                    display.appendChild(line);
                }
            });
            display.scrollTop = display.scrollHeight;
            btns.forEach(b => { if(b) b.disabled = false; });
            saveGame(); updateUI();
        }

        function spawn() {
            if(!isPlaying) return;
            const field = document.getElementById('game-field');
            const isEv = isKazuEvent();
            for(let i=0; i<9; i++) {
                const g = document.createElement('div');
                g.className = 'item grass';
                g.style.left = Math.random() * 85 + "%";
                g.style.top = Math.random() * 80 + "%";
                if(isEv) g.style.filter = "sepia(1) saturate(10) brightness(1.2) drop-shadow(0 0 5px gold)";
                g.innerHTML = '<div class="grass-center"></div>';
                g.onclick = function() { this.onclick = null; pluck(this, 50); };
                field.appendChild(g);
            }
            const egg = document.createElement('div');
            egg.className = 'item egg';
            egg.innerText = '🥚';
            let posX = Math.random() * 80, posY = Math.random() * 75, velX = (Math.random() - 0.5) * 2.5, velY = (Math.random() - 0.5) * 2.5;
            egg.style.left = posX + "%"; egg.style.top = posY + "%";
            const moveEgg = setInterval(() => {
                if (!isPlaying || !egg.parentNode) { clearInterval(moveEgg); return; }
                posX += velX; posY += velY;
                if (posX <= 0 || posX >= 85) velX *= -1;
                if (posY <= 0 || posY >= 80) velY *= -1;
                egg.style.left = posX + "%"; egg.style.top = posY + "%";
            }, 30);
            egg.onclick = () => {
                if(equipped.char.rarity === 'SSR' || equipped.char.rarity === 'UZ' || equipped.char.rarity === 'X') {
                    let eggBonus = (equipped.char.id === 'ev_kazu' || equipped.char.isEvolved || equipped.char.rarity === 'X') ? 1000 : 0;
                    if(equipped.char.id === 'c13_ultimate') eggBonus = 1000;
                    if(eggBonus > 0) { money += eggBonus; updateUI(); popText(egg.style.left, egg.style.top, `+${eggBonus} (EGG!)`, "white"); }
                    else popText(egg.style.left, egg.style.top, "GUARD!");
                    clearInterval(moveEgg); egg.remove();
                } else if(equipped.char.id === 'c13') {
                    money += 100; popText(egg.style.left, egg.style.top, "+100");
                    clearInterval(moveEgg); egg.remove(); updateUI();
                } else { clearInterval(moveEgg); endGame("卵を抜いてしまった！"); }
            };
            field.appendChild(egg);
        }

        function pluck(el, base) {
            if(el.classList.contains('plucking')) return;
            const isEv = isKazuEvent();
            let gain = Math.floor((isEv ? 100 : 50) * equipped.char.rate * (isFever ? 3 : 1));
            if(equipped.char.id === 'ev_kazu' || equipped.char.isEvolved || equipped.char.rarity === 'X') gain *= 3;
            money += gain; feverPoints = Math.min(100, feverPoints + 7);
            if(feverPoints >= 100 && !isFever) startFever();
            createParticles(el.style.left, el.style.top);
            popText(el.style.left, el.style.top, `+${gain}`);
            el.classList.add('plucking');
            setTimeout(() => {
                el.remove();
                if(document.querySelectorAll('.grass:not(.plucking)').length === 0) {
                    timeLeft += (equipped.char.id === 'ev_kazu' || equipped.char.isEvolved || equipped.char.rarity === 'X') ? 8.0 : 5.0;
                    spawn();
                }
            }, 200);
            updateUI();
        }

        function triggerSkill() {
            if(skillCount < 100 || isSkillActive) return;
            skillCount = 0; isSkillActive = true;
            const sid = equipped.skill.id;
            const isUZ = equipped.char.rarity === 'UZ' || equipped.char.rarity === 'X' || equipped.char.id === 'ev_kazu';
            const isX = equipped.char.rarity === 'X';
            if(sid === 's1') {
                const skillNameEl = document.getElementById('skill-display-name');
                if(isUZ) { skillNameEl.innerText = equipped.char.name; skillNameEl.style.color = isX ? "cyan" : "red"; }
                const intervalTime = isX ? 20 : (isUZ ? 70 : 150);
                const interval = setInterval(() => {
                    const targets = document.querySelectorAll('.grass:not(.plucking)');
                    if(targets.length > 0) pluck(targets[0], 50);
                    if(equipped.char.id === 'fusion_zen_kazu') { 
                        document.querySelectorAll('.egg').forEach(e => { popText(e.style.left, e.style.top, "ERASE!"); e.remove(); }); 
                    }
                }, intervalTime);
                setTimeout(() => { isSkillActive = false; clearInterval(interval); skillNameEl.innerText = equipped.skill.name; skillNameEl.style.color = "#aaa"; }, 3000);
            } else if(sid === 's2') { startFever(); isSkillActive = false; }
            else if(sid === 's3') { document.querySelectorAll('.grass:not(.plucking)').forEach(g => pluck(g, 50)); isSkillActive = false; }
            else if(sid === 's4') {
                document.getElementById('game-field').style.filter = "grayscale(1)";
                const timerBackup = timeLeft;
                const stop = setInterval(() => { timeLeft = timerBackup; updateUI(); }, 10);
                setTimeout(() => { clearInterval(stop); document.getElementById('game-field').style.filter = "none"; isSkillActive = false; }, 5000);
            } else if(sid === 's5') { document.querySelectorAll('.egg').forEach(e => e.remove()); isSkillActive = false; }
        }

        function createParticles(x, y) {
            const field = document.getElementById('game-field');
            const count = (equipped.char.rarity === 'X') ? 15 : 6;
            for(let i=0; i<count; i++) {
                const p = document.createElement('div');
                p.className = 'particle'; p.style.left = x; p.style.top = y;
                if(equipped.char.rarity === 'X') p.style.background = `hsl(${Math.random()*360}, 100%, 70%)`;
                p.style.setProperty('--dx', (Math.random()-0.5)*250+"px");
                p.style.setProperty('--dy', (Math.random()-0.5)*250+"px");
                p.style.animation = "scatter 0.4s ease-out forwards";
                field.appendChild(p);
                setTimeout(() => p.remove(), 400);
            }
        }

        function popText(x, y, txt, color="var(--gold)") {
            const p = document.createElement('div');
            p.className = 'pop-text'; p.innerText = txt; p.style.left = x; p.style.top = y; p.style.color = color;
            if(equipped.char.rarity === 'X') p.style.fontSize = "30px";
            document.getElementById('game-field').appendChild(p);
            setTimeout(() => p.remove(), 500);
        }

        function startFever() {
            isFever = true; document.getElementById('game-field').style.filter = "hue-rotate(180deg) brightness(1.2)";
            setTimeout(() => { isFever = false; feverPoints = 0; document.getElementById('game-field').style.filter = "none"; }, 6000);
        }

        function startGame() {
            isPlaying = true; timeLeft = 30.0; skillCount = feverPoints = 0; openLayer('none');
            document.querySelectorAll('.item').forEach(i => i.remove());
            if(equipped.bgm && equipped.bgm.url) document.getElementById('bgm-player').play().catch(e=>0);
            if(equipped.char.rarity === 'X') document.getElementById('x-aura-effect').style.display = 'block';
            else document.getElementById('x-aura-effect').style.display = 'none';
            spawn();
            const mainLoop = setInterval(() => {
                if(!isFever) timeLeft -= 0.1;
                if(!isSkillActive) {
                    let chargeSpeed = 0.33;
                    if(equipped.char.rarity === 'X') chargeSpeed = 100;
                    else if(equipped.char.id === 'ev_kazu' || equipped.char.isEvolved) chargeSpeed = 1.66;
                    skillCount = Math.min(100, skillCount + chargeSpeed);
                }
                updateUI();
                if(timeLeft <= 0 || !isPlaying) { 
                    clearInterval(mainLoop); 
                    document.getElementById('x-aura-effect').style.display = 'none';
                    if(timeLeft <= 0) endGame("タイムアップ！"); 
                }
            }, 100);
        }

        function endGame(msg) { isPlaying = false; document.getElementById('bgm-player').pause(); document.getElementById('end-title').innerText = msg; document.getElementById('res-money').innerText = Math.floor(money).toLocaleString(); openLayer('end-screen'); saveGame(); }
        function giveUp() { isPlaying = false; document.getElementById('bgm-player').pause(); openLayer('start-screen'); }
        function saveGame() { localStorage.setItem('zenSurvival_Final_v4', JSON.stringify({ money, owned: items.filter(i => i.owned).map(i => i.id), eq: { c: equipped.char.id, b: equipped.bg.id, s: equipped.skill.id, bgm: equipped.bgm.id } })); }

        function loadGame() {
            const data = JSON.parse(localStorage.getItem('zenSurvival_Final_v4'));
            if(data) {
                money = data.money;
                data.owned.forEach(id => { const it = items.find(i => i.id === id); if(it) it.owned = true; });
                equipped.char = items.find(i => i.id === data.eq.c) || items.find(i=>i.id==='c20');
                equipped.bg = items.find(i => i.id === data.eq.b) || items.find(i=>i.id==='b1');
                equipped.skill = items.find(i => i.id === data.eq.s) || items.find(i=>i.id==='s1');
                equipped.bgm = items.find(i => i.id === data.eq.bgm) || items.find(i=>i.id==='bgm1');
                document.getElementById('game-field').className = equipped.bg.className;
                updateBGM();
            }
            updateUI(); openLayer('start-screen');
        }
    </script>
</body>
</html>
