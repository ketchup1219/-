<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>草抜きサバイバル - ヴェノム覚醒 -</title>
    <style>
        :root { --zen-red: #ff0033; --gold: #ffd700; --grass-light: #7cfc00; --grass-dark: #2d5a27; --blue: #00d2ff; --fever-pink: #ff00ff; --bonus-color: #00ffcc; --uz-color: #ff0000; --x-color: #ffffff; }
        body { 
            text-align: center; font-family: 'Arial Black', sans-serif; 
            background-color: #050505; color: white; 
            margin: 0; overflow: hidden; touch-action: none; user-select: none;
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .header { background: linear-gradient(to bottom, #222, #0a0a0a); padding: 10px; display: flex; justify-content: space-around; align-items: center; border-bottom: 2px solid #333; font-size: 1.2rem; }
        .money-display { color: var(--gold); text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        
        #game-container { position: relative; width: 100vw; height: calc(100vh - 60px); overflow: hidden; }
        canvas { display: block; background: #0a1a0a; cursor: crosshair; }

        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 100; }
        .ui-layer.active { display: flex; }

        h1 { font-size: 3rem; margin: 0; text-transform: uppercase; letter-spacing: 5px; background: linear-gradient(to bottom, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 15px rgba(255,255,255,0.5)); }
        .subtitle { color: var(--zen-red); font-size: 1.2rem; margin-bottom: 30px; }

        .btn { 
            padding: 15px 40px; margin: 10px; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 50px;
            background: linear-gradient(135deg, #444, #111); color: white; transition: 0.3s; position: relative; overflow: hidden; border: 1px solid #555;
        }
        .btn:hover { transform: scale(1.1); background: linear-gradient(135deg, #666, #222); border-color: #999; }
        .btn-main { background: linear-gradient(135deg, var(--zen-red), #800); border-color: #f55; }
        .btn-main:hover { background: linear-gradient(135deg, #ff3366, #a00); }

        #shop-container { width: 90%; max-height: 70vh; overflow-y: auto; background: rgba(20,20,20,0.9); padding: 20px; border-radius: 15px; border: 1px solid #444; }
        .shop-item { display: flex; align-items: center; background: #222; margin: 10px 0; padding: 15px; border-radius: 10px; border-left: 5px solid #444; transition: 0.2s; }
        .shop-item.owned { border-left-color: var(--grass-light); opacity: 0.8; }
        .shop-item.equipped { border-left-color: var(--blue); background: #2a2a3a; box-shadow: inset 0 0 10px rgba(0,210,255,0.3); }
        .item-info { flex-grow: 1; text-align: left; margin-left: 20px; }
        .item-name { font-weight: bold; font-size: 1.1rem; display: block; }
        .item-desc { font-size: 0.8rem; color: #aaa; }
        .item-price { color: var(--gold); font-size: 1.2rem; }

        .hud { position: absolute; pointer-events: none; width: 100%; height: 100%; top: 0; left: 0; }
        .combo-box { position: absolute; top: 20px; right: 20px; font-size: 2rem; color: var(--blue); text-shadow: 0 0 10px var(--blue); }
        .fever-bar-container { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 250px; height: 15px; background: #333; border-radius: 10px; border: 2px solid #555; }
        #fever-bar { width: 0%; height: 100%; background: linear-gradient(to right, var(--fever-pink), #fff); border-radius: 8px; transition: width 0.1s; box-shadow: 0 0 15px var(--fever-pink); }
        
        #skill-btn { 
            position: absolute; bottom: 50px; right: 30px; width: 80px; height: 80px; border-radius: 50%;
            background: rgba(255,0,51,0.2); border: 3px solid var(--zen-red); color: white; cursor: pointer;
            display: flex; justify-content: center; align-items: center; font-size: 0.9rem; pointer-events: auto;
            text-shadow: 0 0 5px #000; transition: 0.2s; box-shadow: 0 0 20px rgba(255,0,51,0.3);
        }
        #skill-btn:active { transform: scale(0.9); }
        #skill-btn.disabled { opacity: 0.3; filter: grayscale(1); pointer-events: none; }
        #skill-cooldown { position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; background: rgba(0,0,0,0.6); border-radius: 50%; pointer-events: none; }

        .mission-panel { position: absolute; top: 10px; left: 10px; text-align: left; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; font-size: 0.8rem; pointer-events: auto; }
        .mission-item { margin-bottom: 5px; color: #ddd; }
        .mission-item.done { color: var(--grass-light); text-decoration: line-through; }

        .modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 30px; border: 2px solid var(--gold); border-radius: 20px; z-index: 1000; display: none; box-shadow: 0 0 50px rgba(255,215,0,0.3); }

        /* Titles */
        .rank-label { font-size: 0.7rem; color: #aaa; vertical-align: middle; margin-right: 5px; border: 1px solid #555; padding: 1px 4px; border-radius: 3px; }
    </style>
</head>
<body>

    <div class="header">
        <div id="user-title-display" style="font-size: 0.8rem; color: var(--gold);"></div>
        <div class="money-display">円: <span id="money-val">0</span></div>
        <div id="current-score" style="font-size: 1.2rem;">SCORE: 0</div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div class="hud">
            <div class="combo-box"><span id="combo-val">0</span> COMBO</div>
            <div class="fever-bar-container"><div id="fever-bar"></div></div>
            <div id="skill-btn" onclick="useSkill()">
                SKILL
                <div id="skill-cooldown"></div>
            </div>
            <div class="mission-panel" id="mission-panel"></div>
        </div>

        <div id="start-screen" class="ui-layer active">
            <h1>草抜きサバイバル</h1>
            <div class="subtitle">― ヴェノム覚醒 ―</div>
            <button class="btn btn-main" onclick="startGame()">サバイバル開始</button>
            <button class="btn" onclick="openLayer('shop-screen'); renderShop();">コレクション / 強化</button>
            <button class="btn" onclick="openLayer('mission-screen'); renderMissions();">本日の任務</button>
            <button class="btn" onclick="openLayer('online-screen')">オンライン(準備中)</button>
        </div>

        <div id="shop-screen" class="ui-layer">
            <h2 style="color:var(--gold)">コレクション</h2>
            <div id="shop-container"></div>
            <button class="btn" onclick="openLayer('start-screen')">戻る</button>
        </div>

        <div id="mission-screen" class="ui-layer">
            <h2 style="color:var(--blue)">本日の任務</h2>
            <div id="mission-list" style="width: 80%; text-align: left; background: #222; padding: 20px; border-radius: 10px;"></div>
            <button class="btn" onclick="openLayer('start-screen')">戻る</button>
        </div>

        <div id="end-screen" class="ui-layer">
            <h2 id="result-title">RESULT</h2>
            <div style="font-size: 2rem; margin: 20px;" id="final-score">0</div>
            <div style="color: var(--gold); margin-bottom: 30px;">獲得: <span id="earned-money">0</span> 円</div>
            <button class="btn btn-main" onclick="openLayer('start-screen')">拠点へ戻る</button>
        </div>
    </div>

    <audio id="bgm-player" loop></audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const moneyDisplay = document.getElementById('money-val');
        const comboDisplay = document.getElementById('combo-val');
        const feverBar = document.getElementById('fever-bar');
        const skillBtn = document.getElementById('skill-btn');
        const skillCooldownOverlay = document.getElementById('skill-cooldown');

        let money = 0;
        let score = 0;
        let combo = 0;
        let comboTimer = 0;
        let isPlaying = false;
        let isOnlineMode = false;
        let grasses = [];
        let particles = [];
        let fever = 0;
        let isFever = false;
        let feverTimer = 0;
        let skillCooldown = 0;
        let userName = "名無しの草刈り師";
        let currentTitle = "一般人";

        const items = [
            // Characters
            { id: 'c1', type: 'char', name: '草神ヴェノム', price: 0, desc: '初期キャラクター。基本性能。', bonus: 1, speed: 5, owned: true },
            { id: 'c2', type: 'char', name: '極・草神', price: 50000, desc: '研ぎ澄まされた感覚を持つ。獲得円1.5倍。', bonus: 1.5, speed: 7, owned: false },
            { id: 'c3', type: 'char', name: '黄金の草刈り師', price: 500000, desc: '全てを金に変える者。獲得円3倍。', bonus: 3, speed: 9, owned: false },
            { id: 'c4', type: 'char', name: 'ゴッドネスせいまろ', price: 15000000, desc: '全知全能の草抜きの神。全てを超越する。', bonus: 20, speed: 12, owned: false },
            
            // Backgrounds
            { id: 'b1', type: 'bg', name: '始まりの草原', price: 0, desc: '普通の草原。', color: '#0a1a0a', owned: true },
            { id: 'b2', type: 'bg', name: '燃える荒野', price: 20000, desc: '情熱的な赤い荒野。', color: '#1a0500', owned: false },
            { id: 'b3', type: 'bg', name: 'サイバー空間', price: 100000, desc: 'デジタルの海。', color: '#00051a', owned: false },
            { id: 'b4', type: 'bg', name: '虚無の領域', price: 1000000, desc: '何も存在しない漆黒。', color: '#000000', owned: false },

            // Skills
            { id: 's1', type: 'skill', name: '疾風', price: 5000, desc: '一時的に移動速度が2倍になる。', power: 0, owned: false },
            { id: 's2', type: 'skill', name: '煉獄', price: 30000, desc: '周囲の草を焼き払う。', power: 50, owned: false },
            { id: 's3', type: 'skill', name: '神速', price: 150000, desc: '画面内の草を半分瞬時に刈る。', power: 100, owned: false },
            { id: 's4', type: 'skill', name: '時空断', price: 800000, desc: '時間を止め、全ての草を消滅させる。', power: 200, owned: false },
            { id: 's5', type: 'skill', name: '終焉の裁き', price: 2000000, desc: '神の雷が降り注ぐ。大量の円を獲得。', power: 500, owned: false },
            { id: 's6', type: 'skill', name: 'ヴェノム・ノヴァ', price: 5000000, desc: '画面全体の草を爆破し、大量のボーナスを得る。', power: 300, owned: false },
            { id: 's7', type: 'skill', name: '雷霆蒼破', price: 0, desc: '【神】ゴッドネスせいまろ入手で解放。蒼き雷が全てを穿つ。', power: 1000, owned: false },

            // BGMs
            { id: 'bgm1', type: 'bgm', name: 'Grass Loop', price: 0, src: '', owned: true },
            { id: 'bgm2', type: 'bgm', name: 'Cyber Beat', price: 10000, src: '', owned: false },
            { id: 'bgm3', type: 'bgm', name: 'Zenith', price: 50000, src: '', owned: false },
            { id: 'bgm4', type: 'bgm', name: 'Apocalypse', price: 200000, src: '', owned: false },
            { id: 'bgm5', type: 'bgm', name: 'Venom Awakening', price: 1000000, src: '', owned: false }
        ];

        let equipped = { char: items[0], bg: items[4], skill: null, bgm: items[13] };

        // Missions
        let missions = [];
        let missionStats = { plucked: 0, gachaed: 0, earned: 0 };
        let lastMissionDate = "";

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight - 60;
            loadGame();
            updateUI();
            loop();
        }

        function startGame() {
            isPlaying = true;
            score = 0;
            combo = 0;
            fever = 0;
            isFever = false;
            grasses = [];
            particles = [];
            skillCooldown = 0;
            openLayer('none');
            spawnGrass(20);
            
            // Apply BG Color
            canvas.style.background = equipped.bg.color;
        }

        function spawnGrass(count) {
            for(let i=0; i<count; i++) {
                let type = 'normal';
                let r = Math.random();
                if(r > 0.98) type = 'uz';
                else if(r > 0.93) type = 'gold';
                else if(r > 0.88) type = 'fever';
                
                grasses.push({
                    x: Math.random() * (canvas.width - 40) + 20,
                    y: Math.random() * (canvas.height - 40) + 20,
                    w: 20 + Math.random()*20,
                    h: 30 + Math.random()*40,
                    type: type,
                    life: 100,
                    rot: (Math.random()-0.5)*0.5
                });
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        function update() {
            if(!isPlaying) return;

            // Combo logic
            if(comboTimer > 0) comboTimer--;
            else { combo = 0; }

            // Fever logic
            if(isFever) {
                feverTimer--;
                if(feverTimer <= 0) { isFever = false; fever = 0; }
                if(Math.random() < 0.2) spawnGrass(1);
            }

            // Skill logic
            if(skillCooldown > 0) {
                skillCooldown--;
                skillCooldownOverlay.style.height = (skillCooldown / 100) * 100 + "%";
            }

            // Particles
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life--; p.size *= 0.95;
                if(p.life <= 0) particles.splice(i, 1);
            });

            // Grass spawning
            if(grasses.length < 30 + (score/100)) {
                if(Math.random() < 0.05) spawnGrass(1);
            }

            updateUI();
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);

            // Draw Grasses
            grasses.forEach(g => {
                ctx.save();
                ctx.translate(g.x, g.y);
                ctx.rotate(g.rot);
                
                let col = 'var(--grass-light)';
                if(g.type === 'gold') col = 'var(--gold)';
                if(g.type === 'fever') col = 'var(--fever-pink)';
                if(g.type === 'uz') col = 'var(--uz-color)';
                
                ctx.fillStyle = col;
                if(isFever) ctx.shadowBlur = 10; ctx.shadowColor = col;

                // Simple Grass Shape
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(-10, -g.h/2, 0, -g.h);
                ctx.quadraticCurveTo(10, -g.h/2, 0, 0);
                ctx.fill();
                ctx.restore();
            });

            // Particles
            particles.forEach(p => {
                ctx.globalAlpha = p.life / 50;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
                ctx.globalAlpha = 1;
            });
        }

        canvas.addEventListener('touchstart', handleInput);
        canvas.addEventListener('mousedown', handleInput);

        function handleInput(e) {
            if(!isPlaying) return;
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = (e.clientY - 60) || (e.touches && e.touches[0].clientY - 60);

            let hit = false;
            for(let i = grasses.length - 1; i >= 0; i--) {
                let g = grasses[i];
                let dist = Math.hypot(g.x - x, g.y - y);
                if(dist < 50) {
                    pluck(i);
                    hit = true;
                }
            }
        }

        function pluck(index) {
            const g = grasses[index];
            grasses.splice(index, 1);
            
            // Combo & Fever
            combo++;
            comboTimer = 60;
            if(!isFever) {
                fever += 2;
                if(fever >= 100) startFever();
            }

            // Money & Score
            let gain = 1;
            if(g.type === 'gold') gain = 50;
            if(g.type === 'uz') gain = 500;
            if(g.type === 'fever') gain = 10;
            
            let finalGain = Math.floor(gain * equipped.char.bonus);
            if(isFever) finalGain *= 2;
            
            money += finalGain;
            score += finalGain * 10;
            missionStats.earned += finalGain;
            missionStats.plucked++;

            spawnParticle(g.x, g.y, g.type === 'gold' ? 'var(--gold)' : 'var(--grass-light)');
            checkMissions();
        }

        function startFever() {
            isFever = true;
            feverTimer = 300;
            fever = 100;
            showDamage(canvas.width/2, canvas.height/2, "FEVER TIME!!", "var(--fever-pink)");
        }

        function spawnParticle(x, y, color) {
            for(let i=0; i<5; i++) {
                particles.push({
                    x, y, 
                    vx: (Math.random()-0.5)*10, 
                    vy: (Math.random()-0.5)*10, 
                    life: 30 + Math.random()*20,
                    color: color,
                    size: 5 + Math.random()*5
                });
            }
        }

        function useSkill() {
            if(!isPlaying || skillCooldown > 0 || !equipped.skill) return;
            const s = equipped.skill;
            skillCooldown = 100;

            if(s.id === 's1') {
                // Wind
                showDamage(canvas.width/2, canvas.height/2, "神速抜法", "#fff");
            } else if(s.id === 's2') {
                // Fire
                score += 100;
                grasses.forEach((g, i) => {
                    if(Math.random() < 0.3) { spawnParticle(g.x, g.y, '#f00'); pluck(i); }
                });
            } else if(s.id === 's5') {
                score += 500;
                grasses.forEach(g => {
                    spawnParticle(g.x, g.y, '#ffd700');
                    money += (g.type==='gold'?20:2);
                });
                grasses = [];
            } else if(s.id === 's6') {
                score += 1000;
                showDamage(canvas.width/2, canvas.height/2, "ヴェノム・ノヴァ", "#ff0033");
                grasses.forEach(g => {
                    spawnParticle(g.x, g.y, '#ff0033');
                    money += (g.type==='gold'?50:5);
                });
                grasses = [];
            } else if(s.id === 's7') {
                score += 5000;
                showDamage(canvas.width/2, canvas.height/2, "雷霆蒼破", "#00d2ff");
                for(let i=0; i<40; i++) {
                    particles.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: 0, vy: 0, life: 30, color: '#00d2ff', size: 20});
                }
                grasses.forEach(g => {
                    spawnParticle(g.x, g.y, '#00d2ff');
                    let m = (g.type==='gold'?200:20);
                    money += m; missionStats.earned += m;
                });
                grasses = [];
            }
        }

        function showDamage(x, y, text, color) {
            const div = document.createElement('div');
            div.style.position = 'absolute';
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            div.style.color = color;
            div.style.fontSize = '2rem';
            div.style.fontWeight = 'bold';
            div.style.pointerEvents = 'none';
            div.style.animation = 'fadeOut 1s forwards';
            div.innerText = text;
            document.getElementById('game-container').appendChild(div);
            setTimeout(() => div.remove(), 1000);
        }

        function openLayer(id) {
            document.querySelectorAll('.ui-layer').forEach(l => l.classList.remove('active'));
            if(id !== 'none') document.getElementById(id).classList.add('active');
            
            if(id === 'end-screen') {
                document.getElementById('final-score').innerText = "SCORE: " + score;
                document.getElementById('earned-money').innerText = score / 10;
                money += score / 10;
                saveGame();
            }
        }

        function renderShop() {
            const container = document.getElementById('shop-container');
            container.innerHTML = '';

            // Update ownership for s7 (Godness Seimaro check)
            const c4 = items.find(i=>i.id==='c4');
            const s7 = items.find(i=>i.id==='s7');
            if(c4 && c4.owned && s7) s7.owned = true;

            items.forEach(it => {
                const div = document.createElement('div');
                div.className = `shop-item ${it.owned ? 'owned' : ''} ${isEquipped(it) ? 'equipped' : ''}`;
                div.onclick = () => {
                    if(it.owned) equip(it);
                    else buyItem(it.id);
                };
                
                div.innerHTML = `
                    <div class="item-info">
                        <span class="item-name">${it.name} ${isEquipped(it) ? '<span style="color:var(--blue)">[装備中]</span>' : ''}</span>
                        <span class="item-desc">${it.desc}</span>
                    </div>
                    <div class="item-price">${it.owned ? 'OWNED' : it.price + '円'}</div>
                `;
                container.appendChild(div);
            });
        }

        function isEquipped(it) {
            if(it.type === 'char') return equipped.char.id === it.id;
            if(it.type === 'bg') return equipped.bg.id === it.id;
            if(it.type === 'skill') return equipped.skill && equipped.skill.id === it.id;
            if(it.type === 'bgm') return equipped.bgm.id === it.id;
            return false;
        }

        function equip(it) {
            if(it.type === 'char') equipped.char = it;
            if(it.type === 'bg') equipped.bg = it;
            if(it.type === 'skill') equipped.skill = it;
            if(it.type === 'bgm') equipped.bgm = it;
            saveGame();
            renderShop();
        }

        function buyItem(id) {
            const it = items.find(i=>i.id === id);
            if(it && !it.owned && money >= it.price) {
                money -= it.price;
                it.owned = true;
                // Immediate unlock check
                if(it.id === 'c4') { const s7 = items.find(i=>i.id==='s7'); if(s7) s7.owned = true; }
                saveGame();
                renderShop();
                updateUI();
            }
        }

        function updateUI() {
            moneyDisplay.innerText = Math.floor(money).toLocaleString();
            comboDisplay.innerText = combo;
            feverBar.style.width = fever + "%";
            document.getElementById('current-score').innerText = "SCORE: " + score;
            if(equipped.skill) {
                skillBtn.classList.remove('disabled');
                skillBtn.innerText = equipped.skill.name;
            } else {
                skillBtn.classList.add('disabled');
                skillBtn.innerText = "NO SKILL";
            }
        }

        function renderMissions() {
            const list = document.getElementById('mission-list');
            list.innerHTML = missions.map(m => `
                <div class="mission-item ${m.done ? 'done' : ''}">
                    ${m.text} (${m.progress}/${m.target}) - ${m.reward}円
                </div>
            `).join('');
        }

        function checkMissions() {
            missions.forEach(m => {
                if(!m.done) {
                    if(m.type === 'pluck') m.progress = missionStats.plucked;
                    if(m.type === 'earn') m.progress = missionStats.earned;
                    if(m.progress >= m.target) {
                        m.done = true;
                        money += m.reward;
                        updateUI();
                    }
                }
            });
        }

        function saveGame() {
            const data = {
                money,
                ownedIds: items.filter(i=>i.owned).map(i=>i.id),
                equipped: {
                    char: equipped.char.id,
                    bg: equipped.bg.id,
                    skill: equipped.skill ? equipped.skill.id : null,
                    bgm: equipped.bgm.id
                },
                missionStats,
                lastDate: new Date().toDateString()
            };
            localStorage.setItem('zenSurvival_v15', JSON.stringify(data));
        }

        function loadGame() {
            const raw = localStorage.getItem('zenSurvival_v15');
            if(raw) {
                const data = JSON.parse(raw);
                money = data.money || 0;
                if(data.ownedIds) {
                    data.ownedIds.forEach(id => {
                        const it = items.find(i=>i.id === id);
                        if(it) it.owned = true;
                    });
                }
                if(data.equipped) {
                    equipped.char = items.find(i=>i.id === data.equipped.char) || items[0];
                    equipped.bg = items.find(i=>i.id === data.equipped.bg) || items[4];
                    equipped.skill = items.find(i=>i.id === data.equipped.skill) || null;
                    equipped.bgm = items.find(i=>i.id === data.equipped.bgm) || items[13];
                }
                missionStats = data.missionStats || { plucked:0, gachaed:0, earned:0 };
                
                // Initialize daily missions
                const today = new Date().toDateString();
                if(data.lastDate !== today) {
                    generateDailyMissions();
                }
            } else {
                generateDailyMissions();
            }
        }

        function generateDailyMissions() {
            missions = [
                { id: 1, type: 'pluck', text: '草を100本抜く', target: 100, progress: 0, reward: 1000, done: false },
                { id: 2, type: 'earn', text: '5000円稼ぐ', target: 5000, progress: 0, reward: 2000, done: false },
                { id: 3, type: 'pluck', text: '草を500本抜く', target: 500, progress: 0, reward: 5000, done: false }
            ];
            missionStats = { plucked: 0, gachaed: 0, earned: 0 };
        }

        window.onload = init;
    </script>
</body>
</html>
