<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>草抜きサバイバル - 完全版 -</title>
    <style>
        :root { --zen-red: #ff0033; --gold: #ffd700; --grass-light: #7cfc00; --grass-dark: #2d5a27; --blue: #00d2ff; --fever-pink: #ff00ff; --uz-color: #ff0000; --x-color: #ffffff; }
        body { text-align: center; font-family: 'Arial Black', sans-serif; background-color: #000; color: white; margin: 0; overflow: hidden; touch-action: none; user-select: none; }
        .header { background: #111; padding: 10px; display: flex; justify-content: space-around; align-items: center; border-bottom: 2px solid #333; font-size: 14px; position: relative; z-index: 1000; }
        #fever-container { position: absolute; bottom: -5px; left: 0; width: 100%; height: 6px; background: #222; }
        #fever-fill { width: 0%; height: 100%; background: var(--fever-pink); transition: width 0.2s; box-shadow: 0 0 15px var(--fever-pink); }
        #game-field { position: relative; width: 95vw; height: 55vh; background: #1a2a1a; margin: 10px auto; border: 3px solid #333; border-radius: 20px; overflow: hidden; }
        
        /* リモートフィールド設定 */
        #remote-field { position: absolute; right: 5px; top: 5px; width: 40%; height: 35%; background: rgba(0,0,0,0.6); border: 2px solid #00d2ff; border-radius: 10px; display: none; z-index: 100; pointer-events: none; overflow: hidden; }
        .remote-grass { position: absolute; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .remote-grass::before { content: '🌿'; }
        .remote-egg { position: absolute; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .col-list { width: 90%; height: 45%; overflow-y: auto; background: #1a1a1a; border-radius: 10px; padding: 10px; }
        .col-item { background: #222; padding: 10px; margin-bottom: 5px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        
        .btn { padding: 12px; font-size: 14px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; }
        .btn-start { background: var(--gold); color: #000; width: 80%; font-size: 18px; margin-top: 10px; }
        .btn-gacha { background: #ff4500; color: white; width: 45%; }
        .btn-col { background: var(--blue); color: white; width: 45%; }
        
        .item { position: absolute; z-index: 10; cursor: pointer; }
        .grass { width: 75px; height: 75px; }
        .grass-center { position: absolute; width: 30px; height: 60px; background: var(--grass-light); border-radius: 50% / 80% 80% 20% 20%; left: 50%; transform: translateX(-50%); bottom: 10px; }
        .egg { width: 70px; height: 70px; font-size: 50px; display: flex; align-items: center; justify-content: center; }
        
        .bottom-ui { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px; }
        #tsum-icon { width: 70px; height: 70px; border: 4px solid #444; border-radius: 50%; font-size: 35px; display: flex; align-items: center; justify-content: center; background: #222; }
        #skill-fill { width: 0%; height: 100%; background: #f00; transition: 0.1s; }
        #skill-bar { width: 140px; height: 18px; background: #222; border-radius: 10px; overflow: hidden; border: 2px solid #444; }
    </style>
</head>
<body onload="loadGame()">
    <div class="header">
        <button onclick="giveUp()" style="background:#444; color:white; border:none; padding:5px; font-size:10px;">リタイア</button>
        <div>💰 <span id="m-val">0</span></div>
        <div style="font-size: 18px; font-weight: bold; color: #ffcc00;">⏳ <span id="t-val">30.0</span></div>
        <div id="opp-score-display" style="color: #00d2ff; font-size: 12px; display: none;">相手: <span id="opp-m-val">0</span></div>
        <div id="fever-container"><div id="fever-fill"></div></div>
    </div>

    <div id="game-field">
        <div id="remote-field">
            <div id="remote-items-container"></div>
        </div>

        <div id="start-screen" class="overlay">
            <h1 style="color:var(--gold); margin:0;">草抜きサバイバル</h1>
            <p>所持金: <span id="start-money">0</span>円</p>
            <button class="btn btn-start" onclick="startOnlineMatch()" style="background:#00d2ff;">🌐 オンライン対戦</button>
            <button class="btn btn-start" onclick="startGame()">ソロプレイ開始</button>
            <div style="display:flex; gap:10px; width:80%; margin-top:10px;">
                <button class="btn btn-gacha" onclick="openLayer('gacha-screen')">ガチャ</button>
                <button class="btn btn-col" onclick="openLayer('col-screen')">図鑑/進化</button>
            </div>
        </div>

        <div id="gacha-screen" class="overlay" style="display:none;">
            <h2>キャラガチャ</h2>
            <div id="gacha-result" style="height:100px; font-size:24px;">🎁</div>
            <button class="btn" onclick="runGacha()" style="background:orange; color:white;">1回引く (1000円)</button>
            <button class="btn" onclick="openLayer('start-screen')" style="margin-top:20px;">戻る</button>
        </div>

        <div id="col-screen" class="overlay" style="display:none;">
            <h2>図鑑 / 進化 / 合体</h2>
            <div class="col-list" id="col-list-content"></div>
            <button class="btn" onclick="openLayer('start-screen')" style="margin-top:10px;">戻る</button>
        </div>

        <div id="end-screen" class="overlay" style="display:none">
            <h2 id="end-title" style="color:red; font-size:40px;">終了！</h2>
            <p>獲得: <span id="res-money" style="font-size:24px; color:var(--gold);">0</span>円</p>
            <p id="online-result" style="color: #00d2ff; font-weight: bold;"></p>
            <button class="btn btn-start" onclick="openLayer('start-screen')">タイトルへ</button>
        </div>
    </div>

    <div class="bottom-ui">
        <div id="tsum-icon">👤</div>
        <div>
            <div id="skill-bar"><div id="skill-fill"></div></div>
            <div id="equipped-name" style="font-size:10px; color:#aaa;">普通のぜん</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSy...", databaseURL: "https://...", projectId: "...", appId: "..." };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.db = db; window.dbRef = ref; window.dbSet = set; window.dbOnValue = onValue; window.dbOnDisconnect = onDisconnect;
    </script>

    <script>
        let money = 2000, timeLeft = 30.0, isPlaying = false, isOnlineMode = false;
        let feverPoints = 0, skillCount = 0, playerId = "p_" + Math.floor(Math.random() * 1000000);
        let currentRoomId = "match_v1", userName = "ぜん";

        const items = [
            { id: 'c1', name: '普通のぜん', icon: '👤', rarity: 'C', rate: 1, owned: true },
            { id: 'c2', name: 'プロぜん', icon: '🔥', rarity: 'R', rate: 2, owned: false },
            { id: 'c3', name: '神ぜん', icon: '⚡', rarity: 'SSR', rate: 10, owned: false },
            { id: 'c4', name: '究極ぜん', icon: '👑', rarity: 'UZ', rate: 50, owned: false }
        ];
        let equipped = items[0];

        function updateUI() {
            document.getElementById('m-val').innerText = Math.floor(money).toLocaleString();
            document.getElementById('start-money').innerText = Math.floor(money).toLocaleString();
            document.getElementById('t-val').innerText = Math.max(0, timeLeft).toFixed(1);
            document.getElementById('fever-fill').style.width = feverPoints + "%";
            document.getElementById('skill-fill').style.width = skillCount + "%";
            document.getElementById('equipped-name').innerText = equipped.name;
        }

        function openLayer(id) {
            document.querySelectorAll('.overlay').forEach(l => l.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
            if(id === 'col-screen') renderCollection();
        }

        // --- ガチャ・進化ロジック ---
        function runGacha() {
            if(money < 1000) return alert("お金が足りません！");
            money -= 1000;
            const rand = Math.random();
            let result = items[0];
            if(rand < 0.05) result = items[2];
            else if(rand < 0.2) result = items[1];
            
            result.owned = true;
            document.getElementById('gacha-result').innerText = result.icon + " " + result.name;
            saveGame(); updateUI();
        }

        function renderCollection() {
            const cont = document.getElementById('col-list-content');
            cont.innerHTML = '';
            items.forEach(it => {
                const div = document.createElement('div');
                div.className = 'col-item';
                div.innerHTML = `<span>${it.icon} ${it.name} (${it.rarity})</span>
                                 <button onclick="equipChar('${it.id}')" ${it.owned?'':'disabled'}>${equipped.id===it.id?'装備中':'装備'}</button>`;
                cont.appendChild(div);
            });
        }

        function equipChar(id) {
            equipped = items.find(i => i.id === id);
            renderCollection(); updateUI(); saveGame();
        }

        // --- オンライン対戦ロジック (ご要望の修正すべて反映) ---
        function startOnlineMatch() {
            isOnlineMode = true; isPlaying = false;
            document.getElementById('opp-score-display').style.display = 'block';
            document.getElementById('remote-field').style.display = 'block';
            document.getElementById('online-result').innerText = "対戦相手を探しています...";
            
            const myRef = window.dbRef(window.db, 'rooms/'+currentRoomId+'/'+playerId);
            window.dbSet(myRef, { name: userName, score: 0, status: "waiting", items: [] });
            window.dbOnDisconnect(myRef).remove();

            const timeout = setTimeout(() => {
                if(!isPlaying) { alert("相手が見つかりませんでした。"); openLayer('start-screen'); }
            }, 80000);

            window.dbOnValue(window.dbRef(window.db, 'rooms/'+currentRoomId), (snap) => {
                const data = snap.val();
                if(!data) return;
                const pIds = Object.keys(data);
                if(!isPlaying && pIds.length >= 2) {
                    clearTimeout(timeout); isPlaying = true;
                    let c = 3;
                    const cd = setInterval(() => {
                        if(c > 0) { document.getElementById('online-result').innerText = `開始まで... ${c--}`; }
                        else { clearInterval(cd); document.getElementById('online-result').innerText = "GO!!"; startGame(); }
                    }, 1000);
                }
                for(let k in data) {
                    if(k !== playerId) {
                        const opp = data[k];
                        document.getElementById('opp-m-val').innerText = Math.floor(opp.score).toLocaleString();
                        if(opp.status === "died") { isPlaying = false; document.getElementById('online-result').innerText = "相手が卵で脱落！勝利！"; endGame("WIN"); }
                        updateRemoteView(opp.items || []);
                    }
                }
            });
        }

        // --- ゲーム基本ロジック ---
        function spawn() {
            if(!isPlaying) return;
            const field = document.getElementById('game-field');
            for(let i=0; i<3; i++) {
                const g = document.createElement('div'); g.className = 'item grass';
                g.style.left = Math.random()*85+"%"; g.style.top = Math.random()*80+"%";
                g.innerHTML = '<div class="grass-center"></div>';
                g.onclick = function(){ 
                    money += (100 * equipped.rate); feverPoints = Math.min(100, feverPoints+5);
                    this.remove(); spawn(); updateUI(); if(isOnlineMode) syncOnlineData();
                }; 
                field.appendChild(g);
            }
            const egg = document.createElement('div'); egg.className = 'item egg'; egg.innerText = '🥚';
            egg.style.left = "50%"; egg.style.top = "50%";
            egg.onclick = () => {
                if(equipped.rarity === 'SSR' || equipped.rarity === 'UZ') { egg.remove(); return; }
                if(isOnlineMode) window.dbSet(window.dbRef(window.db, 'rooms/'+currentRoomId+'/'+playerId), { status: "died", score: money });
                endGame("卵自爆");
            };
            field.appendChild(egg);
        }

        function startGame() {
            isPlaying = true; timeLeft = 30.0; openLayer('none');
            document.querySelectorAll('.item').forEach(i => i.remove());
            spawn();
            const t = setInterval(() => {
                if(!isPlaying) { clearInterval(t); return; }
                timeLeft -= 0.1; updateUI();
                if(timeLeft <= 0) endGame("終了");
            }, 100);
        }

        function endGame(msg) {
            isPlaying = false; openLayer('end-screen');
            document.getElementById('res-money').innerText = Math.floor(money).toLocaleString();
            saveGame();
            setTimeout(() => { if(document.getElementById('end-screen').style.display==='flex') openLayer('start-screen'); }, 3000);
        }

        function syncOnlineData() {
            const myItems = [];
            document.querySelectorAll('.item').forEach(el => myItems.push({ x: el.style.left, y: el.style.top, type: el.classList.contains('grass')?'grass':'egg' }));
            window.dbSet(window.dbRef(window.db, 'rooms/'+currentRoomId+'/'+playerId), { name: userName, score: money, status: "playing", items: myItems });
        }

        function updateRemoteView(items) {
            const cont = document.getElementById('remote-items-container');
            cont.innerHTML = '';
            items.forEach(it => {
                const d = document.createElement('div');
                d.className = it.type === 'grass' ? 'remote-grass' : 'remote-egg';
                d.style.left = it.x; d.style.top = it.y;
                if(it.type === 'egg') d.innerText = '🥚';
                cont.appendChild(d);
            });
        }

        function giveUp() { location.reload(); }
        function saveGame() { localStorage.setItem('zenSave', JSON.stringify({ money, ownedIds: items.filter(i=>i.owned).map(i=>i.id), eqId: equipped.id })); }
        function loadGame() {
            const s = JSON.parse(localStorage.getItem('zenSave'));
            if(s) { money = s.money; s.ownedIds.forEach(id => { const it=items.find(i=>i.id===id); if(it)it.owned=true; }); equipped = items.find(i=>i.id===s.eqId)||items[0]; }
            updateUI(); openLayer('start-screen');
        }
    </script>
</body>
</html>
