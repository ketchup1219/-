<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>草抜きサバイバル -極-</title>
    <style>
        :root { --zen-red: #ff0033; --gold: #ffd700; --grass: #7cfc00; --blue: #00d2ff; }
        body { 
            text-align: center; font-family: 'Arial Black', sans-serif; 
            background-color: #000; color: white; 
            margin: 0; overflow: hidden; touch-action: none; user-select: none;
        }

        .header { background: #111; padding: 10px; display: flex; justify-content: space-around; border-bottom: 2px solid #333; font-size: 14px; }
        #game-field { 
            position: relative; width: 95vw; height: 50vh; 
            background: #1a2a1a; margin: 10px auto; 
            border: 3px solid #333; border-radius: 20px; overflow: hidden;
            transition: 0.5s;
        }

        .overlay { position: absolute; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* 必殺技演出 */
        #skill-effect-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: 80px; color: var(--gold); text-shadow: 0 0 20px red; z-index: 1000; pointer-events: none;
        }
        .huh-anim { animation: huh-surge 0.6s ease-out; }
        @keyframes huh-surge {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }

        /* コレクション */
        .col-tabs { display: flex; width: 95%; gap: 5px; margin-bottom: 10px; }
        .tab-btn { flex: 1; padding: 10px 5px; font-size: 11px; background: #333; color: white; border: none; border-radius: 5px; }
        .tab-btn.active { background: var(--blue); }
        .col-list { width: 90%; height: 50%; overflow-y: auto; background: #1a1a1a; border-radius: 10px; padding: 10px; border: 1px solid #444; }
        .col-item { background: #222; padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid transparent; }
        .col-item.owned { border-left-color: var(--gold); }
        .col-item.locked { opacity: 0.2; }
        .equip-btn { padding: 6px 12px; border-radius: 15px; border: none; font-size: 10px; font-weight: bold; }
        .equipped { background: var(--grass) !important; color: #000; }

        /* UI */
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; width: 85%; }
        .btn { padding: 12px; font-size: 14px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; }
        .btn-start { background: var(--gold); color: #000; grid-column: span 2; font-size: 20px; }
        .btn-gacha { background: #ff4500; color: white; }
        .btn-col { background: var(--blue); color: white; }

        .bottom-ui { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px; }
        #tsum-icon { width: 70px; height: 70px; border: 4px solid #444; border-radius: 50%; font-size: 35px; line-height: 70px; background: #222; }
        .ready #tsum-icon { animation: pulse 0.2s infinite; border-color: var(--zen-red); cursor: pointer; }
        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }

        #skill-bar { width: 140px; height: 18px; background: #222; border-radius: 10px; overflow: hidden; border: 2px solid #444; }
        #skill-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #f00, #f80); transition: 0.2s; }

        .item { position: absolute; width: 45px; height: 45px; z-index: 10; border: 20px solid transparent; background-clip: padding-box; }
        .grass { background: var(--grass); clip-path: polygon(50% 100%, 20% 80%, 0% 40%, 30% 60%, 50% 0%, 70% 60%, 100% 40%, 80% 80%); }
        .egg { font-size: 30px; display: flex; align-items: center; justify-content: center; }
        #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; pointer-events: none; opacity: 0; z-index: 1000; }
    </style>
</head>
<body>
    <div id="flash"></div>
    <div class="header">
        <div>💰 <span id="m-val">2000</span></div>
        <div>⏳ <span id="t-val">30.0</span></div>
        <div>LV <span id="l-val">1</span></div>
    </div>

    <div id="game-field">
        <div id="skill-effect-text">huh</div>
        
        <div id="start-screen" class="overlay">
            <h1 style="margin:0">草抜きサバイバル</h1>
            <p id="passive-info" style="font-size:10px; color:var(--blue);">装備なし</p>
            <div class="btn-group">
                <button class="btn btn-start" onclick="startGame()">START</button>
                <button class="btn btn-gacha" onclick="openLayer('gacha-screen')">GACHA</button>
                <button class="btn btn-col" onclick="openLayer('col-screen')">COLLECTION</button>
            </div>
        </div>

        <div id="gacha-screen" class="overlay" style="display:none;">
            <div id="gacha-box" style="font-size:70px;">🎁</div>
            <div id="gacha-msg" style="margin:10px; height:40px; color:gold;"></div>
            <button class="btn btn-gacha" id="g-btn" onclick="runGacha()" style="width:180px;">1000円で引く</button>
            <button class="btn" onclick="openLayer('start-screen')" style="margin-top:20px; background:#444; color:white;">戻る</button>
        </div>

        <div id="col-screen" class="overlay" style="display:none;">
            <h2>COLLECTION</h2>
            <div class="col-tabs">
                <button class="tab-btn active" id="tab-char" onclick="setTab('char')">キャラ</button>
                <button class="tab-btn" id="tab-bg" onclick="setTab('bg')">背景</button>
                <button class="tab-btn" id="tab-skill" onclick="setTab('skill')">必殺技</button>
            </div>
            <div class="col-list" id="col-list-content"></div>
            <button class="btn" onclick="openLayer('start-screen')" style="margin-top:10px; background:#444; width:100px;">戻る</button>
        </div>

        <div id="end-screen" class="overlay" style="display:none">
            <h2 style="color:red; font-size:40px;">GAME OVER</h2>
            <p>獲得金額: <span id="res-money">0</span>円</p>
            <button class="btn btn-start" onclick="location.reload()" style="width:180px;">TITLE</button>
        </div>
    </div>

    <div class="bottom-ui">
        <div id="tsum-icon" onclick="triggerSkill()">👤</div>
        <div>
            <div id="skill-bar"><div id="skill-fill"></div></div>
            <div id="skill-display-name" style="font-size:10px; color:#777; margin-top:5px;">huh</div>
        </div>
    </div>

    <script>
        let money = 2000, level = 1, timeLeft = 30.0, skillCount = 0, isPlaying = false, currentTab = 'char', armor = false;

        const items = [
            { id: 'c1', type: 'char', name: '覚醒ぜん', icon: '🔥', owned: false, rarity: 'SSR', info: '金3倍/ゲージ2倍' },
            { id: 'c2', type: 'char', name: '宇宙ぜん', icon: '👽', owned: false, rarity: 'SR', info: '時間減少10%緩和' },
            { id: 'c3', type: 'char', name: '騎士ぜん', icon: '⚔️', owned: false, rarity: 'SR', info: '爆弾を1度耐える' },
            { id: 'c4', type: 'char', name: '悪魔ぜん', icon: '😈', owned: false, rarity: 'SR', info: '周囲を巻き込む' },
            { id: 'c5', type: 'char', name: 'パンダぜん', icon: '🐼', owned: false, rarity: 'R', info: '金+5円' },
            { id: 'c6', type: 'char', name: 'カエルぜん', icon: '🐸', owned: false, rarity: 'R', info: '金+5円' },
            { id: 'c7', type: 'char', name: '幽霊ぜん', icon: '👻', owned: false, rarity: 'R', info: '爆弾が無効' },
            { id: 'c8', type: 'char', name: '忍者ぜん', icon: '🥷', owned: false, rarity: 'R', info: 'スキル上昇UP' },
            { id: 'c9', type: 'char', name: '猫ぜん', icon: '🐱', owned: false, rarity: 'R', info: '金+5円' },
            { id: 'c10', type: 'char', name: 'ロボぜん', icon: '🤖', owned: false, rarity: 'R', info: '金+5円' },
            { id: 'b1', type: 'bg', name: '次元の狭間', val: 'radial-gradient(circle, #400, #000)', owned: false, rarity: 'SSR' },
            { id: 'b2', type: 'bg', name: 'サイバー空間', val: 'repeating-linear-gradient(45deg, #001, #003 50px)', owned: false, rarity: 'SR' },
            { id: 's_huh', type: 'skill', name: 'huh', owned: true, rarity: 'BASIC' },
            { id: 's2', type: 'skill', name: '時間停止', owned: false, rarity: 'SR' }
        ];

        let equipped = { char: null, bg: null, skill: items.find(i => i.id === 's_huh') };

        function v(ms=20) { if(navigator.vibrate) navigator.vibrate(ms); }

        function openLayer(id) {
            document.querySelectorAll('.overlay').forEach(l => l.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
            if(id === 'col-screen') renderCol();
        }

        function setTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.id === 'tab-'+tab));
            renderCol();
        }

        function runGacha() {
            if(money < 1000) return alert("お金不足！");
            money -= 1000; updateUI();
            const gBtn = document.getElementById('g-btn');
            gBtn.disabled = true;
            v([30, 30]);

            setTimeout(() => {
                gBtn.disabled = false;
                const r = Math.random() * 100;
                let target;
                if (r < 3) target = items.find(i => i.id === 'c1'); // 3%
                else if (r < 10) target = items.find(i => i.id === 'b1');
                else {
                    const pool = items.filter(i => i.id !== 's_huh' && i.rarity !== 'SSR');
                    target = pool[Math.floor(Math.random() * pool.length)];
                }
                target.owned = true;
                document.getElementById('gacha-box').innerText = target.icon || '📦';
                document.getElementById('gacha-msg').innerHTML = `${target.rarity}<br>${target.name}`;
                if(target.rarity === 'SSR') v([100, 50, 100]);
            }, 800);
        }

        function renderCol() {
            const list = document.getElementById('col-list-content');
            list.innerHTML = '';
            items.filter(i => i.type === currentTab).forEach(item => {
                const div = document.createElement('div');
                div.className = `col-item ${item.owned ? 'owned' : 'locked'}`;
                const isEq = equipped[item.type] === item;
                div.innerHTML = `<span>${item.owned ? (item.icon || '') + ' ' + item.name : '？？？'}</span>
                    <button class="equip-btn ${isEq ? 'equipped' : ''}" onclick="equip('${item.id}')" ${item.owned ? '' : 'disabled'}>
                    ${isEq ? '装備中' : (item.owned ? '装備' : '未所持')}</button>`;
                list.appendChild(div);
            });
        }

        function equip(id) {
            const item = items.find(i => i.id === id);
            equipped[item.type] = item;
            if(item.type === 'char') {
                document.getElementById('tsum-icon').innerText = item.icon;
                document.getElementById('passive-info').innerText = "効果: " + item.info;
            }
            if(item.type === 'bg') document.getElementById('game-field').style.background = item.val;
            if(item.type === 'skill') document.getElementById('skill-display-name').innerText = item.name;
            renderCol(); v(20);
        }

        function startGame() {
            isPlaying = true; timeLeft = 30.0; level = 1; skillCount = 0; armor = (equipped.char?.id === 'c3');
            openLayer('none'); spawn();
            const timer = setInterval(() => {
                if(!isPlaying) return clearInterval(timer);
                let dec = (equipped.char?.id === 'c2') ? 0.09 : 0.1;
                timeLeft -= dec;
                document.getElementById('t-val').innerText = Math.max(0, timeLeft).toFixed(1);
                if(timeLeft <= 0) endGame();
            }, 100);
        }

        function spawn() {
            const field = document.getElementById('game-field');
            field.querySelectorAll('.item').forEach(i => i.remove());
            for(let i=0; i < 12+level*2; i++) {
                const item = document.createElement('div');
                const isEgg = Math.random() < 0.2;
                item.className = 'item ' + (isEgg ? 'egg' : 'grass');
                if(isEgg) item.innerText = "🥚";
                item.style.left = Math.random() * (field.clientWidth - 50) + "px";
                item.style.top = Math.random() * (field.clientHeight - 50) + "px";
                item.onpointerdown = (e) => {
                    if(!isPlaying || item.style.transform === "scale(0)") return;
                    if(isEgg) {
                        if(equipped.char?.id === 'c7') return; // 幽霊無効
                        if(armor) { armor = false; item.remove(); return v(100); } // 騎士ガード
                        return endGame();
                    }
                    v(); 
                    let m = (equipped.char?.id === 'c1') ? 30 : 10;
                    if(['c5','c6','c9','c10'].includes(equipped.char?.id)) m += 5;
                    money += m;

                    let s = (equipped.char?.id === 'c1') ? 16 : (equipped.char?.id === 'c8' ? 12 : 8);
                    skillCount = Math.min(100, skillCount + s);
                    
                    item.style.transform = "scale(0)";
                    if(equipped.char?.id === 'c4' && Math.random() < 0.2) { // 悪魔連鎖
                        field.querySelectorAll('.grass').forEach(g => { if(Math.random()<0.2) g.dispatchEvent(new Event('pointerdown')); });
                    }
                    updateUI();
                    if(field.querySelectorAll('.grass').length <= 1) { level++; spawn(); }
                };
                field.appendChild(item);
            }
        }

        function triggerSkill() {
            if(!equipped.skill || skillCount < 100 || !isPlaying) return;
            skillCount = 0; updateUI(); v([50, 150]);
            if(equipped.skill.id === 's_huh') {
                const et = document.getElementById('skill-effect-text');
                et.classList.remove('huh-anim'); void et.offsetWidth; et.classList.add('huh-anim');
                document.getElementById('flash').style.opacity = "0.4";
                setTimeout(() => document.getElementById('flash').style.opacity = "0", 300);
                document.querySelectorAll('.grass').forEach((g, i) => {
                    setTimeout(() => { if(g.parentNode) { g.dispatchEvent(new Event('pointerdown')); } }, i*20);
                });
            } else if(equipped.skill.id === 's2') {
                timeLeft += 10; updateUI();
            }
        }

        function updateUI() {
            document.getElementById('m-val').innerText = money;
            document.getElementById('l-val').innerText = level;
            document.getElementById('skill-fill').style.width = skillCount + "%";
            document.querySelector('.bottom-ui').classList.toggle('ready', skillCount >= 100);
        }

        function endGame() { isPlaying = false; document.getElementById('res-money').innerText = money; openLayer('end-screen'); }
    </script>
</body>
</html>
