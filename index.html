<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>草抜きサバイバル オンライン - カズキングイベント -</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --zen-red: #ff0033; --gold: #ffd700; --grass-light: #7cfc00; --grass-dark: #2d5a27; --blue: #00d2ff; --fever-pink: #ff00ff; --bonus-color: #00ffcc; --uz-color: #ff0000; --x-color: #ffffff; }
        body { 
            text-align: center; font-family: 'Arial Black', sans-serif; 
            background-color: #000; color: white; 
            margin: 0; overflow: hidden; touch-action: none; user-select: none;
        }

        .header { background: #111; padding: 10px; display: flex; justify-content: space-around; align-items: center; border-bottom: 2px solid #333; font-size: 14px; position: relative; flex-wrap: wrap; gap: 5px; }
        #fever-container { position: absolute; bottom: -5px; left: 0; width: 100%; height: 6px; background: #222; }
        #fever-fill { width: 0%; height: 100%; background: var(--fever-pink); transition: width 0.2s; box-shadow: 0 0 15px var(--fever-pink); }

        /* オンライン表示エリア */
        .online-status { background: rgba(255, 0, 255, 0.1); border: 1px solid #ff00ff; padding: 2px 8px; border-radius: 5px; font-size: 12px; color: #ff00ff; }

        #game-field { 
            position: relative; width: 95vw; height: 55vh; 
            background: #1a2a1a; margin: 10px auto; 
            border: 3px solid #333; border-radius: 20px; overflow: hidden;
            transition: 0.3s;
        }
        /* 背景バリエーション */
        #game-field.bg-desert { background: #4d3319; border-color: #d2b48c; }
        #game-field.bg-cyber { background: #000520; border-color: #00d2ff; }
        #game-field.bg-volcano { background: #2b0000; border-color: #ff4500; }
        #game-field.bg-night { background: #0a0a20; border-color: #483d8b; }
        #game-field.bg-sakura { background: #2d1a1a; border-color: #ffb7c5; box-shadow: inset 0 0 50px #ffb7c533; }
        #game-field.bg-gold { background: #3d3300; border-color: #ffd700; }
        #game-field.bg-space { background: radial-gradient(circle, #1a1a3a 0%, #000 100%); border-color: #fff; }
        #game-field.bg-deepsea { background: #00121a; border-color: #008b8b; }
        #game-field.bg-dimension { background: #1a001a; border-color: #9400d3; animation: dim-pulse 5s infinite alternate; }
        @keyframes dim-pulse { from { background: #1a001a; } to { background: #00001a; } }

        .skill-active-field { animation: skill-shake 0.05s infinite, skill-flash 0.2s infinite alternate !important; border-width: 8px !important; }
        .ultimate-field-bg { animation: ultimate-rainbow 0.2s infinite linear !important; }
        @keyframes ultimate-rainbow { 0% { background: #ff0000; } 20% { background: #ffff00; } 40% { background: #00ff00; } 60% { background: #00ffff; } 80% { background: #0000ff; } 100% { background: #ff00ff; } }
        @keyframes skill-shake { 0% { transform: translate(4px, 4px); } 50% { transform: translate(-4px, -4px); } 100% { transform: translate(4px, -4px); } }
        @keyframes skill-flash { from { box-shadow: inset 0 0 50px rgba(255,255,255,0.5); border-color: #fff; } to { box-shadow: inset 0 0 150px rgba(255,255,255,1); border-color: #ff00ff; } }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        #gacha-result-display { width: 85%; height: 140px; overflow-y: auto; background: #111; border: 1px solid #444; border-radius: 10px; margin: 10px 0; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
        .res-line { display: flex; justify-content: space-between; align-items: center; padding: 4px 10px; border-radius: 5px; background: #222; font-size: 12px; }
        .res-line.SSR { background: #443300; border: 1px solid var(--gold); color: var(--gold); animation: glow 1s infinite alternate; }
        .res-line.UZ { background: #300; border: 1px solid var(--uz-color); color: var(--uz-color); animation: uz-glow 0.5s infinite alternate; font-weight: bold; }
        .res-line.X { background: #000; border: 1px solid var(--x-color); color: var(--x-color); animation: x-glow 0.3s infinite alternate; font-weight: bold; }

        .col-list { width: 90%; height: 45%; overflow-y: auto; background: #1a1a1a; border-radius: 10px; padding: 10px; border: 1px solid #444; }
        .col-item { background: #222; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid transparent; }
        .col-item.owned { border-left-color: var(--gold); }
        .equip-btn { padding: 6px 12px; border-radius: 15px; border: none; font-size: 10px; font-weight: bold; cursor: pointer; }
        .equipped { background: var(--grass-light) !important; color: #000; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; width: 90%; }
        .btn { padding: 10px; font-size: 12px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.1s; }
        .btn-start { background: var(--gold); color: #000; grid-column: span 2; font-size: 18px; box-shadow: 0 0 15px var(--gold); }
        .btn-online { background: #ff00ff; color: white; grid-column: span 2; font-size: 14px; }

        .pop-text { position: absolute; font-weight: bold; pointer-events: none; animation: pop-up-enhanced 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; z-index: 100; text-shadow: 2px 2px 0 black; font-size: 20px; }
        @keyframes pop-up-enhanced { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 50% { opacity: 1; transform: translateY(-40px) scale(1.4); } 100% { transform: translateY(-80px) scale(1.1); opacity: 0; } }

        .bottom-ui { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px; }
        #tsum-icon { width: 70px; height: 70px; border: 4px solid #444; border-radius: 50%; font-size: 35px; display: flex; align-items: center; justify-content: center; background: #222; transition: 0.2s; }
        .ready #tsum-icon { border-color: var(--zen-red); animation: pulse 0.4s infinite alternate; cursor: pointer; }
        #skill-bar { width: 140px; height: 18px; background: #222; border-radius: 10px; overflow: hidden; border: 2px solid #444; }
        #skill-fill { width: 0%; height: 100%; background: #f00; transition: 0.1s; }

        .item { position: absolute; z-index: 10; cursor: pointer; }
        .grass { width: 75px; height: 75px; }
        .grass::before, .grass::after { content: ''; position: absolute; width: 25px; height: 45px; background: var(--grass-dark); border-radius: 50% / 80% 80% 20% 20%; bottom: 5px; pointer-events: none; }
        .grass::before { transform: rotate(-35deg); left: 10px; }
        .grass::after { transform: rotate(35deg); right: 10px; }
        .grass-center { position: absolute; width: 30px; height: 60px; background: var(--grass-light); border-radius: 50% / 80% 80% 20% 20%; left: 50%; transform: translateX(-50%); bottom: 10px; pointer-events: none; }
        
        .egg { width: 70px; height: 70px; font-size: 50px; display: flex; align-items: center; justify-content: center; }

        .profile-input-group { background: #222; padding: 10px; border-radius: 10px; width: 85%; margin-bottom: 10px; border: 1px solid #444; }
        .profile-input-group input { width: 90%; background: #111; border: 1px solid #555; color: white; padding: 8px; border-radius: 5px; font-family: inherit; }
    </style>
</head>
<body onload="loadGame()">
    <div class="header">
        <button onclick="giveUp()" style="background:#444; color:white; border:none; padding:5px; font-size:10px; border-radius:3px;">リタイア</button>
        <div>💰 <span id="m-val">0</span></div>
        <div style="font-size: 18px; font-weight: bold; color: #ffcc00;">⏳ <span id="t-val">30.0</span></div>
        <div id="opp-ui" class="online-status" style="display:none;">
            VS <span id="opp-name">---</span>: 💰<span id="opp-score">0</span>
        </div>
        <div id="fever-container"><div id="fever-fill"></div></div>
    </div>

    <div id="game-field">
        <div id="start-screen" class="overlay">
            <h1 style="color:var(--gold); margin:0; font-size: 24px;">草抜きサバイバル</h1>
            <div id="profile-info-display" style="font-size:12px; margin: 5px;"><span id="u-name-display">ぜん</span> <br> <small>称号：<span id="u-title-display">なし</span></small></div>
            
            <div class="btn-group">
                <button class="btn btn-start" onclick="startGame()">一人で遊ぶ</button>
                <button class="btn btn-online" onclick="openLayer('online-lobby')">🌐 オンライン対戦</button>
                <button class="btn" style="background:#00cc66; color:white;" onclick="openLayer('mission-screen')">📅 ミッション</button>
                <button class="btn" style="background:#555; color:white;" onclick="openLayer('profile-screen')">👤 プロフ編集</button>
                <button class="btn" style="background:#ff4500; color:white;" onclick="openLayer('gacha-screen')">ガチャ</button>
                <button class="btn" style="background:var(--blue); color:white;" onclick="openLayer('col-screen')">図鑑</button>
            </div>
        </div>

        <div id="online-lobby" class="overlay" style="display:none;">
            <h2 style="color:#ff00ff;">🌐 対戦ロビー</h2>
            <div class="profile-input-group">
                <label style="font-size:10px; color:#aaa;">同じ部屋名を入力した人と対戦できます</label>
                <input type="text" id="room-id-input" placeholder="部屋名を入力 (例: zen123)">
            </div>
            <button class="btn btn-online" style="width:200px;" onclick="joinOnlineRoom()">対戦開始！</button>
            <button class="btn" onclick="openLayer('start-screen')" style="background:#444; width:100px; margin-top:10px;">戻る</button>
        </div>

        <div id="profile-screen" class="overlay" style="display:none;">
            <h2>👤 プロフィール</h2>
            <div class="profile-input-group">
                <input type="text" id="name-input" maxlength="10" placeholder="なまえ" onchange="updateName(this.value)">
            </div>
            <div id="title-list" style="width:90%; height:40%; overflow-y:auto; background:#111;"></div>
            <button class="btn" onclick="openLayer('start-screen')" style="background:#444; width:100px; margin-top:10px;">戻る</button>
        </div>

        <div id="mission-screen" class="overlay" style="display:none;"><div id="mission-list"></div><button class="btn" onclick="openLayer('start-screen')">戻る</button></div>
        <div id="gacha-screen" class="overlay" style="display:none;"><div id="gacha-box">🎁</div><div id="gacha-result-display"></div><button class="btn" onclick="runGacha(1)">1回</button><button class="btn" onclick="openLayer('start-screen')">戻る</button></div>
        <div id="col-screen" class="overlay" style="display:none;"><div class="col-list" id="col-list-content"></div><button class="btn" onclick="openLayer('start-screen')">戻る</button></div>

        <div id="end-screen" class="overlay" style="display:none">
            <h2 id="end-title" style="color:red; font-size:30px;">GAME OVER</h2>
            <p>最終金額: <span id="res-money" style="font-size:24px; color:var(--gold);">0</span>円</p>
            <button class="btn btn-start" onclick="location.reload()" style="width:200px;">タイトルへ</button>
        </div>
    </div>

    <div class="bottom-ui">
        <div id="tsum-icon" onclick="triggerSkill()">👤</div>
        <div>
            <div id="skill-bar"><div id="skill-fill"></div></div>
            <div id="skill-display-name" style="font-size:10px; color:#aaa;">huh</div>
        </div>
    </div>

    <script>
        // --- Firebase 設定 (ご自身のものに書き換えてください) ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            databaseURL: "https://YOUR_PROJECT.firebaseio.com",
            projectId: "YOUR_PROJECT",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let money = 2000, timeLeft = 30.0, isPlaying = false, skillCount = 0;
        let feverPoints = 0, isFever = false, isSkillActive = false;
        let userName = "ぜん", currentTitle = "なし", roomId = null;
        let missionStats = { plucked: 0, gachaed: 0, earned: 0 };

        const items = [
            { id: 'c20', type: 'char', name: '普通のぜん', icon: '👤', owned: true, rarity: 'BASIC', info: '金1.2倍', rate: 1.2 },
            { id: 'c1', type: 'char', name: '覚醒ぜん', icon: '🔥', owned: false, rarity: 'SSR', info: '金10倍', rate: 10 },
            { id: 's1', type: 'skill', name: 'huh', owned: true, rarity: 'BASIC', info: '自動抜き' },
            { id: 'b1', type: 'bg', name: '草原', className: '', owned: true, rarity: 'BASIC' }
        ];

        let equipped = { char: items[0], bg: items[3], skill: items[2] };

        // --- オンライン対戦ロジック ---
        function joinOnlineRoom() {
            const id = document.getElementById('room-id-input').value.trim();
            if(!id) return alert("部屋名を入力してください");
            roomId = id;
            document.getElementById('opp-ui').style.display = 'block';
            
            // 相手のデータを監視
            db.ref(`rooms/${roomId}`).on('value', (snap) => {
                const players = snap.val();
                if(!players) return;
                for(let name in players) {
                    if(name !== userName) {
                        document.getElementById('opp-name').innerText = name;
                        document.getElementById('opp-score').innerText = Math.floor(players[name].score).toLocaleString();
                    }
                }
            });
            startGame();
        }

        function syncScore() {
            if(!roomId) return;
            db.ref(`rooms/${roomId}/${userName}`).set({
                score: money,
                timestamp: Date.now()
            });
        }

        // --- 基本ゲームロジック ---
        function updateUI() {
            document.getElementById('m-val').innerText = Math.floor(money).toLocaleString();
            document.getElementById('t-val').innerText = Math.max(0, timeLeft).toFixed(1);
            document.getElementById('fever-fill').style.width = feverPoints + "%";
            document.getElementById('skill-fill').style.width = skillCount + "%";
            document.getElementById('u-name-display').innerText = userName;
            document.getElementById('u-title-display').innerText = currentTitle;
        }

        function openLayer(id) {
            document.querySelectorAll('.overlay').forEach(l => l.style.display = 'none');
            if(id !== 'none') document.getElementById(id).style.display = 'flex';
        }

        function spawn() {
            if(!isPlaying) return;
            const field = document.getElementById('game-field');
            for(let i=0; i<8; i++) {
                const g = document.createElement('div'); g.className = 'item grass';
                g.style.left = Math.random()*85+"%"; g.style.top = Math.random()*80+"%";
                g.innerHTML = '<div class="grass-center"></div>';
                g.onclick = function(){ pluck(this); };
                field.appendChild(g);
            }
        }

        function pluck(el) {
            if(!isPlaying || el.style.opacity === "0") return;
            let gain = Math.floor(100 * equipped.char.rate * (isFever?3:1));
            money += gain;
            feverPoints = Math.min(100, feverPoints+7);
            if(feverPoints>=100 && !isFever) startFever();
            popText(el.style.left, el.style.top, `+${gain}`);
            el.style.opacity = "0"; 
            setTimeout(() => { 
                el.remove(); 
                if(document.querySelectorAll('.grass').length === 0) spawn(); 
            }, 100);
            updateUI();
            syncScore(); // オンライン同期
        }

        function popText(x, y, txt) {
            const p = document.createElement('div'); p.className='pop-text'; p.innerText=txt;
            p.style.left=x; p.style.top=y; document.getElementById('game-field').appendChild(p);
            setTimeout(()=>p.remove(),500);
        }

        function startGame() {
            isPlaying=true; timeLeft=30; money = 0; openLayer('none');
            spawn();
            const loop = setInterval(() => {
                if(!isFever) timeLeft-=0.1;
                skillCount = Math.min(100, skillCount + 0.5);
                updateUI();
                if(timeLeft<=0 || !isPlaying){
                    clearInterval(loop);
                    endGame();
                }
            }, 100);
        }

        function startFever() {
            isFever=true; 
            document.getElementById('game-field').style.filter="hue-rotate(180deg)";
            setTimeout(()=>{ isFever=false; feverPoints=0; document.getElementById('game-field').style.filter="none"; }, 5000);
        }

        function triggerSkill() {
            if(skillCount < 100) return;
            skillCount = 0; isSkillActive = true;
            const ts = document.querySelectorAll('.grass');
            ts.forEach(g => pluck(g));
            setTimeout(() => { isSkillActive = false; }, 1000);
        }

        function updateName(val) { userName = val || "ぜん"; saveGame(); updateUI(); }

        function endGame() {
            isPlaying = false;
            document.getElementById('res-money').innerText = Math.floor(money).toLocaleString();
            openLayer('end-screen');
            if(roomId) db.ref(`rooms/${roomId}/${userName}`).remove(); // 退室時にデータ削除
        }

        function saveGame() {
            localStorage.setItem('zenSaveOnline', JSON.stringify({money, userName, currentTitle}));
        }

        function loadGame() {
            const data = JSON.parse(localStorage.getItem('zenSaveOnline'));
            if(data) {
                userName = data.userName || "ぜん";
                currentTitle = data.currentTitle || "なし";
            }
            updateUI();
        }

        function giveUp() { isPlaying = false; location.reload(); }
    </script>
</body>
</html>
