<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>草抜きサバイバル - 究極合体 & 雷霆蒼破アップデート -</title>
    <style>
        :root { --zen-red: #ff0033; --gold: #ffd700; --grass-light: #7cfc00; --grass-dark: #2d5a27; --blue: #00d2ff; --fever-pink: #ff00ff; --bonus-color: #00ffcc; --uz-color: #ff0000; --x-color: #ffffff; }
        body { text-align: center; font-family: 'Arial Black', sans-serif; background-color: #000; color: white; margin: 0; overflow: hidden; touch-action: none; user-select: none; }
        .header { background: #111; padding: 10px; display: flex; justify-content: space-around; align-items: center; border-bottom: 2px solid #333; font-size: 14px; position: relative; }
        #fever-container { position: absolute; bottom: -5px; left: 0; width: 100%; height: 6px; background: #222; }
        #fever-fill { width: 0%; height: 100%; background: var(--fever-pink); transition: width 0.2s; box-shadow: 0 0 15px var(--fever-pink); }
        #game-field { position: relative; width: 95vw; height: 55vh; background: #1a2a1a; margin: 10px auto; border: 3px solid #333; border-radius: 20px; overflow: hidden; transition: 0.3s; }
        #game-field.bg-desert { background: #4d3319; border-color: #d2b48c; }
        #game-field.bg-cyber { background: #000520; border-color: #00d2ff; }
        #game-field.bg-volcano { background: #2b0000; border-color: #ff4500; }
        #game-field.bg-night { background: #0a0a20; border-color: #483d8b; }
        #game-field.bg-sakura { background: #2d1a1a; border-color: #ffb7c5; box-shadow: inset 0 0 50px #ffb7c533; }
        #game-field.bg-gold { background: #3d3300; border-color: #ffd700; }
        #game-field.bg-space { background: radial-gradient(circle, #1a1a3a 0%, #000 100%); border-color: #fff; }
        #game-field.bg-deepsea { background: #00121a; border-color: #008b8b; }
        #game-field.bg-dimension { background: #1a001a; border-color: #9400d3; animation: dim-pulse 5s infinite alternate; }
        @keyframes dim-pulse { from { background: #1a001a; } to { background: #00001a; } }
        .skill-active-field { animation: skill-shake 0.05s infinite, skill-flash 0.2s infinite alternate !important; border-width: 8px !important; }
        @keyframes skill-shake { 0% { transform: translate(4px, 4px); } 50% { transform: translate(-4px, -4px); } 100% { transform: translate(4px, -4px); } }
        @keyframes skill-flash { from { box-shadow: inset 0 0 50px rgba(255,255,255,0.5); border-color: #fff; } to { box-shadow: inset 0 0 150px rgba(255,255,255,1); border-color: #ff00ff; } }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #gacha-result-display { width: 85%; height: 140px; overflow-y: auto; background: #111; border: 1px solid #444; border-radius: 10px; margin: 10px 0; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
        .res-line { display: flex; justify-content: space-between; align-items: center; padding: 4px 10px; border-radius: 5px; background: #222; font-size: 12px; }
        .res-line.SSR { background: #443300; border: 1px solid var(--gold); color: var(--gold); animation: glow 1s infinite alternate; }
        .res-line.UZ { background: #300; border: 1px solid var(--uz-color); color: var(--uz-color); animation: uz-glow 0.5s infinite alternate; font-weight: bold; }
        .res-line.X { background: #000; border: 1px solid var(--x-color); color: var(--x-color); animation: x-glow 0.3s infinite alternate; font-weight: bold; }
        @keyframes glow { from { box-shadow: 0 0 2px var(--gold); } to { box-shadow: 0 0 10px var(--gold); } }
        @keyframes uz-glow { from { box-shadow: 0 0 5px var(--uz-color); } to { box-shadow: 0 0 20px var(--uz-color); } }
        @keyframes x-glow { from { box-shadow: 0 0 10px #fff, 0 0 20px #0ff; } to { box-shadow: 0 0 20px #fff, 0 0 40px #f0f; } }
        #gacha-box { font-size: 80px; filter: drop-shadow(0 0 20px white); cursor: pointer; position: relative; z-index: 600; transition: 0.3s; }
        .gacha-shake { animation: gacha-vibrate 0.1s infinite; }
        @keyframes gacha-vibrate { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(2px, 2px); } }
        .col-list { width: 90%; height: 45%; overflow-y: auto; background: #1a1a1a; border-radius: 10px; padding: 10px; border: 1px solid #444; }
        .col-item { background: #222; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid transparent; }
        .col-item.owned { border-left-color: var(--gold); }
        .equip-btn { padding: 6px 12px; border-radius: 15px; border: none; font-size: 10px; font-weight: bold; cursor: pointer; }
        .equipped { background: var(--grass-light) !important; color: #000; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; width: 85%; }
        .btn { padding: 12px; font-size: 14px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; }
        .btn-start { background: var(--gold); color: #000; grid-column: span 2; font-size: 20px; box-shadow: 0 0 15px var(--gold); }
        .pop-text { position: absolute; font-weight: bold; pointer-events: none; animation: pop-up-enhanced 0.5s forwards; z-index: 100; text-shadow: 2px 2px 0 black; font-size: 20px; }
        @keyframes pop-up-enhanced { 0% { transform: translateY(0); opacity: 0; } 100% { transform: translateY(-80px); opacity: 0; } }
        .bottom-ui { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px; }
        #tsum-icon { width: 70px; height: 70px; border: 4px solid #444; border-radius: 50%; font-size: 35px; display: flex; align-items: center; justify-content: center; background: #222; }
        .ready #tsum-icon { border-color: var(--zen-red); animation: pulse 0.4s infinite alternate; cursor: pointer; }
        #skill-bar { width: 140px; height: 18px; background: #222; border-radius: 10px; overflow: hidden; border: 2px solid #444; }
        #skill-fill { width: 0%; height: 100%; background: #f00; transition: 0.1s; }
        .item { position: absolute; z-index: 10; cursor: pointer; }
        .grass { width: 75px; height: 75px; background: var(--grass-dark); border-radius: 50% 50% 0 0; }
        .egg { width: 70px; height: 70px; font-size: 50px; display: flex; align-items: center; justify-content: center; }
        .x-aura { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 400; display: none; background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, rgba(255,0,255,0.1) 100%); }
    </style>
</head>
<body onload="loadGame()">
    <div class="header">
        <button onclick="giveUp()" style="background:#444; color:white; border:none; padding:5px; font-size:10px;">リタイア</button>
        <div>💰 <span id="m-val">0</span></div>
        <div style="font-size: 18px; font-weight: bold; color: #ffcc00;">⏳ <span id="t-val">30.0</span></div>
        <div id="fever-container"><div id="fever-fill"></div></div>
    </div>

    <div id="game-field">
        <div id="x-aura-effect" class="x-aura"></div>
        <div id="start-screen" class="overlay">
            <h1 id="game-title" style="color:var(--gold); margin:0;">草抜きサバイバル</h1>
            <div id="profile-info-display"><span id="u-name-display">ぜん</span> <br> <small>称号：<span id="u-title-display">なし</span></small></div>
            <div class="btn-group">
                <button class="btn btn-start" onclick="startGame()">START</button>
                <button class="btn" style="background:#ff4500;" onclick="openLayer('gacha-screen')">GACHA</button>
                <button class="btn" style="background:var(--blue);" onclick="openLayer('col-screen')">COLLECTION</button>
                <button class="btn" style="background:#8a2be2;" onclick="openLayer('evolve-screen')">🧬 進化</button>
                <button class="btn" style="background:linear-gradient(45deg, #ff00ff, #00ffff);" onclick="openLayer('fusion-screen')">🌀 合体</button>
            </div>
        </div>

        <div id="fusion-screen" class="overlay" style="display:none;">
            <h2 style="color:cyan;">🌀 キャラクター合体</h2>
            <div style="background:#222; padding:15px; border-radius:15px; width:85%; font-size:11px;">
                <p id="fuse-cond-1">・ｺﾞｯﾄﾞﾈスカズキング(UZ) 所持</p>
                <p id="fuse-cond-2">・ﾏｷｼﾏﾑZEN(UZ) 所持</p>
                <p id="fuse-cond-3">・費用: 1兆円</p>
            </div>
            <div id="fusion-result-preview" style="margin:15px; font-size:14px; color:var(--gold);"></div>
            <button class="btn" id="fusion-exec-btn" onclick="executeFusion()" style="background:#fff; color:#000; width:200px; display:none;">フュージョン！</button>
            <button class="btn" onclick="openLayer('start-screen')" style="background:#444; width:100px; margin-top:10px;">戻る</button>
        </div>

        <div id="evolve-screen" class="overlay" style="display:none;">
            <h2 style="color:#8a2be2;">🧬 キャラクター進化</h2>
            <div id="evolve-status" style="background:#222; padding:20px; border-radius:15px; width:80%; margin-bottom:15px;"></div>
            <button class="btn" id="evolve-exec-btn" onclick="executeEvolve()" style="background:#ffd700; color:#000; width:180px; display:none;">進化させる！</button>
            <button class="btn" onclick="openLayer('start-screen')" style="background:#444; width:100px;">戻る</button>
        </div>

        <div id="gacha-screen" class="overlay" style="display:none;">
            <div id="gacha-box">🎁</div>
            <div id="gacha-result-display"></div>
            <button class="btn" onclick="runGacha(1)" style="background:#ff4500; width:200px; margin:5px;">1回 (1,000円)</button>
            <button class="btn" onclick="runGacha(10)" style="background:#ff8c00; width:200px; margin:5px;">10連 (10,000円)</button>
            <button class="btn" onclick="openLayer('start-screen')" style="margin-top:10px; background:#444; width:100px;">戻る</button>
        </div>

        <div id="col-screen" class="overlay" style="display:none;">
            <h2>COLLECTION</h2>
            <div class="col-list" id="col-list-content"></div>
            <button class="btn" onclick="openLayer('start-screen')" style="margin-top:10px; background:#444; width:100px;">戻る</button>
        </div>

        <div id="end-screen" class="overlay" style="display:none">
            <h2 style="color:red; font-size:40px;">GAME OVER</h2>
            <p>最終金額: <span id="res-money" style="font-size:24px; color:var(--gold);">0</span>円</p>
            <button class="btn btn-start" onclick="openLayer('start-screen')" style="width:200px;">戻る</button>
        </div>
    </div>

    <div class="bottom-ui">
        <div id="tsum-icon" onclick="triggerSkill()">👤</div>
        <div>
            <div id="skill-bar"><div id="skill-fill"></div></div>
            <div id="skill-display-name" style="font-size:10px; color:#aaa;">huh</div>
        </div>
    </div>

    <script>
        let money = 2000, timeLeft = 30.0, isPlaying = false, skillCount = 0;
        let feverPoints = 0, isFever = false, isSkillActive = false;
        let userName = "ぜん", currentTitle = "なし";

        const items = [
            { id: 'fusion_zen_kazu', type: 'char', name: 'アルティメット・カズキング・ZEN', icon: '☯️', owned: false, rarity: 'X', info: '合体：金100万倍/卵抜き/雷霆で卵破壊/必殺即チャージ', rate: 1000000, isEvolved: true },
            { id: 'ev_kazu_ultimate', type: 'char', name: 'ゴッドネスカズキングタイジュウフエターネキンギーニ', icon: '🌌', owned: false, rarity: 'UZ', info: '進化：金100000倍/全スキル自動発動/不死身', rate: 100000, isEvolved: true },
            { id: 'c1_ultimate', type: 'char', name: 'マキシマムZEN', icon: '👹', owned: false, rarity: 'UZ', info: '進化：金100倍/卵無効', rate: 100, isEvolved: true },
            { id: 'c_seimaro_uz', type: 'char', name: 'ゴッドネスせいまろ', icon: '⚡🐕', owned: false, rarity: 'UZ', info: '進化：金100倍/卵で5秒1万倍/雷霆蒼破', rate: 100, isEvolved: true },
            { id: 'ev_kazu', type: 'char', name: 'カズキングタイジュウフエターネキンギーニ', icon: '👑', owned: false, rarity: 'SSR', info: '限定：卵抜きOK/金45倍/huh強化/必殺超速', rate: 45, isEvent: true },
            { id: 'c_seimaro', type: 'char', name: 'せいまろ', icon: '🐕‍🦺', owned: false, rarity: 'SSR', info: '金10倍/卵で5秒1万倍/huhで雷', rate: 10 },
            { id: 'c1', type: 'char', name: '覚醒ぜん', icon: '🔥', owned: false, rarity: 'SSR', info: '金10倍/卵無効', rate: 10 },
            { id: 'c20', type: 'char', name: '普通のぜん', icon: '👤', owned: true, rarity: 'BASIC', info: '金1.2倍', rate: 1.2 },
            { id: 's1', type: 'skill', name: 'huh', owned: true, rarity: 'BASIC', info: '自動抜き' },
            { id: 's_raitei', type: 'skill', name: '雷霆蒼破', owned: false, rarity: 'UZ', info: '蒼い雷とスイーツが舞い、草を消滅させる' },
            { id: 's3', type: 'skill', name: 'カズキング・ザ・ワールド', owned: false, rarity: 'UZ', info: '時を止めて草を一掃' }
        ];

        let equipped = { char: items.find(i => i.id === 'c20'), skill: items.find(i => i.id === 's1') };

        function updateUI() {
            document.getElementById('m-val').innerText = Math.floor(money).toLocaleString();
            document.getElementById('t-val').innerText = Math.max(0, timeLeft).toFixed(1);
            document.getElementById('fever-fill').style.width = feverPoints + "%";
            document.getElementById('skill-fill').style.width = skillCount + "%";
            document.querySelector('.bottom-ui').classList.toggle('ready', skillCount >= 100);
        }

        function openLayer(id) {
            document.querySelectorAll('.overlay').forEach(l => l.style.display = 'none');
            if(id !== 'none') document.getElementById(id).style.display = 'flex';
            if(id === 'col-screen') renderCol();
            if(id === 'evolve-screen') renderEvolve();
            if(id === 'fusion-screen') renderFusion();
        }

        function renderFusion() {
            const char1 = items.find(i => i.id === 'ev_kazu_ultimate'); 
            const char2 = items.find(i => i.id === 'c1_ultimate');
            const cost = 1000000000000;
            const btn = document.getElementById('fusion-exec-btn');
            document.getElementById('fuse-cond-1').style.color = char1.owned ? "lime" : "red";
            document.getElementById('fuse-cond-2').style.color = char2.owned ? "lime" : "red";
            document.getElementById('fuse-cond-3').style.color = money >= cost ? "lime" : "red";
            if(char1.owned && char2.owned && money >= cost) btn.style.display = "block";
        }

        function executeFusion() {
            const cost = 1000000000000; if(money < cost) return; money -= cost;
            items.find(i => i.id === 'fusion_zen_kazu').owned = true;
            alert("究極合体成功！"); openLayer('start-screen'); saveGame();
        }

        function renderEvolve() {
            const target = document.getElementById('evolve-status');
            const btn = document.getElementById('evolve-exec-btn');
            if(equipped.char.rarity === 'SSR') {
                target.innerHTML = `<p>進化対象：${equipped.char.name}</p><p>費用: 1億円</p>`;
                btn.style.display = "block";
            } else { target.innerHTML = `<p>進化対象がいません</p>`; btn.style.display = "none"; }
        }

        function executeEvolve() {
            if(money < 100000000) return; money -= 100000000;
            let evolveId = '';
            if(equipped.char.id === 'ev_kazu') evolveId = 'ev_kazu_ultimate';
            else if(equipped.char.id === 'c1') evolveId = 'c1_ultimate';
            else if(equipped.char.id === 'c_seimaro') { evolveId = 'c_seimaro_uz'; items.find(i => i.id === 's_raitei').owned = true; }
            if(evolveId) { items.find(i => i.id === evolveId).owned = true; alert("進化成功！"); }
            openLayer('start-screen'); saveGame();
        }

        function renderCol() {
            const list = document.getElementById('col-list-content'); list.innerHTML = '';
            items.filter(i => i.type === 'char').forEach(item => {
                const isEq = equipped.char.id === item.id;
                const div = document.createElement('div'); div.className = `col-item ${item.owned ? 'owned' : ''}`;
                div.innerHTML = `<div>${item.owned ? item.icon : '？'} ${item.owned ? item.name : '？？？'}</div><button class="equip-btn ${isEq ? 'equipped' : ''}" onclick="equip('${item.id}')" ${item.owned ? '' : 'disabled'}>${isEq ? '選択中' : '選択'}</button>`;
                list.appendChild(div);
            });
        }

        function equip(id) { equipped.char = items.find(i => i.id === id); if(equipped.char.id==='ev_kazu_ultimate') equipped.skill=items.find(i=>i.id==='s3'); renderCol(); saveGame(); }

        async function runGacha(times) {
            if(money < 1000 * times) return alert("金欠！"); money -= 1000 * times;
            const now = new Date(); const isCampaign = now <= new Date('2026-03-27T00:00:00');
            const display = document.getElementById('gacha-result-display'); display.innerHTML = '';
            for(let i=0; i<times; i++) {
                const r = Math.random() * 100; let pick;
                if(isCampaign && r < 1.0) pick = items.find(i => i.id === 'c_seimaro');
                else if(r < 0.001) pick = items.find(i => i.id === 'ev_kazu'); // 10万分の1
                else if(r < 5) pick = items.find(i => i.rarity === 'SSR' && i.id !== 'c_seimaro');
                else pick = items.find(i => i.id === 'c20');
                if(pick) pick.owned = true;
                const l = document.createElement('div'); l.innerText = pick.name; display.appendChild(l);
            }
            saveGame(); updateUI();
        }

        function startGame() {
            isPlaying = true; timeLeft = 30; openLayer('none');
            if(equipped.char.rarity==='X') document.getElementById('x-aura-effect').style.display='block';
            spawn();
            const loop = setInterval(() => {
                timeLeft -= 0.1; skillCount = Math.min(100, skillCount + (equipped.char.rarity==='X'?5:0.5));
                updateUI(); if(timeLeft<=0 || !isPlaying){ clearInterval(loop); document.getElementById('x-aura-effect').style.display='none'; endGame(); }
            }, 100);
        }

        function spawn() {
            if(!isPlaying) return;
            for(let i=0; i<5; i++) {
                const g = document.createElement('div'); g.className = 'item grass';
                g.style.left = Math.random()*85+"%"; g.style.top = Math.random()*80+"%";
                g.onclick = function(){ pluck(this); }; document.getElementById('game-field').appendChild(g);
            }
            const egg = document.createElement('div'); egg.className = 'item egg'; egg.innerText = '🥚';
            egg.style.left = Math.random()*85+"%"; egg.style.top = Math.random()*80+"%";
            egg.onclick = function(){
                if(equipped.char.id === 'c_seimaro' || equipped.char.id === 'c_seimaro_uz') {
                    const oldRate = equipped.char.rate; equipped.char.rate = 10000;
                    popText(this.style.left, this.style.top, "10000倍！", "pink");
                    setTimeout(() => equipped.char.rate = oldRate, 5000); this.remove();
                } else if(equipped.char.rarity === 'SSR' || equipped.char.rarity === 'UZ' || equipped.char.rarity === 'X') { this.remove(); }
                else { isPlaying = false; }
            };
            document.getElementById('game-field').appendChild(egg);
        }

        function pluck(el) {
            let gain = 100 * equipped.char.rate; money += gain;
            popText(el.style.left, el.style.top, `+${gain}`); el.remove();
            if(document.querySelectorAll('.grass').length === 0) spawn();
            updateUI();
        }

        function triggerSkill() {
            if(skillCount < 100) return; skillCount = 0; isSkillActive = true;
            const field = document.getElementById('game-field');
            if(equipped.skill.id === 's_raitei' || (equipped.char.id==='fusion_zen_kazu' && equipped.skill.id==='s_raitei')) {
                const isUlt = equipped.char.id === 'fusion_zen_kazu' || equipped.char.id === 'c_seimaro_uz';
                field.style.animation = "skill-shake 0.02s infinite";
                const style = document.createElement('style'); style.id="raitei-style";
                style.innerHTML = `@keyframes raitei-flash { 0% { background: #000; } 50% { background: #00d2ff; } 100% { background: #000; } }`;
                document.head.appendChild(style); field.style.animation += ", raitei-flash 0.1s infinite";
                const interval = setInterval(() => {
                    document.querySelectorAll('.grass').forEach((g, i) => { if(i<10) pluck(g); });
                    if(isUlt) document.querySelectorAll('.egg').forEach(e => e.remove());
                }, 50);
                setTimeout(() => { clearInterval(interval); field.style.animation = ""; document.getElementById('raitei-style').remove(); isSkillActive = false; }, 4000);
            } else { /* その他スキル処理 */ isSkillActive = false; }
        }

        function popText(x, y, txt, color="gold") {
            const p = document.createElement('div'); p.className='pop-text'; p.innerText=txt;
            p.style.left=x; p.style.top=y; p.style.color=color;
            document.getElementById('game-field').appendChild(p); setTimeout(()=>p.remove(),500);
        }

        function endGame() { isPlaying = false; document.getElementById('res-money').innerText = Math.floor(money).toLocaleString(); openLayer('end-screen'); saveGame(); }
        function giveUp() { isPlaying = false; openLayer('start-screen'); }
        function saveGame() { localStorage.setItem('zenSave', JSON.stringify({ money, owned: items.filter(i=>i.owned).map(i=>i.id), eq: equipped.char.id })); }
        function loadGame() {
            const data = JSON.parse(localStorage.getItem('zenSave'));
            if(data) {
                money = data.money; data.owned.forEach(id => { const it=items.find(i=>i.id===id); if(it)it.owned=true; });
                equipped.char = items.find(i=>i.id===data.eq) || equipped.char;
            }
            updateUI();
        }
    </script>
</body>
</html>
