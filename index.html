<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>草抜きサバイバル - オンライン対戦復活版 -</title>
    <style>
        :root { --zen-red: #ff0033; --gold: #ffd700; --grass-light: #7cfc00; --grass-dark: #2d5a27; --blue: #00d2ff; --fever-pink: #ff00ff; --bonus-color: #00ffcc; --uz-color: #ff0000; --x-color: #ffffff; }
        body { 
            text-align: center; font-family: 'Arial Black', sans-serif; 
            background-color: #000; color: white; 
            margin: 0; overflow: hidden; touch-action: none; user-select: none;
        }

        .header { background: #111; padding: 10px; display: flex; justify-content: space-around; align-items: center; border-bottom: 2px solid #333; font-size: 14px; position: relative; }
        #fever-container { position: absolute; bottom: -5px; left: 0; width: 100%; height: 6px; background: #222; }
        #fever-fill { width: 0%; height: 100%; background: var(--fever-pink); transition: width 0.2s; box-shadow: 0 0 15px var(--fever-pink); }

        #game-field { 
            position: relative; width: 95vw; height: 55vh; 
            background: #1a2a1a; margin: 10px auto; 
            border: 3px solid #333; border-radius: 20px; overflow: hidden;
            transition: 0.3s;
        }
        /* 背景バリエーション */
        #game-field.bg-desert { background: #4d3319; border-color: #d2b48c; }
        #game-field.bg-cyber { background: #000520; border-color: #00d2ff; }
        #game-field.bg-volcano { background: #2b0000; border-color: #ff4500; }
        #game-field.bg-night { background: #0a0a20; border-color: #483d8b; }
        #game-field.bg-sakura { background: #2d1a1a; border-color: #ffb7c5; box-shadow: inset 0 0 50px #ffb7c533; }
        #game-field.bg-gold { background: #3d3300; border-color: #ffd700; }
        #game-field.bg-space { background: radial-gradient(circle, #1a1a3a 0%, #000 100%); border-color: #fff; }
        #game-field.bg-deepsea { background: #00121a; border-color: #008b8b; }
        #game-field.bg-dimension { background: #1a001a; border-color: #9400d3; animation: dim-pulse 5s infinite alternate; }
        @keyframes dim-pulse { from { background: #1a001a; } to { background: #00001a; } }

        .skill-active-field { animation: skill-shake 0.05s infinite, skill-flash 0.2s infinite alternate !important; border-width: 8px !important; }
        .ultimate-field-bg { animation: ultimate-rainbow 0.2s infinite linear !important; }
        @keyframes ultimate-rainbow { 0% { background: #ff0000; } 20% { background: #ffff00; } 40% { background: #00ff00; } 60% { background: #00ffff; } 80% { background: #0000ff; } 100% { background: #ff00ff; } }
        @keyframes skill-shake { 0% { transform: translate(4px, 4px); } 50% { transform: translate(-4px, -4px); } 100% { transform: translate(4px, -4px); } }
        @keyframes skill-flash { from { box-shadow: inset 0 0 50px rgba(255,255,255,0.5); border-color: #fff; } to { box-shadow: inset 0 0 150px rgba(255,255,255,1); border-color: #ff00ff; } }
        .skill-icon-anim { animation: skill-icon-pop 0.3s infinite linear !important; z-index: 1000; }
        @keyframes skill-icon-pop { 0% { transform: scale(2) rotate(0deg); filter: brightness(3) drop-shadow(0 0 30px gold); } 100% { transform: scale(2) rotate(360deg); filter: brightness(3) drop-shadow(0 0 30px white); } }
        .ultimate-text { position: absolute; width: 100%; top: 40%; left: 0; text-align: center; font-size: 50px; color: white; font-weight: bold; z-index: 1001; pointer-events: none; text-shadow: 0 0 20px #000, 0 0 40px #ff0000; animation: text-zoom 0.5s ease-out forwards; }
        @keyframes text-zoom { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1.2); opacity: 1; } }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        #gacha-result-display { width: 85%; height: 140px; overflow-y: auto; background: #111; border: 1px solid #444; border-radius: 10px; margin: 10px 0; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
        .res-line { display: flex; justify-content: space-between; align-items: center; padding: 4px 10px; border-radius: 5px; background: #222; font-size: 12px; }
        .res-line.SSR { background: #443300; border: 1px solid var(--gold); color: var(--gold); animation: glow 1s infinite alternate; }
        .res-line.UZ { background: #300; border: 1px solid var(--uz-color); color: var(--uz-color); animation: uz-glow 0.5s infinite alternate; font-weight: bold; }
        .res-line.X { background: #000; border: 1px solid var(--x-color); color: var(--x-color); animation: x-glow 0.3s infinite alternate; font-weight: bold; }
        @keyframes glow { from { box-shadow: 0 0 2px var(--gold); } to { box-shadow: 0 0 10px var(--gold); } }
        @keyframes uz-glow { from { box-shadow: 0 0 5px var(--uz-color); } to { box-shadow: 0 0 20px var(--uz-color); } }
        @keyframes x-glow { from { box-shadow: 0 0 10px #fff, 0 0 20px #0ff; } to { box-shadow: 0 0 20px #fff, 0 0 40px #f0f; } }

        #gacha-box { font-size: 80px; filter: drop-shadow(0 0 20px white); cursor: pointer; position: relative; z-index: 600; transition: 0.3s; }
        .gacha-shake { animation: gacha-vibrate 0.1s infinite; }
        @keyframes gacha-vibrate { 0% { transform: translate(2px, 2px) rotate(0deg); } 25% { transform: translate(-2px, -2px) rotate(1deg); } 50% { transform: translate(2px, -2px) rotate(-1deg); } 75% { transform: translate(-2px, 2px) rotate(0deg); } 100% { transform: translate(2px, 2px) rotate(0deg); } }
        .gacha-flash { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 700; display: none; }

        .col-tabs { display: flex; width: 95%; gap: 5px; margin-bottom: 10px; }
        .tab-btn { flex: 1; padding: 10px 5px; font-size: 11px; background: #333; color: white; border: 2px solid #444; border-radius: 5px; transition: 0.2s; opacity: 0.6; }
        .tab-btn.active { background: var(--blue); border-color: #fff; opacity: 1; font-weight: bold; box-shadow: 0 0 10px var(--blue); }
        
        .col-list { width: 90%; height: 45%; overflow-y: auto; background: #1a1a1a; border-radius: 10px; padding: 10px; border: 1px solid #444; }
        .col-item { background: #222; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid transparent; }
        .col-item.owned { border-left-color: var(--gold); }
        .col-item.UZ { border-left-color: var(--uz-color); }
        .col-item.X { border-left-color: var(--x-color); animation: x-border 0.5s infinite; }
        @keyframes x-border { 0% { border-left-color: #fff; } 50% { border-left-color: #0ff; } 100% { border-left-color: #f0f; } }
        .equip-btn { padding: 6px 12px; border-radius: 15px; border: none; font-size: 10px; font-weight: bold; cursor: pointer; }
        .equipped { background: var(--grass-light) !important; color: #000; }

        .bonus-info { background: #222; width: 90%; padding: 8px; border-radius: 10px; margin-bottom: 10px; font-size: 11px; color: var(--bonus-color); border: 1px solid #444; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; width: 90%; }
        .btn { padding: 10px; font-size: 13px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.1s; }
        .btn-start { background: var(--gold); color: #000; grid-column: span 1; font-size: 16px; box-shadow: 0 0 10px var(--gold); }
        .btn-online { background: var(--zen-red); color: white; grid-column: span 1; font-size: 16px; box-shadow: 0 0 15px var(--zen-red); animation: pulse 1s infinite alternate; }
        .btn-gacha { background: #ff4500; color: white; }
        .btn-col { background: var(--blue); color: white; }
        .btn-evolve { background: #8a2be2; color: white; font-size: 11px; }
        .btn-fusion { background: linear-gradient(45deg, #ff00ff, #00ffff); color: white; font-size: 11px; text-shadow: 1px 1px 2px #000; }
        .btn-mission { background: #00cc66; color: white; font-size: 11px; }
        .btn-title { background: #666; color: white; font-size: 11px; }

        /* オンライン用ランキング表示 */
        #online-rank-box { position: absolute; top: 10px; right: 10px; width: 120px; background: rgba(0,0,0,0.7); border: 1px solid #444; border-radius: 5px; font-size: 10px; text-align: left; padding: 5px; z-index: 100; pointer-events: none; display: none; }
        .rank-row { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 2px 0; }
        .rank-row.me { color: var(--gold); font-weight: bold; }

        .pop-text { position: absolute; font-weight: bold; pointer-events: none; animation: pop-up-enhanced 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; z-index: 100; text-shadow: 2px 2px 0 black; font-size: 20px; }
        @keyframes pop-up-enhanced { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 50% { opacity: 1; transform: translateY(-40px) scale(1.4); } 100% { transform: translateY(-80px) scale(1.1); opacity: 0; } }

        .particle { position: absolute; width: 8px; height: 8px; background: var(--grass-light); pointer-events: none; z-index: 90; border-radius: 2px; }
        @keyframes scatter { to { transform: translate(var(--dx), var(--dy)) rotate(360deg); opacity: 0; } }

        .bottom-ui { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px; }
        #tsum-icon { width: 70px; height: 70px; border: 4px solid #444; border-radius: 50%; font-size: 35px; display: flex; align-items: center; justify-content: center; background: #222; transition: 0.2s; }
        .ready #tsum-icon { border-color: var(--zen-red); animation: pulse 0.4s infinite alternate; cursor: pointer; }
        #skill-bar { width: 140px; height: 18px; background: #222; border-radius: 10px; overflow: hidden; border: 2px solid #444; }
        #skill-fill { width: 0%; height: 100%; background: #f00; transition: 0.1s; }

        .item { position: absolute; z-index: 10; cursor: pointer; transition: transform 0.1s; }
        .plucking { animation: slice-anim 0.2s ease-out forwards; pointer-events: none; }
        @keyframes slice-anim { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.5); filter: brightness(2); } 100% { transform: scale(0); opacity: 0; } }

        .grass { width: 75px; height: 75px; }
        .grass::before, .grass::after { content: ''; position: absolute; width: 25px; height: 45px; background: var(--grass-dark); border-radius: 50% / 80% 80% 20% 20%; bottom: 5px; pointer-events: none; }
        .grass::before { transform: rotate(-35deg); left: 10px; }
        .grass::after { transform: rotate(35deg); right: 10px; }
        .grass-center { position: absolute; width: 30px; height: 60px; background: var(--grass-light); border-radius: 50% / 80% 80% 20% 20%; left: 50%; transform: translateX(-50%); bottom: 10px; pointer-events: none; }
        
        .egg { width: 70px; height: 70px; font-size: 50px; display: flex; align-items: center; justify-content: center; filter: drop-shadow(0 0 5px white); animation: egg-shake 0.5s ease-in-out infinite alternate; }
        @keyframes egg-shake { 0% { transform: rotate(-10deg) scale(0.9); } 100% { transform: rotate(10deg) scale(1.1); } }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }
        
        .x-aura { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 400; display: none; background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, rgba(0,255,255,0.1) 50%, rgba(255,0,255,0.1) 100%); animation: aura-spin 2s linear infinite; }
        @keyframes aura-spin { from { transform: rotate(0deg); filter: hue-rotate(0deg); } to { transform: rotate(360deg); filter: hue-rotate(360deg); } }

        #title-display { font-size: 11px; color: var(--gold); margin-top: 5px; background: rgba(255,215,0,0.1); padding: 2px 8px; border-radius: 10px; display: inline-block; border: 1px solid var(--gold); }
        .title-item { width: 85%; background: #222; border: 1px solid #444; border-radius: 8px; padding: 10px; margin: 5px 0; display: flex; justify-content: space-between; align-items: center; }
        .title-item.locked { opacity: 0.5; filter: grayscale(1); }

        .mission-item { background: #222; border: 1px solid #444; border-radius: 10px; margin: 8px 0; padding: 12px; width: 85%; display: flex; flex-direction: column; align-items: flex-start; gap: 5px; }
        .mission-progress { width: 100%; height: 10px; background: #333; border-radius: 5px; overflow: hidden; }
        .mission-fill { height: 100%; background: #00cc66; transition: 0.3s; }
        .mission-reward-btn { align-self: flex-end; padding: 5px 15px; border-radius: 15px; border: none; font-weight: bold; font-size: 12px; cursor: pointer; }
        .can-claim { background: var(--gold); color: #000; }
        .claimed { background: #444; color: #888; cursor: default; }

        input#nick-input { background: #222; border: 1px solid var(--gold); color: white; padding: 10px; border-radius: 10px; text-align: center; font-size: 18px; width: 200px; margin-bottom: 20px; }
    </style>
</head>
<body onload="loadGame()">
    <div class="header">
        <button onclick="giveUp()" style="background:#444; color:white; border:none; padding:5px; font-size:10px; border-radius:3px;">リタイア</button>
        <div>💰 <span id="m-val">0</span></div>
        <div style="font-size: 18px; font-weight: bold; color: #ffcc00;">⏳ <span id="t-val">30.0</span></div>
        <div id="fever-container"><div id="fever-fill"></div></div>
    </div>

    <div id="game-field">
        <div id="x-aura-effect" class="x-aura"></div>
        <div id="gacha-flash-overlay" class="gacha-flash"></div>

        <div id="online-rank-box"></div>

        <div id="start-screen" class="overlay">
            <h1 id="game-title" style="color:var(--gold); margin:0; font-size: 24px;">草抜きサバイバル</h1>
            <div id="title-display">称号：なし</div>
            <div id="nick-display" style="font-size: 12px; margin: 5px; color: cyan; cursor: pointer;" onclick="openLayer('name-screen')">👤 名無しの草抜き師</div>
            <div class="btn-group">
                <button class="btn btn-start" onclick="startGame(false)">SOLO START</button>
                <button class="btn btn-online" onclick="startGame(true)">ONLINE BATTLE</button>
                <button class="btn btn-mission" onclick="openLayer('mission-screen')">ミッション <span id="mission-alert" style="color:red; display:none;">●</span></button>
                <button class="btn btn-title" onclick="openLayer('title-screen')">称号変更</button>
                <button class="btn btn-gacha" onclick="openLayer('gacha-screen')">ガチャ</button>
                <button class="btn btn-col" onclick="openLayer('col-screen')">図鑑</button>
                <button class="btn btn-evolve" onclick="openLayer('evolve-screen')">進化</button>
                <button class="btn btn-fusion" onclick="openLayer('fusion-screen')">合体</button>
            </div>
        </div>

        <div id="name-screen" class="overlay" style="display:none;">
            <h2 style="color:var(--gold);">ニックネーム登録</h2>
            <input type="text" id="nick-input" maxlength="10" placeholder="名前を入力">
            <button class="btn btn-start" onclick="saveNick()" style="width: 150px;">決定</button>
        </div>

        <div id="title-screen" class="overlay" style="display:none;">
            <h2 style="color:var(--gold);">🎖️ 獲得称号</h2>
            <div id="title-list" style="width:100%; height:65%; overflow-y:auto; display:flex; flex-direction:column; align-items:center;"></div>
            <button class="btn" onclick="openLayer('start-screen')" style="background:#444; width:100px; margin-top:10px;">戻る</button>
        </div>

        <div id="mission-screen" class="overlay" style="display:none;">
            <h2 style="color:#00cc66;">📅 デイリーミッション</h2>
            <div id="mission-list" style="width: 100%; display: flex; flex-direction: column; align-items: center; overflow-y: auto; height: 60%;"></div>
            <button class="btn" onclick="openLayer('start-screen')" style="background:#444; width:100px; margin-top:10px;">戻る</button>
        </div>

        <div id="fusion-screen" class="overlay" style="display:none;">
            <h2 style="color:cyan;">🌀 キャラクター合体</h2>
            <div style="background:#222; padding:15px; border-radius:15px; width:85%; font-size:11px;">
                <p id="fuse-cond-1">・ｺﾞｯﾄﾞﾈｽｶｽﾞｷﾝｸﾞ(UZ) 所持</p>
                <p id="fuse-cond-2">・ﾏｷｼﾏﾑZEN(UZ) 所持</p>
                <p id="fuse-cond-3">・費用: 1兆円</p>
            </div>
            <div id="fusion-result-preview" style="margin:15px; font-size:14px; color:var(--gold);"></div>
            <button class="btn" id="fusion-exec-btn" onclick="executeFusion()" style="background:white; color:#000; width:200px; display:none;">フュージョン！</button>
            <button class="btn" onclick="openLayer('start-screen')" style="background:#444; width:100px; margin-top:10px;">戻る</button>
        </div>

        <div id="evolve-screen" class="overlay" style="display:none;">
            <h2 style="color:#8a2be2;">🧬 キャラクター進化</h2>
            <div id="evolve-status" style="background:#222; padding:20px; border-radius:15px; width:80%; margin-bottom:15px;"></div>
            <button class="btn" id="evolve-exec-btn" onclick="executeEvolve()" style="background:#ffd700; color:#000; width:180px; margin-bottom:10px; display:none;">進化させる！</button>
            <button class="btn" onclick="openLayer('start-screen')" style="background:#444; width:100px;">戻る</button>
        </div>

        <div id="gacha-screen" class="overlay" style="display:none;">
            <div id="gacha-box">🎁</div>
            <div id="gacha-result-display"></div>
            <div style="display:flex; flex-direction:column; gap:5px; width: 220px;">
                <button class="btn btn-gacha" onclick="runGacha(1)">1回 (1,000円)</button>
                <button class="btn btn-gacha" onclick="runGacha(10)" style="background:#ff8c00;">10連 (1万円)</button>
                <button class="btn btn-gacha" onclick="runGacha(100)" style="background:#800080;">100連 (10万円)</button>
                <button class="btn btn-gacha" onclick="runGacha(1000)" style="background:#4b0082; border: 2px solid var(--gold);">👑 1000連 (100万円)</button>
            </div>
            <button class="btn" onclick="openLayer('start-screen')" style="margin-top:10px; background:#444; width:100px;">戻る</button>
        </div>

        <div id="col-screen" class="overlay" style="display:none;">
            <h2>COLLECTION</h2>
            <div class="bonus-info" id="collection-bonus-display"></div>
            <div class="col-tabs">
                <button class="tab-btn active" id="tab-char" onclick="setTab('char')">キャラ</button>
                <button class="tab-btn" id="tab-bg" onclick="setTab('bg')">背景</button>
                <button class="tab-btn" id="tab-skill" onclick="setTab('skill')">技</button>
            </div>
            <div class="col-list" id="col-list-content"></div>
            <button class="btn" onclick="openLayer('start-screen')" style="margin-top:10px; background:#444; width:100px;">戻る</button>
        </div>

        <div id="end-screen" class="overlay" style="display:none">
            <h2 id="end-title" style="color:red; font-size:40px;">GAME OVER</h2>
            <p id="online-res-rank" style="color:var(--gold); font-size:20px; font-weight:bold;"></p>
            <p>最終金額: <span id="res-money" style="font-size:24px; color:var(--gold);">0</span>円</p>
            <button class="btn btn-start" onclick="openLayer('start-screen')" style="width:200px;">リトライ</button>
        </div>
    </div>

    <div class="bottom-ui">
        <div id="tsum-icon" onclick="triggerSkill()">👤</div>
        <div>
            <div id="skill-bar"><div id="skill-fill"></div></div>
            <div id="skill-display-name" style="font-size:10px; color:#aaa;">huh</div>
        </div>
    </div>

    <script>
        let money = 2000, timeLeft = 30.0, isPlaying = false, skillCount = 0, currentTab = 'char';
        let feverPoints = 0, isFever = false, isSkillActive = false;
        let missions = [], missionStats = { plucked: 0, gachaed: 0, earned: 0 }, lastMissionDate = "";
        let nickname = "名無しの草抜き師", isOnlineMode = false, pluckedInGame = 0;
        let enemyData = [];

        let currentTitle = "なし";
        const titles = [
            { name: "草抜き初心者", cond: "所持金が1,000円を超える", check: () => money > 1000 },
            { name: "ZENの友達", cond: "キャラを5種類集める", check: () => items.filter(i => i.type==='char' && i.owned).length >= 5 },
            { name: "草抜き職人", cond: "所持金が100万円を超える", check: () => money > 1000000 },
            { name: "ガチャ廃人", cond: "累計100回ガチャを回す", check: () => missionStats.gachaed >= 100 },
            { name: "カズキングの右腕", cond: "カズキング(SSR)を所持する", check: () => items.find(i=>i.id==='ev_kazu').owned },
            { name: "スピードスター", cond: "必殺技を1回使う", check: () => skillCount < 100 && isSkillActive },
            { name: "億万長者", cond: "所持金が1億円を超える", check: () => money > 100000000 },
            { name: "神の領域", cond: "UZキャラを所持する", check: () => items.some(i=>i.rarity==='UZ' && i.owned) },
            { name: "終焉を告げる者", cond: "合体キャラ(X)を所持する", check: () => items.find(i=>i.id==='fusion_zen_kazu').owned },
            { name: "伝説の草抜き師", cond: "所持金が1兆円を超える", check: () => money > 1000000000000 }
        ];

        const items = [
            { id: 'fusion_zen_kazu', type: 'char', name: 'アルティメット・カズキング・ZEN', icon: '☯️', owned: false, rarity: 'X', info: '合体：金100倍/卵抜き/huh卵消去/必殺即チャージ', rate: 100, isEvolved: true },
            { id: 'ev_kazu_ultimate', type: 'char', name: 'ゴッドネスカズキングタイジュウフエターネキンギーニ', icon: '🌌', owned: false, rarity: 'UZ', info: '進化：金100倍/全スキル自動発動/不死身', rate: 100, isEvolved: true },
            { id: 'c1_ultimate', type: 'char', name: 'マキシマムZEN', icon: '👹', owned: false, rarity: 'UZ', info: '進化：金100倍/卵無効', rate: 100, isEvolved: true },
            { id: 'c13_ultimate', type: 'char', name: '大泥棒ぜん', icon: '💰', owned: false, rarity: 'UZ', info: '進化：金100倍/卵で+1000円', rate: 100, isEvolved: true },
            { id: 'c7_ultimate', type: 'char', name: '精霊ぜん', icon: '👼', owned: false, rarity: 'UZ', info: '進化：金100倍/卵無効', rate: 100, isEvolved: true },
            { id: 'c2_ultimate', type: 'char', name: '億万長者ぜん', icon: '🏢', owned: false, rarity: 'UZ', info: '進化：金100倍', rate: 100, isEvolved: true },
            { id: 'ev_kazu', type: 'char', name: 'カズキングタイジュウフエターネキンギーニ', icon: '👑', owned: false, rarity: 'SSR', info: '限定：卵抜きOK/金45倍/huh強化/必殺超速', rate: 45, isEvent: true },
            { id: 'c1', type: 'char', name: '覚醒ぜん', icon: '🔥', owned: false, rarity: 'SSR', info: '金10倍/卵無効', rate: 10 },
            { id: 'c13', type: 'char', name: '泥棒ぜん', icon: '👤', owned: false, rarity: 'SSR', info: '金7倍/卵で+100円', rate: 7 },
            { id: 'c7', type: 'char', name: '幽霊ぜん', icon: '👻', owned: false, rarity: 'SSR', info: '金7.5倍/卵無効', rate: 7.5 },
            { id: 'c2', type: 'char', name: '大富豪ぜん', icon: '💎', owned: false, rarity: 'SSR', info: '金8倍', rate: 8 },
            { id: 'c_dragon', type: 'char', name: '龍神ぜん', icon: '🐉', owned: false, rarity: 'SSR', info: '金12倍/必殺短縮', rate: 12 },
            { id: 'c9', type: 'char', name: '黄金ぜん', icon: '✨', owned: false, rarity: 'SR', info: '金5.5倍', rate: 5.5 },
            { id: 'c3', type: 'char', name: '社長ぜん', icon: '💼', owned: false, rarity: 'SR', info: '金5倍', rate: 5 },
            { id: 'c20', type: 'char', name: '普通のぜん', icon: '👤', owned: true, rarity: 'BASIC', info: '金1.2倍', rate: 1.2 },
            /* 背景 */
            { id: 'b1', type: 'bg', name: '草原', className: '', owned: true, rarity: 'BASIC', info: '標準' },
            { id: 'b8', type: 'bg', name: '宇宙', className: 'bg-space', owned: false, rarity: 'UZ', info: '銀河の果て' },
            { id: 'b10', type: 'bg', name: '次元の狭間', className: 'bg-dimension', owned: false, rarity: 'X', info: '時空の歪み' },
            /* 必殺技 */
            { id: 's1', type: 'skill', name: 'huh', owned: true, rarity: 'BASIC', info: '3秒間自動抜き' },
            { id: 's3', type: 'skill', name: 'カズキング・ザ・ワールド', owned: false, rarity: 'UZ', info: '時を止め、草を一掃する' }
        ];

        let equipped = { char: items.find(i => i.id === 'c20'), bg: items.find(i => i.id === 'b1'), skill: items.find(i => i.id === 's1') };

        function getCollectionBonus() { return items.filter(it => it.type === 'char' && it.owned).length * 0.02; }

        function updateUI() {
            document.getElementById('m-val').innerText = Math.floor(money).toLocaleString();
            document.getElementById('t-val').innerText = Math.max(0, timeLeft).toFixed(1);
            document.getElementById('fever-fill').style.width = feverPoints + "%";
            document.getElementById('skill-fill').style.width = skillCount + "%";
            document.getElementById('title-display').innerText = "称号：" + currentTitle;
            document.getElementById('nick-display').innerText = "👤 " + nickname;
            document.querySelector('.bottom-ui').classList.toggle('ready', skillCount >= 100);
            const hasClaimable = missions.some(m => !m.claimed && missionStats[m.key] >= m.goal);
            document.getElementById('mission-alert').style.display = hasClaimable ? 'inline' : 'none';
        }

        function openLayer(id) {
            document.querySelectorAll('.overlay').forEach(l => l.style.display = 'none');
            if(id !== 'none') document.getElementById(id).style.display = 'flex';
            if(id === 'col-screen') renderCol();
            if(id === 'evolve-screen') renderEvolve();
            if(id === 'fusion-screen') renderFusion();
            if(id === 'mission-screen') renderMissions();
            if(id === 'title-screen') renderTitles();
            if(id === 'start-screen') {
                document.getElementById('tsum-icon').innerText = equipped.char.icon;
                document.getElementById('skill-display-name').innerText = equipped.skill.name;
                document.getElementById('online-rank-box').style.display = 'none';
            }
        }

        function saveNick() {
            const val = document.getElementById('nick-input').value;
            if(val) { nickname = val; saveGame(); openLayer('start-screen'); updateUI(); }
        }

        function renderTitles() {
            const list = document.getElementById('title-list'); list.innerHTML = '';
            titles.forEach(t => {
                const unlocked = t.check();
                const div = document.createElement('div'); div.className = `title-item ${unlocked ? '' : 'locked'}`;
                div.innerHTML = `<div class="title-info"><div class="title-name">${unlocked ? t.name : '？？？？'}</div><div class="title-cond">条件: ${t.cond}</div></div>${unlocked ? `<button class="equip-btn ${currentTitle === t.name ? 'equipped' : ''}" onclick="setTitle('${t.name}')">${currentTitle === t.name ? '使用中' : '変更'}</button>` : '🔒'}`;
                list.appendChild(div);
            });
        }
        function setTitle(name) { currentTitle = name; renderTitles(); updateUI(); saveGame(); }

        function initMissions() {
            const today = new Date().toLocaleDateString();
            if(lastMissionDate !== today) {
                lastMissionDate = today; missionStats = { plucked: 0, gachaed: 0, earned: 0 };
                missions = [
                    { id: 1, title: "草を抜きまくれ", goal: 100, reward: 50000, key: "plucked", unit: "本", claimed: false },
                    { id: 2, title: "ガチャを回せ", goal: 10, reward: 20000, key: "gachaed", unit: "回", claimed: false },
                    { id: 3, title: "今日稼げ", goal: 100000, reward: 100000, key: "earned", unit: "円", claimed: false }
                ];
                saveGame();
            }
        }
        function renderMissions() {
            const container = document.getElementById('mission-list'); container.innerHTML = '';
            missions.forEach(m => {
                const prog = Math.min(100, (missionStats[m.key] / m.goal) * 100);
                const canClaim = !m.claimed && prog >= 100;
                const item = document.createElement('div'); item.className = 'mission-item';
                item.innerHTML = `<div style="font-size:14px; font-weight:bold;">${m.title}</div><div style="font-size:12px; color:#aaa;">進行度: ${missionStats[m.key].toLocaleString()} / ${m.goal.toLocaleString()} ${m.unit}</div><div class="mission-progress"><div class="mission-fill" style="width:${prog}%"></div></div><button class="mission-reward-btn ${m.claimed ? 'claimed' : (canClaim ? 'can-claim' : '')}" onclick="${canClaim ? `claimMission(${m.id})` : ''}" ${m.claimed || !canClaim ? 'disabled' : ''}>${m.claimed ? '受取済' : `報酬 ${m.reward.toLocaleString()}円`}</button>`;
                container.appendChild(item);
            });
        }
        function claimMission(id) {
            const m = missions.find(x => x.id === id);
            if(m && !m.claimed) { m.claimed = true; money += m.reward; popText("50%", "50%", `REWARD +${m.reward}!`, "lime"); renderMissions(); updateUI(); saveGame(); }
        }

        function renderFusion() {
            const char1 = items.find(i => i.id === 'ev_kazu_ultimate'); const char2 = items.find(i => i.id === 'c1_ultimate');
            const cost = 1000000000000; const btn = document.getElementById('fusion-exec-btn');
            document.getElementById('fuse-cond-1').style.color = (char1 && char1.owned) ? "lime" : "red";
            document.getElementById('fuse-cond-2').style.color = (char2 && char2.owned) ? "lime" : "red";
            document.getElementById('fuse-cond-3').style.color = money >= cost ? "lime" : "red";
            if(char1 && char1.owned && char2 && char2.owned && money >= cost) { btn.style.display = "block"; document.getElementById('fusion-result-preview').innerHTML = `${char1.icon} + ${char2.icon} = <span style="animation:x-glow 0.3s infinite alternate;">☯️究極合体(X)</span>`; }
            else { btn.style.display = "none"; document.getElementById('fusion-result-preview').innerHTML = "条件未達成"; }
        }
        function executeFusion() { const cost = 1000000000000; if(money < cost) return; money -= cost; const res = items.find(i => i.id === 'fusion_zen_kazu'); res.owned = true; equipped.char = res; alert("合体完了！"); openLayer('start-screen'); saveGame(); updateUI(); }

        function renderEvolve() {
            const target = document.getElementById('evolve-status'); const btn = document.getElementById('evolve-exec-btn');
            const cost = 100000000;
            if(equipped.char.rarity === 'SSR' && !equipped.char.isEvolved) { target.innerHTML = `<p>進化：${equipped.char.name}</p><p style="font-size:12px;color:#aaa;">費用: ${cost.toLocaleString()}円</p>`; btn.style.display = "block"; btn.disabled = money < cost; }
            else { target.innerHTML = `<p>SSRキャラを選択してください</p>`; btn.style.display = "none"; }
        }
        function executeEvolve() {
            const cost = 100000000; if(money < cost) return; money -= cost;
            let evolveId = '';
            switch(equipped.char.id) { case 'ev_kazu': evolveId = 'ev_kazu_ultimate'; break; case 'c1': evolveId = 'c1_ultimate'; break; case 'c13': evolveId = 'c13_ultimate'; break; case 'c7': evolveId = 'c7_ultimate'; break; case 'c2': evolveId = 'c2_ultimate'; break; }
            if(evolveId) { 
                const ult = items.find(i => i.id === evolveId); ult.owned = true; equipped.char = ult; 
                if(evolveId === 'ev_kazu_ultimate') items.find(i => i.id === 's3').owned = true; 
                alert(`進化成功！`); 
            }
            openLayer('start-screen'); saveGame(); updateUI();
        }

        function setTab(tab) { 
            currentTab = tab; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active'); renderCol(); 
        }
        function renderCol() {
            const list = document.getElementById('col-list-content'); list.innerHTML = '';
            items.filter(i => i.type === currentTab).forEach(item => {
                const isEq = equipped[item.type].id === item.id;
                const div = document.createElement('div'); div.className = `col-item ${item.owned ? 'owned' : ''} ${item.rarity}`;
                div.innerHTML = `<div>${item.owned ? item.icon || '⚡' : '？'} ${item.owned ? item.name : '？？？'}<br><small>${item.rarity}</small></div><button class="equip-btn ${isEq ? 'equipped' : ''}" onclick="equip('${item.id}')" ${item.owned ? '' : 'disabled'}>${isEq ? '選択中' : '選択'}</button>`;
                list.appendChild(div);
            });
        }
        function equip(id) { const item = items.find(i => i.id === id); equipped[item.type] = item; if(item.type === 'bg') document.getElementById('game-field').className = item.className; renderCol(); saveGame(); updateUI(); }

        async function runGacha(times) {
            const cost = 1000 * times; if(money < cost) return alert("金欠です！");
            money -= cost; updateUI(); missionStats.gachaed += times;
            const display = document.getElementById('gacha-result-display'); display.innerHTML = ''; 
            for(let i=0; i<times; i++) {
                const r = Math.random() * 100;
                let pick;
                let pool = items.filter(it => it.id !== 's3' && it.id !== 'fusion_zen_kazu' && !it.isEvolved);
                if (r < 0.05) pick = pool.filter(it => it.rarity === 'SSR')[0];
                else if(r < 5) pick = pool.filter(it => it.rarity === 'SSR')[Math.floor(Math.random()*4)];
                else if(r < 25) pick = pool.filter(it => it.rarity === 'SR')[Math.floor(Math.random()*2)];
                else pick = pool.filter(it => it.rarity === 'BASIC' || it.rarity === 'R')[Math.floor(Math.random()*2)];
                if(!pick) pick = items.find(it => it.id === 'c20');
                pick.owned = true;
                const l = document.createElement('div'); l.className = `res-line ${pick.rarity}`; 
                l.innerHTML = `<span>${pick.icon || '🎁'} ${pick.name}</span><span>[${pick.rarity}]</span>`; 
                display.appendChild(l); 
            }
            display.scrollTop = display.scrollHeight; saveGame(); updateUI();
        }

        function spawn() {
            if(!isPlaying) return; const field = document.getElementById('game-field');
            for(let i=0; i<9; i++) {
                const g = document.createElement('div'); g.className = 'item grass'; g.style.left = Math.random()*85+"%"; g.style.top = Math.random()*80+"%";
                g.innerHTML = '<div class="grass-center"></div>'; g.onclick = function(){ pluck(this); }; field.appendChild(g);
            }
            const egg = document.createElement('div'); egg.className = 'item egg'; egg.innerText = '🥚';
            let px = Math.random()*80, py = Math.random()*75, vx = (Math.random()-0.5)*2.5, vy = (Math.random()-0.5)*2.5;
            egg.style.left = px+"%"; egg.style.top = py+"%";
            const move = setInterval(() => {
                if(!isPlaying || !egg.parentNode){ clearInterval(move); return; }
                if(isSkillActive && equipped.skill.id === 's3') return; 
                px+=vx; py+=vy; if(px<=0||px>=85)vx*=-1; if(py<=0||py>=80)vy*=-1; egg.style.left=px+"%"; egg.style.top=py+"%";
            },30);
            egg.onclick = () => {
                if(equipped.char.rarity==='SSR'||equipped.char.rarity==='UZ'||equipped.char.rarity==='X') {
                    let b = (equipped.char.isEvolved || equipped.char.rarity==='X')?1000:0;
                    if(b>0){ money+=b; missionStats.earned+=b; updateUI(); } egg.remove();
                } else { endGame("卵だ！"); }
            }; field.appendChild(egg);
        }

        function pluck(el) {
            if(el.classList.contains('plucking')) return;
            let gain = Math.floor(100 * equipped.char.rate * (isFever?3:1) * (1+getCollectionBonus()));
            money += gain; missionStats.earned += gain; missionStats.plucked++; pluckedInGame++;
            feverPoints = Math.min(100, feverPoints+7); if(feverPoints>=100 && !isFever) startFever();
            createParticles(el.style.left, el.style.top); popText(el.style.left, el.style.top, `+${gain}`);
            el.classList.add('plucking');
            setTimeout(() => { el.remove(); if(document.querySelectorAll('.grass:not(.plucking)').length === 0) { timeLeft+=5; spawn(); } }, 200);
            updateUI();
        }

        function triggerSkill() {
            if(skillCount < 100 || isSkillActive) return;
            skillCount = 0; isSkillActive = true;
            const field = document.getElementById('game-field');
            if(equipped.skill.id === 's3') {
                field.style.filter = "grayscale(1) invert(1)"; field.classList.add('skill-active-field');
                const worldInterval = setInterval(() => { const ts = document.querySelectorAll('.grass:not(.plucking)'); if(ts.length>0) pluck(ts[0]); }, 30);
                setTimeout(() => { isSkillActive = false; clearInterval(worldInterval); field.style.filter = "none"; field.classList.remove('skill-active-field'); }, 4000);
                return;
            }
            const isX = equipped.char.id === 'fusion_zen_kazu';
            field.classList.add('skill-active-field');
            const interval = setInterval(() => {
                const ts = document.querySelectorAll('.grass:not(.plucking)');
                if(ts.length>0) pluck(ts[0]); if(isX) document.querySelectorAll('.egg').forEach(e => e.remove());
            }, isX?20:(equipped.char.isEvolved?70:150));
            setTimeout(() => { isSkillActive = false; clearInterval(interval); field.classList.remove('skill-active-field'); }, 3000);
        }

        function createParticles(x, y) {
            const field = document.getElementById('game-field');
            for(let i=0; i<6; i++) {
                const p = document.createElement('div'); p.className='particle'; p.style.left=x; p.style.top=y;
                p.style.setProperty('--dx', (Math.random()-0.5)*200+"px"); p.style.setProperty('--dy', (Math.random()-0.5)*200+"px");
                p.style.animation="scatter 0.4s forwards"; field.appendChild(p); setTimeout(()=>p.remove(),400);
            }
        }
        function popText(x, y, txt, color="var(--gold)") { const p = document.createElement('div'); p.className='pop-text'; p.innerText=txt; p.style.left=x; p.style.top=y; p.style.color=color; document.getElementById('game-field').appendChild(p); setTimeout(()=>p.remove(),500); }
        function startFever() { isFever=true; document.getElementById('game-field').style.filter="hue-rotate(180deg)"; setTimeout(()=>{ isFever=false; feverPoints=0; document.getElementById('game-field').style.filter="none"; },6000); }

        /* オンライン対戦ロジック */
        function initOnline() {
            enemyData = [
                { name: "ZEN様", score: 0, speed: Math.random() * 2 + 1 },
                { name: "カズキング", score: 0, speed: Math.random() * 2 + 1.5 },
                { name: "草抜きマン", score: 0, speed: Math.random() * 1.5 + 0.5 },
                { name: "Huh?", score: 0, speed: Math.random() * 3 + 0.1 }
            ];
            document.getElementById('online-rank-box').style.display = 'block';
            updateRank();
        }

        function updateRank() {
            if(!isOnlineMode) return;
            enemyData.forEach(e => e.score += Math.floor(Math.random() * e.speed));
            let rankArr = [...enemyData, { name: nickname, score: pluckedInGame, isMe: true }];
            rankArr.sort((a,b) => b.score - a.score);
            const box = document.getElementById('online-rank-box');
            box.innerHTML = '<div style="border-bottom:1px solid white; margin-bottom:3px;">ONLINE RANK</div>';
            rankArr.forEach((r, i) => {
                box.innerHTML += `<div class="rank-row ${r.isMe?'me':''}"><span>${i+1}.${r.name}</span><span>${r.score}</span></div>`;
            });
            if(rankArr.findIndex(r => r.isMe) === 0 && pluckedInGame > 10) box.style.borderColor = "var(--gold)";
        }

        function startGame(online) {
            isOnlineMode = online; pluckedInGame = 0; isPlaying=true; timeLeft=30; openLayer('none');
            document.querySelectorAll('.item').forEach(i=>i.remove());
            if(equipped.char.rarity==='X') document.getElementById('x-aura-effect').style.display='block';
            if(isOnlineMode) initOnline();
            spawn();
            const loop = setInterval(() => {
                if(!isFever && !(isSkillActive && equipped.skill.id==='s3')) timeLeft-=0.1;
                if(!isSkillActive) skillCount = Math.min(100, skillCount + (equipped.char.rarity==='X'?100:equipped.char.isEvolved?1.6:0.3));
                if(isOnlineMode) updateRank();
                updateUI(); if(timeLeft<=0||!isPlaying){ clearInterval(loop); document.getElementById('x-aura-effect').style.display='none'; if(timeLeft<=0)endGame("終了"); }
            }, 100);
        }

        function endGame(msg) {
            isPlaying=false; 
            document.getElementById('res-money').innerText=Math.floor(money).toLocaleString();
            const rankText = document.getElementById('online-res-rank');
            if(isOnlineMode) {
                let rankArr = [...enemyData, { name: nickname, score: pluckedInGame, isMe: true }].sort((a,b) => b.score - a.score);
                let myRank = rankArr.findIndex(r => r.isMe) + 1;
                rankText.innerText = `オンライン順位: ${myRank}位 / ${rankArr.length}人`;
                rankText.style.display = 'block';
            } else { rankText.style.display = 'none'; }
            openLayer('end-screen'); saveGame();
        }

        function giveUp() { isPlaying=false; openLayer('start-screen'); }
        function saveGame() { localStorage.setItem('zenSurvival_Online_v1', JSON.stringify({ money, nickname, owned: items.filter(i=>i.owned).map(i=>i.id), eq: {c:equipped.char.id, b:equipped.bg.id, s:equipped.skill.id}, missions, missionStats, lastMissionDate, currentTitle })); }
        function loadGame() {
            const data = JSON.parse(localStorage.getItem('zenSurvival_Online_v1'));
            if(data) {
                money = data.money; nickname = data.nickname || "名無しの草抜き師";
                data.owned.forEach(id => { const it=items.find(i=>i.id===id); if(it)it.owned=true; });
                equipped.char=items.find(i=>i.id===data.eq.c)||equipped.char;
                equipped.bg=items.find(i=>i.id===data.eq.b)||equipped.bg;
                equipped.skill=items.find(i=>i.id===data.eq.s)||equipped.skill;
                missions = data.missions || []; missionStats = data.missionStats || { plucked: 0, gachaed: 0, earned: 0 };
                lastMissionDate = data.lastMissionDate || ""; currentTitle = data.currentTitle || "なし";
                document.getElementById('game-field').className = equipped.bg.className;
            } else { openLayer('name-screen'); }
            initMissions(); updateUI(); if(!data) openLayer('name-screen'); else openLayer('start-screen');
        }
    </script>
</body>
</html>
