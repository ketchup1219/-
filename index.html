<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>草抜きサバイバル - 覚醒の刻 -</title>
    <style>
        :root { --zen-red: #ff0033; --gold: #ffd700; --grass-light: #7cfc00; --grass-dark: #2d5a27; --blue: #00d2ff; --fever-pink: #ff00ff; }
        body { 
            text-align: center; font-family: 'Arial Black', sans-serif; 
            background-color: #000; color: white; 
            margin: 0; overflow: hidden; touch-action: none; user-select: none;
        }

        .header { background: #111; padding: 10px; display: flex; justify-content: space-around; align-items: center; border-bottom: 2px solid #333; font-size: 14px; position: relative; }
        
        #fever-container { position: absolute; bottom: -5px; left: 0; width: 100%; height: 6px; background: #222; }
        #fever-fill { width: 0%; height: 100%; background: var(--fever-pink); transition: width 0.2s; box-shadow: 0 0 10px var(--fever-pink); }
        .is-fever #fever-fill { background: white; animation: fever-blink 0.2s infinite; }
        @keyframes fever-blink { from { opacity: 1; } to { opacity: 0.5; } }

        #game-field { 
            position: relative; width: 95vw; height: 55vh; 
            background: #1a2a1a; margin: 10px auto; 
            border: 3px solid #333; border-radius: 20px; overflow: hidden;
            transition: 0.5s;
        }
        #game-field.fever-bg { background: radial-gradient(circle, #440044, #000) !important; border-color: var(--fever-pink); }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        #lvl-up-text, #fever-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: 50px; z-index: 1001; pointer-events: none; opacity: 0;
        }
        #lvl-up-text { color: var(--blue); text-shadow: 0 0 15px white; }
        #fever-text { color: var(--fever-pink); text-shadow: 0 0 20px white; font-size: 70px; }
        
        .lvl-anim { animation: lvl-surge 0.8s ease-out; }
        @keyframes lvl-surge {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            30% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }

        #skill-effect-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: 80px; color: var(--gold); text-shadow: 0 0 20px red; z-index: 1000; pointer-events: none;
        }
        .huh-anim { animation: huh-surge 0.6s ease-out; }
        @keyframes huh-surge {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }

        .col-tabs { display: flex; width: 95%; gap: 5px; margin-bottom: 10px; }
        .tab-btn { flex: 1; padding: 10px 5px; font-size: 11px; background: #333; color: white; border: none; border-radius: 5px; }
        .tab-btn.active { background: var(--blue); }
        .col-list { width: 90%; height: 50%; overflow-y: auto; background: #1a1a1a; border-radius: 10px; padding: 10px; border: 1px solid #444; }
        .col-item { background: #222; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid transparent; }
        .col-item.owned { border-left-color: var(--gold); }
        .col-item.locked { opacity: 0.6; }
        .equip-btn { padding: 6px 12px; border-radius: 15px; border: none; font-size: 10px; font-weight: bold; cursor: pointer; }
        .equipped { background: var(--grass-light) !important; color: #000; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; width: 85%; }
        .btn { padding: 12px; font-size: 14px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; }
        .btn-start { background: var(--gold); color: #000; grid-column: span 2; font-size: 20px; }
        .btn-gacha { background: #ff4500; color: white; }
        .btn-col { background: var(--blue); color: white; }

        .bottom-ui { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px; }
        #tsum-icon { width: 70px; height: 70px; border: 4px solid #444; border-radius: 50%; font-size: 35px; display: flex; align-items: center; justify-content: center; background: #222; }
        .ready #tsum-icon { animation: pulse 0.4s infinite alternate; border-color: var(--zen-red); cursor: pointer; box-shadow: 0 0 15px var(--zen-red); }
        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.15); } }

        #skill-bar { width: 140px; height: 18px; background: #222; border-radius: 10px; overflow: hidden; border: 2px solid #444; }
        #skill-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #f00, #f80); transition: 0.1s; }

        .item { position: absolute; z-index: 10; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.15s, opacity 0.1s; }
        .grass { width: 75px; height: 75px; }
        .grass::before, .grass::after { content: ''; position: absolute; width: 25px; height: 45px; background: var(--grass-dark); border-radius: 50% / 80% 80% 20% 20%; bottom: 5px; pointer-events: none; }
        .grass::before { transform: rotate(-35deg); left: 10px; }
        .grass::after { transform: rotate(35deg); right: 10px; }
        .grass-center { position: absolute; width: 30px; height: 60px; background: var(--grass-light); border-radius: 50% / 80% 80% 20% 20%; left: 50%; transform: translateX(-50%); bottom: 10px; z-index: 2; pointer-events: none; }
        
        .egg { 
            width: 70px; height: 70px; font-size: 50px; background: transparent; 
            filter: drop-shadow(0 0 5px rgba(255,0,0,0.5));
            transition: left 0.8s linear, top 0.8s linear, transform 0.2s;
        }

        .pop-text { position: absolute; color: var(--gold); font-size: 20px; font-weight: bold; pointer-events: none; animation: pop-up 0.5s ease-out forwards; z-index: 100; }
        @keyframes pop-up { 0% { transform: translateY(0) scale(0.5); opacity: 1; } 100% { transform: translateY(-50px) scale(1.5); opacity: 0; } }
        
        #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; pointer-events: none; opacity: 0; z-index: 1000; }
    </style>
</head>
<body onload="loadGame()">
    <div id="flash"></div>
    <div class="header">
        <button onclick="giveUp()" style="background:#444; color:white; border:none; border-radius:5px; padding:2px 8px; font-size:10px;">リタイア</button>
        <div>💰 <span id="m-val">0</span></div>
        <div>⏳ <span id="t-val">30.0</span></div>
        <div>LV <span id="l-val">1</span></div>
        <div id="fever-container"><div id="fever-fill"></div></div>
    </div>

    <div id="game-field">
        <div id="skill-effect-text">huh</div>
        <div id="lvl-up-text">LEVEL UP!</div>
        <div id="fever-text">FEVER!</div>
        
        <div id="start-screen" class="overlay">
            <h1 style="margin:0">草抜きサバイバル</h1>
            <p id="passive-info" style="font-size:10px; color:var(--blue); height: 15px;">装備なし</p>
            <div class="btn-group">
                <button class="btn btn-start" onclick="startGame()">START</button>
                <button class="btn btn-gacha" onclick="openLayer('gacha-screen')">GACHA</button>
                <button class="btn btn-col" onclick="openLayer('col-screen')">COLLECTION</button>
            </div>
        </div>

        <div id="gacha-screen" class="overlay" style="display:none;">
            <div id="gacha-box" style="font-size:70px; min-height:80px;">🎁</div>
            <div id="gacha-msg" style="margin:10px; height:60px; color:gold; font-size:14px; line-height:1.2;"></div>
            <div style="display: flex; flex-direction: column; gap: 8px; width: 200px;">
                <button class="btn btn-gacha" id="g-btn1" onclick="runGacha(1)">1回 (1,000円)</button>
                <button class="btn btn-gacha" id="g-btn10" onclick="runGacha(10)" style="background:#ff8c00;">10連 (1万円)</button>
                <button class="btn btn-gacha" id="g-btn100" onclick="runGacha(100)" style="background:#800080;">100連 (10万円)</button>
            </div>
            <button class="btn" onclick="openLayer('start-screen')" style="margin-top:20px; background:#444; width:100px;">戻る</button>
        </div>

        <div id="col-screen" class="overlay" style="display:none;">
            <h2>COLLECTION</h2>
            <div class="col-tabs">
                <button class="tab-btn active" id="tab-char" onclick="setTab('char')">キャラ</button>
                <button class="tab-btn" id="tab-bg" onclick="setTab('bg')">背景</button>
                <button class="tab-btn" id="tab-skill" onclick="setTab('skill')">必殺技</button>
            </div>
            <div class="col-list" id="col-list-content"></div>
            <button class="btn" onclick="openLayer('start-screen')" style="margin-top:10px; background:#444; width:100px;">戻る</button>
        </div>

        <div id="end-screen" class="overlay" style="display:none">
            <h2 style="color:red; font-size:40px;">GAME OVER</h2>
            <p>獲得金額: <span id="res-money">0</span>円</p>
            <button class="btn btn-start" onclick="closeEndScreen()" style="width:180px;">TITLE</button>
        </div>
    </div>

    <div class="bottom-ui">
        <div id="tsum-icon" onclick="triggerSkill()">👤</div>
        <div>
            <div id="skill-bar"><div id="skill-fill"></div></div>
            <div id="skill-display-name" style="font-size:10px; color:#777; margin-top:5px;">huh</div>
        </div>
    </div>

    <script>
        let money = 2000, level = 1, timeLeft = 30.0, skillCount = 0, isPlaying = false, currentTab = 'char', armor = false;
        let feverPoints = 0, isFever = false, feverTimer = null;

        const items = [
            { id: 'c1', type: 'char', name: '覚醒ぜん', icon: '🔥', owned: false, rarity: 'SSR', info: '金10倍/チャージ27s短縮/卵無効' },
            { id: 'c9', type: 'char', name: '黄金ぜん', icon: '✨', owned: false, rarity: 'SR', info: '草がすべて金になる(+50円)' },
            { id: 'c10', type: 'char', name: '時計ぜん', icon: '⏰', owned: false, rarity: 'SR', info: 'レベルアップ時、時間+15秒' },
            { id: 'c2', type: 'char', name: '宇宙ぜん', icon: '👽', owned: false, rarity: 'SR', info: '時間減少10%緩和' },
            { id: 'c3', type: 'char', name: '騎士ぜん', icon: '⚔️', owned: false, rarity: 'SR', info: '爆弾を1度耐える' },
            { id: 'c4', type: 'char', name: '悪魔ぜん', icon: '😈', owned: false, rarity: 'SR', info: '周囲を巻き込む' },
            { id: 'c11', type: 'char', name: 'ｷﾞｬﾝﾌﾞﾗｰぜん', icon: '🎰', owned: false, rarity: 'R', info: '20%の確率で獲得金5倍' },
            { id: 'c12', type: 'char', name: 'のんびりぜん', icon: '💤', owned: false, rarity: 'R', info: '草減少/時間回復UP' },
            { id: 'c13', type: 'char', name: '泥棒ぜん', icon: '👤', owned: false, rarity: 'R', info: '卵を抜くとお金(100円)' },
            { id: 'c7', type: 'char', name: '幽霊ぜん', icon: '👻', owned: false, rarity: 'R', info: '爆弾が無効' },
            { id: 'c5', type: 'char', name: 'パンダぜん', icon: '🐼', owned: false, rarity: 'R', info: '金+5円' },
            { id: 'c8', type: 'char', name: '忍者ぜん', icon: '🥷', owned: false, rarity: 'R', info: 'チャージ10s短縮' },
            { id: 'b1', type: 'bg', name: '次元の狭間', val: 'radial-gradient(circle, #400, #000)', owned: false, rarity: 'SSR' },
            { id: 's_huh', type: 'skill', name: 'huh', owned: true, rarity: 'BASIC' },
            { id: 's2', type: 'skill', name: '時間停止', owned: false, rarity: 'SR' }
        ];

        let equipped = { char: null, bg: null, skill: items.find(i => i.id === 's_huh') };

        function saveGame() {
            const data = { money, ownedIds: items.filter(i => i.owned).map(i => i.id),
                equippedIds: { char: equipped.char?.id, bg: equipped.bg?.id, skill: equipped.skill?.id } };
            localStorage.setItem('kusaSurvivalData_vFinal', JSON.stringify(data));
        }

        function loadGame() {
            const raw = localStorage.getItem('kusaSurvivalData_vFinal');
            if(!raw) { updateUI(); return; }
            const data = JSON.parse(raw);
            money = data.money;
            data.ownedIds.forEach(id => { const item = items.find(i => i.id === id); if(item) item.owned = true; });
            if(data.equippedIds.char) equip(data.equippedIds.char, false);
            if(data.equippedIds.bg) equip(data.equippedIds.bg, false);
            if(data.equippedIds.skill) equip(data.equippedIds.skill, false);
            updateUI();
        }

        function v(ms=20) { if(navigator.vibrate) navigator.vibrate(ms); }

        function openLayer(id) {
            document.querySelectorAll('.overlay').forEach(l => l.style.display = 'none');
            const target = document.getElementById(id);
            if(target) target.style.display = 'flex';
            if(id === 'col-screen') renderCol();
        }

        function setTab(tab) { currentTab = tab; renderCol(); }

        function runGacha(times) {
            const cost = 1000 * times;
            if (money < cost) return alert("お金不足！");
            money -= cost; updateUI();
            let results = [];
            let counts = { SSR: 0, SR: 0, R: 0 };
            for (let i = 0; i < times; i++) {
                const r = Math.random() * 100;
                let target;
                if (r < 0.1) { target = items.find(i => i.id === 'c1'); counts.SSR++; }
                else if (r < 1.1) { target = items.find(i => i.id === 'c7'); counts.R++; }
                else if (r < 6.1) { target = items.find(i => i.id === 'b1'); counts.SSR++; }
                else if (r < 26.1) { 
                    const pool = items.filter(i => i.rarity === 'SR');
                    target = pool[Math.floor(Math.random() * pool.length)]; counts.SR++;
                } else {
                    const pool = items.filter(i => i.rarity === 'R' && i.id !== 'c7');
                    target = pool[Math.floor(Math.random() * pool.length)]; counts.R++;
                }
                target.owned = true; results.push(target);
            }
            const msgEl = document.getElementById('gacha-msg');
            const boxEl = document.getElementById('gacha-box');
            if (times === 1) {
                boxEl.innerText = results[0].icon || '🖼️';
                msgEl.innerHTML = `${results[0].rarity}<br>${results[0].name}`;
            } else {
                boxEl.innerText = "🎊";
                msgEl.innerHTML = `<div style="font-size:12px;"><span style="color:red;">SSR:${counts.SSR}</span> <span style="color:orange;">SR:${counts.SR}</span> R:${counts.R}</div>
                                   <div style="font-size:10px; color:#ccc;">${results.slice(-3).map(r=>r.name).join(', ')}獲得</div>`;
            }
            saveGame();
        }

        function renderCol() {
            const list = document.getElementById('col-list-content');
            list.innerHTML = '';
            items.filter(i => i.type === currentTab).forEach(item => {
                const div = document.createElement('div');
                div.className = `col-item ${item.owned ? 'owned' : 'locked'}`;
                const displayName = item.owned ? (item.icon || '') + ' ' + item.name : '❓ ' + item.name;
                const isEq = equipped[item.type] === item;
                div.innerHTML = `<div style="text-align:left; flex-grow:1; cursor:pointer;" onclick="showDetail('${item.id}')">
                    <div style="font-size:10px; color:var(--gold);">${item.rarity}</div><div>${displayName}</div></div>
                    <button class="equip-btn ${isEq ? 'equipped' : ''}" onclick="equip('${item.id}')" ${item.owned ? '' : 'disabled'}>${isEq ? '装備中' : (item.owned ? '装備' : '未所持')}</button>`;
                list.appendChild(div);
            });
        }

        function showDetail(id) {
            const item = items.find(i => i.id === id);
            alert(`【${item.rarity}】${item.name}\n\n効果: ${item.info || '見た目が変わります'}`);
        }

        function equip(id, shouldSave = true) {
            const item = items.find(i => i.id === id);
            if(!item) return;
            equipped[item.type] = item;
            if(item.type === 'char') {
                document.getElementById('tsum-icon').innerText = item.icon;
                document.getElementById('passive-info').innerText = "効果: " + item.info;
            }
            if(item.type === 'bg') document.getElementById('game-field').style.background = item.val;
            if(item.type === 'skill') document.getElementById('skill-display-name').innerText = item.name;
            if(shouldSave) { renderCol(); v(20); saveGame(); }
        }

        function startGame() {
            isPlaying = true; timeLeft = 30.0; level = 1; skillCount = 0; feverPoints = 0; isFever = false;
            armor = (equipped.char?.id === 'c3');
            openLayer('none'); spawn(); moveEggs();
            const timer = setInterval(() => {
                if(!isPlaying) return clearInterval(timer);
                if (!isFever) {
                    let dec = (equipped.char?.id === 'c2') ? 0.08 : 0.1;
                    timeLeft -= dec;
                }
                document.getElementById('t-val').innerText = Math.max(0, timeLeft).toFixed(1);
                let reduction = (equipped.char?.id === 'c1') ? 27 : (equipped.char?.id === 'c8' ? 10 : 0);
                let autoCharge = 100 / (Math.max(1, 30 - reduction) * 10);
                skillCount = Math.min(100, skillCount + autoCharge);
                updateUI();
                if(timeLeft <= 0) endGame();
            }, 100);
        }

        function handleGrassClick(item) {
            if (!isPlaying || item.getAttribute('data-plucked') === "true") return;
            v(15); 
            item.setAttribute('data-plucked', "true");
            
            const rect = item.getBoundingClientRect();
            const fRect = document.getElementById('game-field').getBoundingClientRect();
            const x = rect.left - fRect.left + rect.width / 2, y = rect.top - fRect.top + rect.height / 2;

            const pop = document.createElement('div'); pop.className = 'pop-text'; pop.innerText = "ズバッ！";
            pop.style.left = x + "px"; pop.style.top = y + "px";
            document.getElementById('game-field').appendChild(pop);
            setTimeout(() => pop.remove(), 500);

            let m = (equipped.char?.id === 'c1') ? 100 : 10;
            if (equipped.char?.id === 'c9') m += 50;
            if (equipped.char?.id === 'c11' && Math.random() < 0.2) m *= 5;
            if (equipped.char?.id === 'c5') m += 5;
            if (isFever) m *= 3;
            money += m;
            
            if (!isFever) {
                feverPoints = Math.min(100, feverPoints + 5);
                if (feverPoints >= 100) startFever();
            }
            updateUI();

            item.style.transform = "scale(1.5) rotate(20deg)"; 
            item.style.opacity = "0";
            // 修正: 抜いた後にクリックを邪魔しないように消去
            setTimeout(() => { item.style.display = "none"; }, 150);
            
            if (equipped.char?.id === 'c4' && Math.random() < 0.2) {
                const next = document.querySelector('.grass:not([data-plucked="true"])');
                if(next) setTimeout(()=>handleGrassClick(next), 50);
            }

            const remaining = document.querySelectorAll('.grass:not([data-plucked="true"])');
            if (remaining.length === 0) {
                level++;
                let add = (equipped.char?.id === 'c10') ? 15.0 : 5.0;
                if (equipped.char?.id === 'c12') add += 5.0;
                timeLeft += add; v([100, 50, 100]);
                const lt = document.getElementById('lvl-up-text');
                lt.classList.remove('lvl-anim'); void lt.offsetWidth; lt.classList.add('lvl-anim');
                setTimeout(() => { if(isPlaying) spawn(); }, 400);
            }
        }

        function startFever() {
            isFever = true; v([50, 50, 150]);
            document.body.classList.add('is-fever');
            document.getElementById('game-field').classList.add('fever-bg');
            const ft = document.getElementById('fever-text');
            ft.classList.remove('lvl-anim'); void ft.offsetWidth; ft.classList.add('lvl-anim');
            document.getElementById('flash').style.opacity = "0.6";
            setTimeout(() => document.getElementById('flash').style.opacity = "0", 200);
            let duration = 5000;
            let start = Date.now();
            feverTimer = setInterval(() => {
                let elapsed = Date.now() - start;
                feverPoints = 100 - (elapsed / duration * 100);
                if (feverPoints <= 0) stopFever();
                updateUI();
            }, 50);
        }

        function stopFever() {
            isFever = false; feverPoints = 0; clearInterval(feverTimer);
            document.body.classList.remove('is-fever');
            document.getElementById('game-field').classList.remove('fever-bg');
            updateUI();
        }

        function spawn() {
            const field = document.getElementById('game-field');
            field.querySelectorAll('.item').forEach(i => i.remove());
            let base = 12 + Math.floor(level * 1.5);
            if (equipped.char?.id === 'c12') base = Math.floor(base * 0.6);
            const total = Math.min(60, base);
            const eggCount = Math.max(3, Math.floor(total * 0.25));
            let list = [];
            for (let i = 0; i < eggCount; i++) list.push(true);
            for (let i = 0; i < total - eggCount; i++) list.push(false);
            list.sort(() => Math.random() - 0.5);
            list.forEach(isEgg => {
                const item = document.createElement('div');
                item.className = 'item ' + (isEgg ? 'egg' : 'grass');
                if (!isEgg) { 
                    const c = document.createElement('div'); 
                    c.className = 'grass-center'; 
                    item.appendChild(c); 
                } else { 
                    item.innerText = "🥚"; 
                }
                item.style.left = Math.random() * (field.clientWidth - 80) + "px";
                item.style.top = Math.random() * (field.clientHeight - 80) + "px";
                item.onpointerdown = (e) => {
                    if (!isPlaying) return;
                    if (isEgg) {
                        if (equipped.char?.id === 'c13') { money += 100; updateUI(); item.style.transform="scale(0)"; return; }
                        if (equipped.char?.id === 'c7' || equipped.char?.id === 'c1') return;
                        if (armor) { armor = false; item.style.transform = "scale(0)"; v([50,50]); return; }
                        endGame();
                    } else handleGrassClick(item);
                };
                field.appendChild(item);
            });
        }

        function moveEggs() {
            if (!isPlaying) return;
            const eggs = document.querySelectorAll('.egg');
            const interval = Math.max(600, 1500 - (level * 100));
            eggs.forEach(egg => {
                egg.style.left = Math.random() * (document.getElementById('game-field').clientWidth - 80) + "px";
                egg.style.top = Math.random() * (document.getElementById('game-field').clientHeight - 80) + "px";
            });
            setTimeout(moveEggs, interval);
        }

        function triggerSkill() {
            if(skillCount < 100 || !isPlaying) return;
            skillCount = 0; v([50, 150]);
            if(equipped.skill.id === 's_huh') {
                const et = document.getElementById('skill-effect-text');
                et.classList.remove('huh-anim'); void et.offsetWidth; et.classList.add('huh-anim');
                document.getElementById('flash').style.opacity = "0.4";
                setTimeout(() => document.getElementById('flash').style.opacity = "0", 300);
                document.querySelectorAll('.grass:not([data-plucked="true"])').forEach((g, i) => {
                    setTimeout(() => { if(isPlaying) handleGrassClick(g); }, i * 30);
                });
            } else if(equipped.skill.id === 's2') { timeLeft += 10; }
        }

        function updateUI() {
            document.getElementById('m-val').innerText = money;
            document.getElementById('l-val').innerText = level;
            document.getElementById('skill-fill').style.width = skillCount + "%";
            document.getElementById('fever-fill').style.width = feverPoints + "%";
            document.querySelector('.bottom-ui').classList.toggle('ready', skillCount >= 100);
        }

        function giveUp() { if (isPlaying && confirm("リタイアしますか？")) endGame(); }
        function endGame() { 
            isPlaying = false; 
            if(feverTimer) clearInterval(feverTimer);
            document.getElementById('res-money').innerText = money; 
            openLayer('end-screen'); 
            saveGame(); 
        }
        function closeEndScreen() { openLayer('start-screen'); }
    </script>
</body>
</html>
