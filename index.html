<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>草抜きサバイバル - THE ULTIMATE KAKUSEI -</title>
    <style>
        :root { --main-red: #ff0000; --grass-green: #7cfc00; }
        body { 
            text-align: center; font-family: 'Arial Black', sans-serif; 
            background-color: #000; color: white; 
            margin: 0; overflow: hidden; touch-action: none; user-select: none;
        }
        /* ヘッダー情報 */
        .header-info { 
            background: #111; padding: 10px; display: flex; justify-content: space-around; 
            font-size: 18px; border-bottom: 3px solid var(--main-red);
        }
        /* ゲームフィールド */
        #game-field { 
            position: relative; width: 95vw; height: 65vh; 
            background: radial-gradient(circle, #222, #000); margin: 10px auto; 
            border: 4px solid #444; border-radius: 15px; overflow: hidden;
            box-shadow: 0 0 20px rgba(255,0,0,0.2);
        }
        /* スキルゲージ */
        #skill-bar-bg { width: 90%; height: 12px; background: #333; margin: 10px auto; border-radius: 10px; border: 1px solid #555; }
        #skill-bar-fill { width: 0%; height: 100%; background: var(--main-red); box-shadow: 0 0 10px var(--main-red); transition: width 0.2s; }

        /* 最強・覚醒ぜんのアニメーション */
        @keyframes saikyo-glow {
            0% { filter: drop-shadow(0 0 8px #f0f) brightness(1); transform: scale(1.1); }
            50% { filter: drop-shadow(0 0 20px #f00) brightness(1.8); transform: scale(1.3); }
            100% { filter: drop-shadow(0 0 8px #f0f) brightness(1); transform: scale(1.1); }
        }
        .kakusei-saikyo { 
            animation: saikyo-glow 0.15s infinite; 
            background: linear-gradient(45deg, #ff0000, #440000) !important;
            z-index: 50 !important;
        }

        /* アイテム基本設定（当たり判定拡大） */
        .item { 
            position: absolute; width: 45px; height: 45px; z-index: 10; 
            transition: transform 0.1s; box-sizing: content-box; 
            border: 18px solid transparent; /* 指での操作を助ける透明な当たり判定 */
            background-clip: padding-box; touch-action: none;
        }
        .grass { background: var(--grass-green); clip-path: polygon(50% 100%, 20% 80%, 0% 40%, 30% 60%, 50% 0%, 70% 60%, 100% 40%, 80% 80%); }
        .egg { display: flex; align-items: center; justify-content: center; font-size: 38px; border: none; filter: drop-shadow(0 0 8px red); }

        /* オーバーレイ表示 */
        .overlay { 
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.92); 
            z-index: 300; display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .btn-main { 
            padding: 18px 45px; font-size: 24px; background: var(--main-red); color: white; 
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold; 
            box-shadow: 0 0 25px var(--main-red); transition: 0.2s;
        }
        .btn-main:active { transform: scale(0.9); }

        #flash-effect { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; pointer-events: none; opacity: 0; z-index: 1000; }
        #msg-popup { 
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); 
            font-size: 60px; font-weight: bold; color: white; text-shadow: 0 0 20px red; 
            z-index: 500; pointer-events: none; opacity: 0; transition: 0.3s;
        }
    </style>
</head>
<body>

    <div id="flash-effect"></div>
    <div id="msg-popup">Huh?</div>

    <div class="header-info">
        <div>💰 <span id="score">0</span></div>
        <div>⏳ <span id="timer">30.0</span></div>
        <div>LV <span id="level">1</span></div>
    </div>

    <div id="skill-bar-bg"><div id="skill-bar-fill"></div></div>

    <div id="game-field">
        <div id="start-overlay" class="overlay">
            <h1 style="color:var(--main-red); text-shadow: 0 0 15px #f00; margin-bottom: 5px;">最強・覚醒ぜん</h1>
            <p style="font-size: 14px; margin-bottom: 25px;">【5%の覚醒】を抜き、全滅させろ。<br>たまごに触れたら即終了。</p>
            <button class="btn-main" onclick="resetGame()">START</button>
        </div>

        <div id="score-overlay" class="overlay" style="display: none;">
            <h2 id="over-reason" style="color:red; font-size: 32px; margin:0;">GAME OVER</h2>
            <p style="font-size:22px;">最終利益: <span id="final-score">0</span>円</p>
            <button class="btn-main" onclick="resetGame()">RETRY</button>
        </div>
    </div>

    <script>
        let score = 0, level = 1, timeLeft = 30.0, skill = 0;
        let isGameOver = true, timerInterval = null;

        function v(pattern=15) { if(navigator.vibrate) navigator.vibrate(pattern); }

        function resetGame() {
            score = 0; level = 1; timeLeft = 30.0; skill = 0;
            isGameOver = false;
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('score-overlay').style.display = 'none';
            // アイテムクリア
            [...document.querySelectorAll('.item')].forEach(i => i.remove());
            updateUI();
            spawn();
            // タイマー開始
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if(isGameOver) return;
                timeLeft -= 0.1;
                updateUI();
                if(timeLeft <= 0) endGame("時間切れ！");
            }, 100);
        }

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(score);
            document.getElementById('timer').innerText = Math.max(0, timeLeft).toFixed(1);
            document.getElementById('level').innerText = level;
            document.getElementById('skill-bar-fill').style.width = Math.min(100, skill) + "%";
        }

        function createItem() {
            const f = document.getElementById('game-field');
            const item = document.createElement('div');
            const rand = Math.random();
            
            let type = "grass";
            if (rand < 0.22) { type = "egg"; } // 22%で地雷
            else if (rand < 0.27) { type = "saikyo"; } // 22%〜27%の間（5%）で最強覚醒
            
            item.className = "item " + (type === "saikyo" ? "grass kakusei-saikyo" : type);
            if(type === "egg") item.innerText = "🥚";

            // 配置（端に寄りすぎないよう調整）
            item.style.left = Math.random() * (f.clientWidth - 75) + "px";
            item.style.top = Math.random() * (f.clientHeight - 75) + "px";

            // 収穫・接触イベント
            const harvest = (e) => {
                if(isGameOver) return;
                e.preventDefault();
                
                if(type === "egg") {
                    v([100, 50, 100]);
                    endGame("たまごが爆発した！");
                    return;
                }

                if(item.style.transform === "scale(0)") return;

                if(type === "saikyo") {
                    triggerSaikyoSkill();
                } else {
                    v(15);
                    score += 10;
                    skill += 4;
                    item.style.transform = "scale(0)";
                    setTimeout(() => { if(item.parentNode) item.remove(); }, 100);
                    checkNextLevel();
                }
                updateUI();
            };

            item.onpointerdown = harvest;
            item.onpointerenter = (e) => { if(e.buttons > 0) harvest(e); };
            f.appendChild(item);
        }

        // 最強能力：全消し
        function triggerSaikyoSkill() {
            v([60, 40, 60, 40, 150]);
            
            const flash = document.getElementById('flash-effect');
            const popup = document.getElementById('msg-popup');
            
            flash.style.opacity = "0.7";
            popup.innerText = "覚醒！";
            popup.style.opacity = "1";
            popup.style.transform = "translate(-50%, -50%) scale(1.5)";

            setTimeout(() => {
                flash.style.opacity = "0";
                popup.style.opacity = "0";
                popup.style.transform = "translate(-50%, -50%) scale(1)";
            }, 400);

            const allGrass = document.querySelectorAll('.grass');
            allGrass.forEach((g, index) => {
                setTimeout(() => {
                    if(g.parentNode) {
                        g.style.transform = "scale(0) rotate(180deg)";
                        score += 40;
                        setTimeout(() => g.remove(), 100);
                        if(index === allGrass.length - 1) checkNextLevel();
                    }
                }, index * 15);
            });
            score += 1000;
            skill = 100;
        }

        function checkNextLevel() {
            const f = document.getElementById('game-field');
            if(f.querySelectorAll('.grass').length === 0) {
                level++;
                spawn();
            }
        }

        function spawn() {
            // レベルが上がるとアイテム密度アップ
            const count = Math.min(40, 10 + level * 2);
            for(let i=0; i < count; i++) createItem(); 
        }

        function endGame(msg) { 
            isGameOver = true;
            clearInterval(timerInterval);
            v([200, 100, 200]);
            document.getElementById('score-overlay').style.display = 'flex'; 
            document.getElementById('over-reason').innerText = msg;
            document.getElementById('final-score').innerText = score; 
        }
    </script>
</body>
</html>
